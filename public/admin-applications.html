<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청서 관리 — Work Studio</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;color:#1f2937;font-size:12px}
    button{font-family:inherit;cursor:pointer;border:none;background:none}
    a{color:inherit;text-decoration:none}

    /* Layout */
    .top{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-bottom:1px solid #e5e7eb;position:sticky;top:0;z-index:20}
    .top h1{font-size:14px;font-weight:800;color:#1a365d}
    .top nav{display:flex;gap:4px;margin-left:auto}
    .top nav button,.top nav a{padding:4px 10px;font-size:11px;font-weight:700;border-radius:4px;border:1px solid #e5e7eb;background:#fff;color:#4b5563}
    .top nav button.a,.top nav a.a{background:#1a365d;color:#fff;border-color:#1a365d}

    .wrap{padding:10px 12px;max-width:1700px;margin:0 auto}

    /* Filters */
    .filters{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px;margin-bottom:10px}
    .filter-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:4px 8px;margin-bottom:4px}
    .filter-row{display:flex;flex-direction:column;gap:2px;padding:4px 6px;border:1px solid #f1f5f9;border-radius:4px;background:#fafbfc;min-width:0}
    .filter-row.full{grid-column:1/-1;flex-direction:row;flex-wrap:wrap;align-items:center;gap:4px 8px;background:#fff;border-color:#e3e5ed}
    .filter-row .lbl{font-size:9px;font-weight:800;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
    .filter-row .chips-wrap{display:flex;flex-wrap:wrap;gap:2px}
    .expand-toggle{margin-left:auto;font-size:10px;font-weight:700;padding:3px 10px;border:1px solid #cbd5e1;background:#fff;border-radius:4px;cursor:pointer;color:#0088ff}
    .expand-toggle:hover{background:#f0f4ff;border-color:#0088ff}
    .chip{padding:3px 9px;border:1px solid #d1d5db;border-radius:999px;font-size:10px;font-weight:600;color:#475569;background:#fff;user-select:none;white-space:nowrap}
    .chip:hover{border-color:#94a3b8}
    .chip.sel{background:#1a365d;color:#fff;border-color:#1a365d}
    .chip-sq{border-radius:4px}
    .chip-site{padding:3px 9px;border-radius:999px;font-weight:700;color:#fff}
    .srch{padding:4px 8px;font-size:11px;border:1px solid #d1d5db;border-radius:4px;outline:none;min-width:180px}
    .srch:focus{border-color:#1a365d}
    .date{padding:3px 6px;font-size:11px;border:1px solid #d1d5db;border-radius:4px;outline:none}
    .reset{padding:3px 10px;font-size:10px;font-weight:700;color:#dc2626;border:1px solid #fecaca;border-radius:4px;background:#fef2f2}

    /* Summary bar */
    .sumbar{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
    .sum{padding:4px 10px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;cursor:pointer;transition:.1s;white-space:nowrap}
    .sum:hover{filter:brightness(.96)}
    .sum b{font-size:13px;margin-right:4px;color:#1a365d}
    .sum-lbl{font-size:9px;color:#64748b;font-weight:700;letter-spacing:.3px;padding:0 2px 0 10px;user-select:none;white-space:nowrap}
    .sum-lbl:first-child{padding-left:4px}
    /* Group: 건 (total/reset) — neutral */
    .sum.g-total{background:#f1f5f9;border-color:#cbd5e1}
    .sum.g-total b{color:#0f172a}
    /* Group: 단계 (phase) — blue */
    .sum.g-phase{background:#eff6ff;border-color:#bfdbfe}
    .sum.g-phase b{color:#1d4ed8}
    .sum.g-phase.sel{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
    .sum.g-phase.sel b{color:#fff}
    /* Group: 역할 (role) — green */
    .sum.g-role{background:#f0fdf4;border-color:#bbf7d0}
    .sum.g-role b{color:#15803d}
    .sum.g-role.sel{background:#15803d;border-color:#15803d;color:#fff}
    .sum.g-role.sel b{color:#fff}
    /* Group: 상태 (status) — amber */
    .sum.g-status{background:#fffbeb;border-color:#fde68a}
    .sum.g-status b{color:#b45309}
    .sum.g-status.sel{background:#b45309;border-color:#b45309;color:#fff}
    .sum.g-status.sel b{color:#fff}
    /* Group: 평가 (finalGrade A/B/C/D) — purple */
    .sum.g-eval{background:#faf5ff;border-color:#e9d5ff}
    .sum.g-eval b{color:#7e22ce}
    .sum.g-eval.sel{background:#7e22ce;border-color:#7e22ce;color:#fff}
    .sum.g-eval.sel b{color:#fff}

    /* Table */
    .tbl{width:100%;background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:11px}
    th{padding:6px 8px;background:#f9fafb;border-bottom:1px solid #e5e7eb;text-align:left;font-weight:700;color:#64748b;font-size:10px;white-space:nowrap}
    td{padding:5px 8px;border-bottom:1px solid #f1f5f9;vertical-align:top}
    tr.row:hover{background:#f9fafb}
    th.hsort{cursor:pointer;user-select:none}
    th.hsort:hover{background:#eef2f6;color:#1a365d}
    .cell-click{cursor:pointer;transition:.1s}
    .cell-click:hover{outline:1.5px solid #1a365d;outline-offset:1px}
    .subj-chip{display:inline-block;padding:1px 5px;background:#f1f5f9;border-radius:3px;margin:1px 1px 0 0;font-size:9px}

    .prefix{display:flex;flex-direction:column;gap:2px;min-width:130px}
    .prefix .site{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;color:#fff;width:fit-content}
    .prefix .form{font-size:10px;color:#374151;font-weight:600}
    .role-bg{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700}
    .role-student{background:#dbeafe;color:#1d4ed8}
    .role-instructor{background:#fef3c7;color:#b45309}
    .role-expert{background:#ede9fe;color:#6d28d9}

    .phase{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;background:#e0e7ff;color:#3730a3}
    .phase-part1{background:#e0e7ff;color:#3730a3}
    .phase-interview{background:#fed7aa;color:#c2410c}
    .phase-part2{background:#cffafe;color:#0e7490}
    .phase-final{background:#dcfce7;color:#15803d}

    .status{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700}
    .st-0{background:#fee2e2;color:#991b1b}
    .st-1{background:#fef3c7;color:#92400e}
    .st-2{background:#ddd6fe;color:#5b21b6}
    .st-3{background:#bfdbfe;color:#1e40af}
    .st-4{background:#bbf7d0;color:#14532d}

    .grade{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;min-width:20px;text-align:center}
    .grade-A{background:#16a34a;color:#fff}
    .grade-B{background:#2563eb;color:#fff}
    .grade-C{background:#ea580c;color:#fff}
    .grade-D{background:#64748b;color:#fff}

    .btn{padding:3px 8px;font-size:10px;font-weight:600;border:1px solid #d1d5db;border-radius:3px;background:#fff;color:#4b5563}
    .btn:hover{background:#f3f4f6}
    .btn-primary{background:#1a365d;color:#fff;border-color:#1a365d}
    .btn-danger{color:#b91c1c;border-color:#fecaca}
    .btn-success{background:#16a34a;color:#fff;border-color:#16a34a}

    .memo-cell{display:flex;flex-direction:column;gap:3px;min-width:170px}
    .memo{font-size:10px;color:#6b7280;padding:2px 4px;border:1px dashed #e5e7eb;border-radius:3px;min-height:18px;line-height:1.4}
    .memo:focus{outline:none;border-color:#1a365d;background:#fffbea;color:#1f2937}
    .memo-files{display:flex;flex-wrap:wrap;gap:2px}
    .file-chip{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:3px;font-size:9px;line-height:1.3}
    .file-chip a{color:#1d4ed8;text-decoration:none;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .file-chip a:hover{text-decoration:underline}
    .file-chip .x{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:10px;padding:0 1px;line-height:1}
    .file-chip .x:hover{color:#dc2626}
    .memo-attach{padding:1px 6px;font-size:10px;border:1px dashed #d1d5db;background:#fff;border-radius:3px;align-self:flex-start;cursor:pointer;color:#64748b}
    .memo-attach:hover{border-color:#1a365d;color:#1a365d;background:#f8fafc}
    .memo-attach:disabled{opacity:.5;cursor:wait}

    tr.detail{background:#fafbfe}
    tr.detail td{padding:8px 14px}
    .detail-sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px}
    .detail-sec{background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:8px 10px}
    .detail-sec h4{font-size:10px;font-weight:800;color:#1a365d;padding-bottom:4px;border-bottom:1px solid #e5e7eb;margin-bottom:4px;display:flex;align-items:center;gap:4px}
    .detail-sec .kv{display:flex;gap:4px;font-size:10px;padding:1px 0}
    .detail-sec .kv .k{color:#64748b;min-width:80px}
    .detail-sec .kv .v{color:#1f2937;font-weight:500;flex:1;word-break:break-all}
    /* v2 module field grid: label + chip-style value, 2-col inside each card */
    .fld-grid{display:grid;grid-template-columns:1fr;gap:3px}
    @media(min-width:560px){.fld-grid.wide{grid-template-columns:repeat(2,minmax(0,1fr))}}
    .fld{padding:3px 5px;background:#f8fafc;border-radius:3px;min-width:0;border:1px solid #f1f5f9}
    .fld.span2{grid-column:1/-1}
    .flabel{font-size:9px;color:#475569;font-weight:800;margin-bottom:2px;letter-spacing:.2px;line-height:1.2}
    .fv{font-size:10px;color:#1f2937;word-break:break-all;line-height:1.35}
    .fv-text{font-size:10px;color:#1f2937;white-space:pre-wrap;line-height:1.4;padding:1px 0}
    .fv-chips{display:flex;flex-wrap:wrap;gap:2px}
    .fv-chip{display:inline-block;padding:1px 6px;background:#e0e7ff;color:#3730a3;border-radius:999px;font-size:9px;font-weight:600;line-height:1.5;border:1px solid #c7d2fe}
    .fv-bool{display:inline-block;font-size:10px;font-weight:700}
    .fv-bool.y{color:#15803d}
    .fv-bool.n{color:#94a3b8}
    .sec-legacy h4{color:#94a3b8}
    .sec-legacy{border-color:#f1f5f9}
    .score-in{width:48px;padding:2px 4px;font-size:10px;border:1px solid #d1d5db;border-radius:3px;text-align:center}
    .grade-select{padding:2px 6px;font-size:10px;border:1px solid #d1d5db;border-radius:3px}
    .edit-ta{width:100%;padding:4px 6px;font-size:10px;border:1px solid #d1d5db;border-radius:3px;resize:vertical;min-height:40px;font-family:inherit}

    /* Dashboard 4단 */
    .dash4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .dq{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;min-height:220px;cursor:pointer;transition:.15s}
    .dq:hover{border-color:#1a365d;box-shadow:0 2px 6px rgba(26,54,93,.15);transform:translateY(-1px)}
    .dq-head{display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:2px solid #e5e7eb;margin-bottom:6px}
    .dq-head .n{margin-left:auto;font-size:14px;font-weight:800;color:#1a365d}
    .dq-stats{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
    .dq-stats span{padding:2px 6px;background:#f3f4f6;border-radius:3px;font-size:9px;color:#475569}
    .dq-recent{font-size:10px}
    .dq-recent .r{display:flex;gap:4px;padding:2px 0;border-bottom:1px dashed #f1f5f9}
    .dq-recent .r:last-child{border-bottom:none}
    .dq-recent .nm{flex:1;color:#1f2937;font-weight:600}
    @media(max-width:1200px){.dash4{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:700px){.dash4{grid-template-columns:1fr}}

    .empty{padding:40px;text-align:center;color:#94a3b8;font-size:12px}
    .loading{padding:20px;text-align:center;color:#6b7280;font-size:11px}

    /* ══════════ GW-STYLE DETAIL POPUP (신규, 기존 인라인 펼침 미간섭) ══════════
       내용 참조: gw 팝업 / 구현 규칙: 공용 메모리 (compact·4단·칩·드롭다운 금지·실데이터만)
       네임스페이스: .gwp-* 전용 — 기존 .detail-sec/.fld-grid 등과 충돌 없음 */
    #gwp{display:none;position:fixed;inset:0;z-index:9000;font-size:11px}
    #gwp.open{display:block}
    .gwp-bd{position:absolute;inset:0;background:rgba(15,23,42,.58);backdrop-filter:blur(3px);animation:gwpFade .14s}
    @keyframes gwpFade{from{opacity:0}to{opacity:1}}
    .gwp-dlg{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:min(1280px,96vw);max-height:calc(100vh - 28px);background:#f1f5f9;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.38);display:flex;flex-direction:column;overflow:hidden;border:1px solid #cbd5e1}
    .gwp-hd{display:flex;align-items:center;gap:8px;padding:7px 12px;background:linear-gradient(180deg,#1a365d 0%,#0f2541 100%);color:#fff;flex-shrink:0}
    .gwp-hd .gwp-name{font-size:14px;font-weight:800}
    .gwp-hd .gwp-grade{font-size:11px;padding:2px 10px;border-radius:3px;font-weight:800}
    .gwp-hd .gwp-sub{font-size:10px;color:#cbd5e1;font-weight:600}
    .gwp-hd .gwp-meta{margin-left:auto;display:flex;gap:10px;font-size:10px;color:#cbd5e1}
    .gwp-hd .gwp-x{width:24px;height:24px;font-size:14px;color:#fff;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700}
    .gwp-hd .gwp-x:hover{background:#dc2626;border-color:#dc2626}
    .gwp-tabs{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;padding:0 10px;flex-shrink:0}
    .gwp-tab{padding:8px 22px;font-size:12px;font-weight:700;color:#64748b;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
    .gwp-tab .ltr{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;background:#e2e8f0;color:#64748b;border-radius:3px;font-size:10px;font-weight:800}
    .gwp-tab:hover{color:#1a365d;background:#f8fafc}
    .gwp-tab.a{color:#0088ff;border-bottom-color:#0088ff}
    .gwp-tab.a .ltr{background:#0088ff;color:#fff}
    .gwp-bd2{overflow:auto;padding:5px 7px;flex:1;background:#f1f5f9}
    .gwp-pn{display:none}
    .gwp-dlg[data-tab="A"] .gwp-pn[data-pane="A"],
    .gwp-dlg[data-tab="B"] .gwp-pn[data-pane="B"],
    .gwp-dlg[data-tab="C"] .gwp-pn[data-pane="C"]{display:block}
    .gwp-card{background:#fff;border:1px solid #e5e7eb;border-radius:5px;padding:6px 8px;margin-bottom:6px}
    .gwp-card h5{font-size:10px;font-weight:800;color:#1a365d;padding-bottom:3px;border-bottom:1px solid #e5e7eb;margin-bottom:4px;display:flex;align-items:center;gap:4px}
    .gwp-card h5 .sp{margin-left:auto;font-size:9px;color:#64748b;font-weight:600}
    .gwp-g{display:grid;gap:3px}
    .gwp-g2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .gwp-g3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .gwp-g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    /* Outer section grid — 12 sections in 4 columns */
    .gwp-secgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:4px;align-items:start}
    .gwp-sec.w2{grid-column:span 2}
    .gwp-sec.w3{grid-column:span 3}
    .gwp-sec.w4{grid-column:span 4}
    /* Internal field grid — default 1-col inside narrow sections; wider sections expand */
    .gwp-sec .gwp-g.gwp-g4{grid-template-columns:1fr}
    .gwp-sec.w2 .gwp-g.gwp-g4{grid-template-columns:repeat(2,minmax(0,1fr))}
    .gwp-sec.w3 .gwp-g.gwp-g4{grid-template-columns:repeat(3,minmax(0,1fr))}
    .gwp-sec.w4 .gwp-g.gwp-g4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .gwp-sec .gwp-g.gwp-g3{grid-template-columns:1fr}
    .gwp-sec.w2 .gwp-g.gwp-g3{grid-template-columns:repeat(2,minmax(0,1fr))}
    .gwp-sec.w3 .gwp-g.gwp-g3,.gwp-sec.w4 .gwp-g.gwp-g3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .gwp-sec .gwp-g.gwp-g2{grid-template-columns:1fr}
    .gwp-sec.w2 .gwp-g.gwp-g2,.gwp-sec.w3 .gwp-g.gwp-g2,.gwp-sec.w4 .gwp-g.gwp-g2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .gwp-sec.w2 .gwp-idr .gwp-idg{grid-template-columns:repeat(2,minmax(0,1fr))}
    @media(max-width:1200px){.gwp-secgrid{grid-template-columns:repeat(3,minmax(0,1fr))}.gwp-sec.w4{grid-column:span 3}}
    @media(max-width:900px){.gwp-secgrid{grid-template-columns:repeat(2,minmax(0,1fr))}.gwp-sec.w3,.gwp-sec.w4{grid-column:span 2}}
    .gwp-f{padding:3px 5px;background:#f8fafc;border:1px solid #f1f5f9;border-radius:3px;min-width:0}
    .gwp-f.s2{grid-column:span 2}
    .gwp-f.s3{grid-column:span 3}
    .gwp-f.s4{grid-column:span 4}
    .gwp-fl{font-size:9px;color:#475569;font-weight:800;margin-bottom:1px;letter-spacing:.2px;line-height:1.2}
    .gwp-fv{font-size:10px;color:#1f2937;word-break:break-all;line-height:1.35;font-weight:500}
    .gwp-fv.e{color:#cbd5e1;font-weight:400}
    .gwp-fv.ta{white-space:pre-wrap}
    .gwp-chips{display:flex;flex-wrap:wrap;gap:2px}
    .gwp-chip{display:inline-block;padding:1px 6px;background:#e0e7ff;color:#3730a3;border-radius:999px;font-size:9px;font-weight:600;border:1px solid #c7d2fe;line-height:1.4}
    .gwp-photo{width:96px;height:120px;background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#94a3b8;flex-shrink:0;overflow:hidden;text-align:center;line-height:1.3}
    .gwp-photo img{width:100%;height:100%;object-fit:cover}
    .gwp-idr{display:flex;gap:8px;align-items:stretch}
    .gwp-idr .gwp-idg{flex:1;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:3px;align-content:start}
    .gwp-con-row{grid-column:1/-1;display:flex;gap:4px;padding-top:4px;margin-top:2px;border-top:1px dashed #e5e7eb;flex-wrap:wrap}
    .gwp-con{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;font-size:9px;font-weight:700;border-radius:3px;border:1px solid}
    .gwp-con.y{background:#dcfce7;color:#15803d;border-color:#86efac}
    .gwp-con.n{background:#fef2f2;color:#991b1b;border-color:#fecaca}
    .gwp-con.u{background:#f8fafc;color:#94a3b8;border-color:#e2e8f0}
    .gwp-tl{display:flex;align-items:stretch;background:linear-gradient(180deg,#fffbeb 0%,#fef9c3 100%);border:1px solid #fde68a;border-radius:5px;padding:0;margin-bottom:6px;overflow:hidden}
    .gwp-st{flex:1;display:flex;flex-direction:column;padding:6px 10px;border-right:1px dashed #fcd34d;min-width:0;position:relative}
    .gwp-st:last-child{border-right:none}
    .gwp-st .t{font-size:9px;font-weight:800;color:#92400e;letter-spacing:.3px;margin-bottom:2px;display:flex;align-items:center;gap:3px}
    .gwp-st .v{font-size:12px;font-weight:800;color:#1f2937;line-height:1.2}
    .gwp-st .sub{font-size:9px;color:#78716c;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-height:12px}
    .gwp-st.done{background:rgba(255,255,255,.55)}

<!-- GW-style detail popup root (신규, 기존 인라인 펼침과 병행) -->
<div id="gwp"></div>

<script>
// ============================================================
//  GLOBAL STATE
// ============================================================

const state = {
  rows: [],           // applications
  templates: [],      // form_templates (id, data)
  modules: [],        // form_modules
  sites: [],          // sites.json websites
  filter: {
    site: null,        // single
    formId: null,      // single
    role: null,        // single
    phase: null,       // single
    status: null,      // single
    subject: [],       // multi — tax_subject (종목)
    category: null,    // single — tax_grade (교육/비즈니스/전문 과정)
    finalGrade: null,  // single — final.final_grade (A/B/C/D 관리자 평가)
    function: [],      // multi — tax_function
    layer: [],         // multi — tax_layer
    search: '',
    dateFrom: '',
    dateTo: ''
  },
  sort: { col: 'created_at', dir: 'desc' },   // 기본: 접수일 최신순
  view: 'list',
  dashAxis: 'site',
  expanded: new Set()
};

const SUBJECTS = ['TESOL 영어교육','AI 프롬프트','AI 번역/통역','AI 윤리','ITT 정통 통번역'];
// 과정(카테고리): 교육/비즈니스/전문 — 데이터 필드명은 레거시로 tax_grade 유지
const CATEGORIES = ['교육','일반(비즈니스)','전문'];
// 평가 등급(관리자 채점): A/B/C/D — final.final_grade
const FINAL_GRADES = ['A','B','C','D'];
const FUNCTIONS = ['문서','영상/SNS','음성','IT/개발','창의적 활동','번역 방법론','프롬프트','확장 영역'];
const LAYERS = ['번역','윤리','보안'];
const ROLES = [
  { id:'student', label:'학생' },
  { id:'instructor', label:'강사' },
  { id:'expert', label:'전문가' }
];
const PHASES = [
  { id:'part1', label:'1부' },
  { id:'interview', label:'면접' },
  { id:'part2', label:'2부' },
  { id:'final', label:'최종' }
];
const STATUSES = [
  { id:0, label:'미확인', cls:'st-0' },
  { id:1, label:'확인', cls:'st-1' },
  { id:2, label:'통화', cls:'st-2' },
  { id:3, label:'면접', cls:'st-3' },
  { id:4, label:'완료', cls:'st-4' }
];

// ============================================================
//  FETCH
// ============================================================

async function f(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`${url} ${r.status}`);
  return r.json();
}

async function loadAll() {
  const [rows, tpls, mods, sitesDef] = await Promise.all([
    f('/api/applications').catch(() => []),
    f('/api/form_templates').catch(() => []),
    f('/api/form_modules').catch(() => []),
    f('/api/definitions/sites').catch(() => ({ websites: [] }))
  ]);
  state.rows = (rows || []).map(r => { try { return { id:r.id, created_at:r.created_at, d: JSON.parse(r.data||'{}') }; } catch { return { id:r.id, created_at:r.created_at, d:{} }; } });
  state.templates = (tpls || []).map(r => { try { return { id:r.id, ...JSON.parse(r.data||'{}') }; } catch { return {}; } });
  state.modules = (mods || []).map(r => { try { return { id:r.id, ...JSON.parse(r.data||'{}') }; } catch { return {}; } });
  state.sites = sitesDef.websites || [];
  // 기본값: 모든 행 펼침 (사용자 요청 — 한 눈에 정보 노출)
  state.expanded = new Set(state.rows.map(r => r.id));
}

// ============================================================
//  LOOKUPS
// ============================================================

function siteInfo(siteId) {
  return state.sites.find(s => s.id === siteId) || { id:siteId, name:siteId, icon:'🏠', color:'#475569' };
}

function templateInfo(siteId, formId) {
  return state.templates.find(t => t._site === siteId && t._formId === formId) || null;
}

function moduleInfo(moduleId) {
  return state.modules.find(m => m.moduleId === moduleId) || null;
}

// Row taxonomy extraction
function getTax(d, key) {
  // Taxonomy lives under part1.tax_* typically
  const p1 = d.part1 || {};
  return p1[`tax_${key}`];
}

// ============================================================
//  FIELD METADATA — 로드된 form_modules에서 필드 라벨/타입/옵션 추출
//  Figma v2 원본 필드 + 레거시 M-*-* 필드 모두 커버 (raw key 노출 방지)
// ============================================================
function buildFieldMeta() {
  const meta = {};
  for (const mod of state.modules) {
    for (const f of (mod.fields || [])) {
      if (!f.key) continue;
      if (!meta[f.key]) {
        meta[f.key] = {
          label: f.label || f.key,
          type: f.type || 'text',
          options: f.options || null,
          moduleId: mod.moduleId,
          moduleName: mod.name
        };
      }
    }
  }
  return meta;
}

// 모듈 섹션 정렬 순서: v2 우선 → 공통 → 레거시 M-* 후단
const MODULE_SECTION_ORDER = [
  'common_identity', 'M-COM-IDENT',
  'common_qualification',
  'spec_instructor_context', 'spec_translator_context',
  'spec_instructor_classification',
  'spec_instructor_expertise',
  'spec_instructor_skillsets',
  'spec_translator_translation',
  'spec_translator_techskills',
  'common_narrative',
  // legacy tail
  'M-INS-Q','M-INS-SKILL','M-INS-ADD','M-INS-RES',
  'M-EXP-Q','M-EXP-SKILL','M-EXP-ADD','M-EXP-RES',
  'M-STU-Q','M-STU-SKILL','M-STU-ADD','M-STU-RES',
  'common_client','spec_client_quote','spec_student_course'
];

// 값 타입별 렌더링: 배열→칩, textarea→pre, checkbox→✓/✗
function renderFieldValue(val, type) {
  if (val == null || val === '' || (Array.isArray(val) && !val.length)) return '';
  if (Array.isArray(val)) {
    return `<div class="fv-chips">${val.map(v => `<span class="fv-chip">${esc(String(v))}</span>`).join('')}</div>`;
  }
  if (type === 'checkbox') {
    return val ? '<span class="fv-bool y">✓</span>' : '<span class="fv-bool n">✗</span>';
  }
  if (type === 'textarea') {
    return `<div class="fv-text">${esc(String(val))}</div>`;
  }
  return `<div class="fv">${esc(String(val))}</div>`;
}

function getField(d, phase, key) {
  return (d[phase] || {})[key];
}

function getName(d) {
  return getField(d, 'part1', 'name') || d.name || '(이름없음)';
}

function getPhone(d) {
  return getField(d, 'part1', 'phone') || d.phone || '';
}

function getEmail(d) {
  return getField(d, 'part1', 'email') || d.email || '';
}

// ============================================================
//  FILTERING
// ============================================================

function applyFilters(rows) {
  const fl = state.filter;
  return rows.filter(r => {
    const d = r.d;
    if (fl.site && d._site !== fl.site) return false;
    if (fl.formId && d._formId !== fl.formId) return false;
    if (fl.role && d._role !== fl.role) return false;
    if (fl.phase && d._phase !== fl.phase) return false;
    if (fl.status != null && Number(d._status || 0) !== fl.status) return false;

    const taxSubject = getTax(d, 'subject') || [];
    if (fl.subject.length && !fl.subject.some(s => taxSubject.includes(s))) return false;
    // 과정: tax_grade 데이터 필드를 category 필터로 조회 (레거시 필드명 유지)
    if (fl.category && getTax(d, 'grade') !== fl.category) return false;
    // 평가: 관리자 채점 결과 A/B/C/D
    if (fl.finalGrade && d.final?.final_grade !== fl.finalGrade) return false;

    const taxFunction = getTax(d, 'function') || [];
    if (fl.function.length && !fl.function.some(f => taxFunction.includes(f))) return false;

    const taxLayer = getTax(d, 'layer') || [];
    if (fl.layer.length && !fl.layer.some(l => taxLayer.includes(l))) return false;

    if (fl.search) {
      const q = fl.search.toLowerCase();
      const hay = [getName(d), getPhone(d), getEmail(d)].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }

    if (fl.dateFrom) {
      if ((r.created_at || '') < fl.dateFrom) return false;
    }
    if (fl.dateTo) {
      if ((r.created_at || '') > fl.dateTo + ' 23:59:59') return false;
    }
    return true;
  });
}

// ============================================================
//  SORT + CLICK-TO-FILTER
// ============================================================

function sortRows(rows) {
  const { col, dir } = state.sort;
  const mul = dir === 'asc' ? 1 : -1;
  const getVal = (r) => {
    const d = r.d;
    switch (col) {
      case 'created_at': return r.created_at || '';
      case 'name':       return getName(d);
      case 'site':       return d._site || '';
      case 'formId':     return d._formId || '';
      case 'role':       return d._role || '';
      case 'phase':      return d._phase || '';
      case 'status':     return Number(d._status || 0);
      case 'finalGrade': return d.final?.final_grade || 'Z';
      default: return '';
    }
  };
  return rows.slice().sort((a, b) => {
    const av = getVal(a), bv = getVal(b);
    if (av < bv) return -1 * mul;
    if (av > bv) return 1 * mul;
    return 0;
  });
}

function toggleSort(col) {
  if (state.sort.col === col) {
    state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sort.col = col;
    state.sort.dir = (col === 'created_at') ? 'desc' : 'asc';
  }
  rerender();
}

function sortArrow(col) {
  if (state.sort.col !== col) return '<span style="opacity:.3">↕</span>';
  return state.sort.dir === 'asc' ? '▲' : '▼';
}

// 셀 값 클릭 → 해당 값으로 즉시 필터 (drill-down)
function filterBy(axis, value) {
  if (Array.isArray(state.filter[axis])) {
    const arr = state.filter[axis];
    const i = arr.indexOf(value);
    if (i >= 0) arr.splice(i, 1); else arr.push(value);
  } else {
    state.filter[axis] = state.filter[axis] === value ? null : value;
  }
  rerender();
}

// HTML onclick 속성 안에 안전하게 JS 리터럴을 넣기 위한 헬퍼.
// JSON.stringify는 " 를 쓰는데 이게 onclick="..." 속성 안에서 조기 종료를 유발 →
// 필터 칩 onclick 전체가 깨져서 아무 반응 없던 원인.
function js(v) {
  if (v === null || v === undefined) return 'null';
  if (typeof v === 'number' || typeof v === 'boolean') return String(v);
  return "'" + String(v).replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'";
}

function renderFilters() {
  const el = document.getElementById('filters');
  const usedSites = [...new Set(state.rows.map(r => r.d._site).filter(Boolean))];
  const allSites = [...new Set([...usedSites, ...state.templates.map(t => t._site).filter(Boolean)])];

  const usedForms = [...new Set(state.templates.map(t => t._formId).filter(Boolean))];

  const row = (label, content) => `<div class="filter-row"><span class="lbl">${label}</span><div class="chips-wrap">${content}</div></div>`;
  const chipMulti = (axis, options, fmt) => options.map(o => {
    const sel = state.filter[axis].includes(o);
    return `<span class="chip${sel?' sel':''}" onclick="togMulti('${axis}','${o.replace(/'/g,"\\'")}')">${fmt ? fmt(o) : o}</span>`;
  }).join('');
  const chipSingle = (axis, options, fmt) => options.map(o => {
    const v = typeof o === 'object' ? o.id : o;
    const lb = typeof o === 'object' ? o.label : (fmt ? fmt(o) : o);
    const sel = state.filter[axis] === v || (v === null && state.filter[axis] === null);
    return `<span class="chip chip-sq${sel?' sel':''}" onclick="togSingle('${axis}',${js(v)})">${lb}</span>`;
  }).join('');

  // 펼침 상태 계산
  const allExpanded = state.rows.length > 0 && state.rows.every(r => state.expanded.has(r.id));
  let html = `<div class="filter-grid">`;

  // 사이트 (멀티가 아니라 싱글 네모칩. 색깔 적용)
  const siteChips = allSites.map(sid => {
    const s = siteInfo(sid);
    const sel = state.filter.site === sid;
    const bg = sel ? s.color : '#fff';
    const fg = sel ? '#fff' : s.color;
    return `<span class="chip chip-sq" style="background:${bg};color:${fg};border-color:${s.color}" onclick="togSingle('site',${js(sid)})">${s.icon||''} ${s.name||sid}</span>`;
  }).join('');
  const anySite = `<span class="chip chip-sq${state.filter.site===null?' sel':''}" onclick="togSingle('site',null)">전체</span>`;
  html += row('사이트', anySite + siteChips);

  // 신청서 (_formId)
  const formChips = usedForms.map(f => {
    const sel = state.filter.formId === f;
    const label = f.replace('_part1','·1부').replace('_part2','·2부').replace('student','학생').replace('instructor','강사').replace('expert','전문가');
    return `<span class="chip chip-sq${sel?' sel':''}" onclick="togSingle('formId',${js(f)})">${label}</span>`;
  }).join('');
  const anyForm = `<span class="chip chip-sq${state.filter.formId===null?' sel':''}" onclick="togSingle('formId',null)">전체</span>`;
  html += row('신청서', anyForm + formChips);

  // 역할
  html += row('역할', `<span class="chip chip-sq${state.filter.role===null?' sel':''}" onclick="togSingle('role',null)">전체</span>` + ROLES.map(r => {
    const sel = state.filter.role === r.id;
    return `<span class="chip chip-sq${sel?' sel':''}" onclick="togSingle('role',${js(r.id)})">${r.label}</span>`;
  }).join(''));

  // 단계
  html += row('단계', `<span class="chip chip-sq${state.filter.phase===null?' sel':''}" onclick="togSingle('phase',null)">전체</span>` + PHASES.map(p => {
    const sel = state.filter.phase === p.id;
    return `<span class="chip chip-sq${sel?' sel':''}" onclick="togSingle('phase',${js(p.id)})">${p.label}</span>`;
  }).join(''));

  // 상태
  html += row('상태', `<span class="chip${state.filter.status===null?' sel':''}" onclick="togSingle('status',null)">전체</span>` + STATUSES.map(s => {
    const sel = state.filter.status === s.id;
    return `<span class="chip${sel?' sel':''}" onclick="togSingle('status',${s.id})">${s.label}</span>`;
  }).join(''));

  // 과목 (멀티 원형)
  html += row('과목', chipMulti('subject', SUBJECTS));
  // 급수
  html += row('과정', `<span class="chip chip-sq${state.filter.category===null?' sel':''}" onclick="togSingle('category',null)">전체</span>` + CATEGORIES.map(c => {
    const sel = state.filter.category === c;
    return `<span class="chip chip-sq${sel?' sel':''}" onclick="togSingle('category',${js(c)})">${c}</span>`;
  }).join(''));
  html += row('평가', `<span class="chip chip-sq${state.filter.finalGrade===null?' sel':''}" onclick="togSingle('finalGrade',null)">전체</span>` + FINAL_GRADES.map(g => {
    const sel = state.filter.finalGrade === g;
    return `<span class="chip chip-sq${sel?' sel':''}" onclick="togSingle('finalGrade',${js(g)})">${g}</span>`;
  }).join(''));
  // 기능
  html += row('기능', chipMulti('function', FUNCTIONS));
  // 레이어
  html += row('레이어', chipMulti('layer', LAYERS));

  // 4단 그리드 종료
  html += `</div>`;

  // 검색 + 기간 + 펼치기 + reset (전체 폭)
  html += `<div class="filter-row full">
    <span class="lbl">검색</span>
    <input class="srch" type="text" id="searchBox" placeholder="이름·전화·이메일" value="${state.filter.search||''}" oninput="state.filter.search=this.value;rerender()">
    <span class="lbl" style="margin-left:12px">기간</span>
    <input class="date" type="date" value="${state.filter.dateFrom}" onchange="state.filter.dateFrom=this.value;rerender()">
    ~
    <input class="date" type="date" value="${state.filter.dateTo}" onchange="state.filter.dateTo=this.value;rerender()">
    <button class="expand-toggle" onclick="toggleExpandAll()">${allExpanded ? '▲ 전체 접기' : '▼ 전체 펼치기'}</button>
    <button class="reset" onclick="resetFilters()">전체 초기화</button>
  </div>`;

  el.innerHTML = html;
}

function togSingle(axis, value) {
  if (state.filter[axis] === value) {
    state.filter[axis] = null;
  } else {
    state.filter[axis] = value;
  }
  rerender();
}

function togMulti(axis, value) {
  const arr = state.filter[axis];
  const i = arr.indexOf(value);
  if (i >= 0) arr.splice(i, 1); else arr.push(value);
  rerender();
}

function resetFilters() {
  state.filter = {
    site:null, formId:null, role:null, phase:null, status:null,
    subject:[], category:null, finalGrade:null, function:[], layer:[],
    search:'', dateFrom:'', dateTo:''
  };
  rerender();
}

    'name','nameEn','birthDate','gender','phone','email','address','nationality',
    'tax_subject','tax_grade','tax_function','tax_industry','tax_domain','tax_layer',
    'privacyConsent','marketingConsent'
  ]);
  const fieldMeta = buildFieldMeta();
  const groups = {};
  for (const [k, v] of Object.entries(p1)) {
    if (HANDLED.has(k)) continue;
    if (v == null || v === '' || (Array.isArray(v) && !v.length)) continue;
    const m = fieldMeta[k] || { label: k, type: 'text', moduleId: '_other', moduleName: '기타' };
    const g = groups[m.moduleId] = groups[m.moduleId] || { name: m.moduleName, items: [] };
    g.items.push({ key: k, label: m.label, value: v, type: m.type });
  }
  const orderedMids = Object.keys(groups).sort((a, b) => {
    const ai = MODULE_SECTION_ORDER.indexOf(a);
    const bi = MODULE_SECTION_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
  const roleSec = orderedMids.map(mid => {
    const g = groups[mid];
    const isLegacy = /^M-[A-Z]+-/.test(mid);
    const isWide = g.items.length >= 4;
    const itemsHtml = g.items.map(it => {
      const valHtml = renderFieldValue(it.value, it.type);
      if (!valHtml) return '';
      const span = (it.type === 'textarea' || (Array.isArray(it.value) && it.value.length >= 6)) ? ' span2' : '';
      return `<div class="fld${span}"><div class="flabel">${esc(it.label)}</div>${valHtml}</div>`;
    }).filter(Boolean).join('');
    if (!itemsHtml) return '';
    const icon = isLegacy ? '🗂️' : '📋';
    const cls = isLegacy ? 'detail-sec sec-legacy' : 'detail-sec';
    return `
      <div class="${cls}">
        <h4>${icon} ${esc(g.name)}</h4>
        <div class="fld-grid${isWide ? ' wide' : ''}">${itemsHtml}</div>
      </div>`;
  }).filter(Boolean).join('');

  // Call + Interview (editable)
  const callSection = `
    <div class="detail-sec">
      <h4>📞 통화</h4>
      <div class="kv"><div class="k">일시</div><input class="edit-ta" type="datetime-local" style="min-height:auto;padding:2px 4px" value="${call.at||''}" onchange="saveNested(${r.id},'call','at',this.value)"></div>
      <div class="kv"><div class="k">담당자</div><input class="edit-ta" type="text" style="min-height:auto;padding:2px 4px" value="${esc(call.by||'')}" onchange="saveNested(${r.id},'call','by',this.value)"></div>
      <div class="kv"><div class="k">메모</div><textarea class="edit-ta" onblur="saveNested(${r.id},'call','notes',this.value)">${esc(call.notes||'')}</textarea></div>
      <div class="kv"><div class="k">다음</div>
        <div class="v">
          <button class="btn" onclick="setStatus(${r.id}, 2)">통화 완료</button>
          <button class="btn btn-primary" onclick="setStatus(${r.id}, 3);setPhase(${r.id}, 'interview')">→ 면접</button>
        </div>
      </div>
    </div>`;

  const ivScore = iv.score || {};
  const total = (Number(ivScore.communication||0)+Number(ivScore.expertise||0)+Number(ivScore.attitude||0)+Number(ivScore.availability||0));
  const interviewSection = `
    <div class="detail-sec">
      <h4>🗣️ 면접 점수 (M-INT-SCORE)</h4>
      <div class="kv"><div class="k">커뮤니케이션</div><input class="score-in" type="number" min="1" max="5" value="${ivScore.communication||''}" onchange="saveScore(${r.id},'communication',this.value)"></div>
      <div class="kv"><div class="k">전문성</div><input class="score-in" type="number" min="1" max="5" value="${ivScore.expertise||''}" onchange="saveScore(${r.id},'expertise',this.value)"></div>
      <div class="kv"><div class="k">태도</div><input class="score-in" type="number" min="1" max="5" value="${ivScore.attitude||''}" onchange="saveScore(${r.id},'attitude',this.value)"></div>
      <div class="kv"><div class="k">가용성</div><input class="score-in" type="number" min="1" max="5" value="${ivScore.availability||''}" onchange="saveScore(${r.id},'availability',this.value)"></div>
      <div class="kv"><div class="k">총점</div><div class="v"><b>${total || '-'} / 20</b></div></div>
      <div class="kv"><div class="k">메모</div><textarea class="edit-ta" onblur="saveNested(${r.id},'interview','memo',this.value)">${esc(iv.memo||'')}</textarea></div>
    </div>`;

  // Part2 — 모듈 단위 섹션화 (동일 로직 재사용)
  const p2Groups = {};
  for (const [k, v] of Object.entries(p2)) {
    if (v == null || v === '' || (Array.isArray(v) && !v.length)) continue;
    const m = fieldMeta[k] || { label: k, type: 'text', moduleId: '_p2_other', moduleName: '2부 기타' };
    const g = p2Groups[m.moduleId] = p2Groups[m.moduleId] || { name: m.moduleName, items: [] };
    g.items.push({ key: k, label: m.label, value: v, type: m.type });
  }
  const p2OrderedMids = Object.keys(p2Groups).sort((a, b) => {
    const ai = MODULE_SECTION_ORDER.indexOf(a);
    const bi = MODULE_SECTION_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
  const p2Section = p2OrderedMids.length ? p2OrderedMids.map(mid => {
    const g = p2Groups[mid];
    const isLegacy = /^M-[A-Z]+-/.test(mid);
    const isWide = g.items.length >= 4;
    const itemsHtml = g.items.map(it => {
      const valHtml = renderFieldValue(it.value, it.type);
      if (!valHtml) return '';
      const span = (it.type === 'textarea' || (Array.isArray(it.value) && it.value.length >= 6)) ? ' span2' : '';
      return `<div class="fld${span}"><div class="flabel">${esc(it.label)}</div>${valHtml}</div>`;
    }).filter(Boolean).join('');
    if (!itemsHtml) return '';
    const cls = isLegacy ? 'detail-sec sec-legacy' : 'detail-sec';
    return `<div class="${cls}"><h4>📝 2부 · ${esc(g.name)}</h4><div class="fld-grid${isWide ? ' wide' : ''}">${itemsHtml}</div></div>`;
  }).filter(Boolean).join('') : `<div class="detail-sec"><h4>📝 2부</h4><div style="font-size:10px;color:#94a3b8">미제출 — <a href="#" onclick="sendPart2Link(${r.id});return false">Part 2 링크 생성</a></div></div>`;

  const currentGrade=fn.final_grade||'';
  const gradeChip=(g)=>`<span class="chip chip-sq ${currentGrade===g?'sel grade-'+g:''}" style="padding:4px 14px;font-size:12px;font-weight:800;${currentGrade===g?'':'background:#f8fafc;color:#64748b'}" onclick="setGrade(${r.id},'${g}')">${g}</span>`;
  const avgScore=(Number(fn.final_autoScore)||0)+(Number(fn.final_manualScore)||0);
  const gradeBadge=currentGrade?`<span class="grade grade-${currentGrade}" style="font-size:18px;padding:6px 16px;margin-right:8px">${currentGrade}</span>`:'<span style="font-size:11px;color:#94a3b8;padding:4px 10px;border:1px dashed #cbd5e1;border-radius:4px;margin-right:8px">미평가</span>';
  const finalSection = `
    <div class="detail-sec">
      <h4>🏆 최종 등급 (관리자 평가)</h4>
      <div style="display:flex;align-items:center;margin-bottom:8px;padding:6px 8px;background:#f8fafc;border-radius:4px">
        ${gradeBadge}
        <span style="font-size:10px;color:#64748b">합계 ${avgScore}점</span>
      </div>
      <div class="kv"><div class="k">자동 점수</div><input class="score-in" type="number" style="width:70px" value="${fn.final_autoScore||''}" onchange="saveNested(${r.id},'final','final_autoScore',Number(this.value));rerender()"></div>
      <div class="kv"><div class="k">수동 점수</div><input class="score-in" type="number" style="width:70px" value="${fn.final_manualScore||''}" onchange="saveNested(${r.id},'final','final_manualScore',Number(this.value));rerender()"></div>
      <div class="kv"><div class="k">등급</div>
        <div style="display:flex;gap:4px">
          ${gradeChip('A')}${gradeChip('B')}${gradeChip('C')}${gradeChip('D')}
          <span class="chip chip-sq" style="padding:4px 10px;font-size:11px;background:#fff;color:#94a3b8" onclick="setGrade(${r.id},'')">해제</span>
        </div>
      </div>
      <div class="kv"><div class="k">평가 사유</div><textarea class="edit-ta" onblur="saveNested(${r.id},'final','final_reason',this.value)">${esc(fn.final_reason||'')}</textarea></div>
      <div class="kv"><div class="k">평가자</div><input class="edit-ta" type="text" style="min-height:auto;padding:2px 4px" value="${esc(fn.final_evaluator||'')}" onchange="saveNested(${r.id},'final','final_evaluator',this.value)"></div>
      <div class="kv"><div class="k">평가일</div><input class="edit-ta" type="datetime-local" style="min-height:auto;padding:2px 4px" value="${fn.final_evalAt||''}" onchange="saveNested(${r.id},'final','final_evalAt',this.value)"></div>
    </div>`;

  return `
    <tr class="detail">
      <td colspan="11">
        <div class="detail-sections">
          ${p1Section}
          ${taxSection}
          ${roleSec}
          ${callSection}
          ${interviewSection}
          ${p2Section}
          ${finalSection}
        </div>
      </td>
    </tr>`;
}

// ============================================================
//  GW-STYLE DETAIL POPUP (신규 · 기존 인라인 펼침과 완전 분리)
//  내용 참조: gw 팝업 이미지 (사진·기본·학력·경력·자격·비고·이력)
//  구현 규칙: 공용 메모리 (compact, 4단 그리드, 칩, 드롭다운 금지, 실데이터만)
//  트리거: 행 액션 셀의 [상세 팝업] 버튼 → openGwp(id)
//  저장: 기존 saveNested/saveScore/setStatus/setPhase/setGrade 재사용 + gwpRefresh
// ============================================================

const gwp = { id: null, tab: 'A', collapsed: new Set(), addingMod: null };

function openGwp(id) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  gwp.id = id;
  if (!gwp.tab) gwp.tab = 'A';
  renderGwp(row);
  document.getElementById('gwp').classList.add('open');
  document.addEventListener('keydown', gwpEsc);
}

function closeGwp() {
  const root = document.getElementById('gwp');
  if (root) { root.classList.remove('open'); root.innerHTML = ''; }
  gwp.id = null;
  document.removeEventListener('keydown', gwpEsc);
}

function gwpEsc(e) { if (e.key === 'Escape') closeGwp(); }

function gwpSetTab(tab) {
  gwp.tab = tab;
  const dlg = document.querySelector('#gwp .gwp-dlg');
  if (!dlg) return;
  dlg.dataset.tab = tab;
  dlg.querySelectorAll('.gwp-tab').forEach(b => b.classList.toggle('a', b.dataset.t === tab));
}

function gwpRefresh() {
  if (gwp.id == null) return;
  const row = state.rows.find(r => r.id === gwp.id);
  if (row) renderGwp(row);
}

// 한 필드 (라벨 + 값) — 값 없으면 '—' (실데이터 규칙 준수)
function gwpF(label, value, span) {
  const has = value != null && value !== '' && !(Array.isArray(value) && !value.length);
  const spanCls = span ? ' s' + span : '';
  let vHtml;
  if (!has) {
    vHtml = `<div class="gwp-fv e">—</div>`;
  } else if (Array.isArray(value)) {
    vHtml = `<div class="gwp-chips">${value.map(x => `<span class="gwp-chip">${esc(String(x))}</span>`).join('')}</div>`;
  } else if (typeof value === 'boolean') {
    vHtml = `<div class="gwp-fv">${value ? '✓' : '✗'}</div>`;
  } else {
    vHtml = `<div class="gwp-fv">${esc(String(value))}</div>`;
  }
  return `<div class="gwp-f${spanCls}"><div class="gwp-fl">${esc(label)}</div>${vHtml}</div>`;
}

// ════════════════════════════════════════════════════════════════
//  3개 버전 공용: 데이터 추출기 + 공통 HTML 빌더
// ════════════════════════════════════════════════════════════════
function gwpExtract(row) {
  const d = row.d;
  const p1 = d.part1 || {};
  const p2 = d.part2 || {};
  const call = d.call || {};
  const iv = d.interview || {};
  const fn = d.final || {};
  const fieldMeta = buildFieldMeta();
  const HANDLED = new Set([
    'name','nameEn','birthDate','gender','phone','email','address','nationality',
    'photoUrl','photo','profileImage',
    'tax_subject','tax_grade','tax_function','tax_industry','tax_domain','tax_layer',
    'privacyConsent','marketingConsent'
  ]);
  const customFields = d._customFields || {};
  const getMetaFor = (k, p2) => {
    if (fieldMeta[k]) return fieldMeta[k];
    if (customFields[k]) {
      const cm = customFields[k];
      return {
        label: cm.label || k,
        type: cm.type || 'text',
        moduleId: cm.moduleId || (p2?'_p2_other':'_other'),
        moduleName: state.modules.find(m => m.moduleId === cm.moduleId)?.name || '커스텀'
      };
    }
    return { label: k, type: 'text', moduleId: (p2?'_p2_other':'_other'), moduleName: (p2?'2부 기타':'기타') };
  };
  const edu = [], car = [], qua = [];
  const otherP1 = {};
  for (const [k, v] of Object.entries(p1)) {
    if (HANDLED.has(k)) continue;
    // 빈 값도 포함 — 관리자가 추가한 모듈/필드 렌더링 위해
    const m = getMetaFor(k, false);
    const tag = ((m.moduleId||'') + ' ' + (m.moduleName||'') + ' ' + (m.label||'')).toLowerCase();
    const item = { key: k, label: m.label, value: v, type: m.type };
    if (/학력|education|\bedu\b|school|univ|전공/.test(tag)) edu.push(item);
    else if (/경력|career|\bwork\b|experience|근무/.test(tag)) car.push(item);
    else if (/자격|qualif|license|certif|면허/.test(tag)) qua.push(item);
    else {
      const g = otherP1[m.moduleId] = otherP1[m.moduleId] || { name: m.moduleName, items: [] };
      g.items.push(item);
    }
  }
  const p2Groups = {};
  for (const [k, v] of Object.entries(p2)) {
    const m = getMetaFor(k, true);
    const g = p2Groups[m.moduleId] = p2Groups[m.moduleId] || { name: m.moduleName, items: [] };
    g.items.push({ key: k, label: m.label, value: v, type: m.type });
  }
  const sortMids = (obj) => Object.keys(obj).sort((a, b) => {
    const ai = MODULE_SECTION_ORDER.indexOf(a);
    const bi = MODULE_SECTION_ORDER.indexOf(b);
    if (ai === -1 && bi === -1) return a.localeCompare(b);
    if (ai === -1) return 1;
    if (bi === -1) return -1;
    return ai - bi;
  });
  const p1OtherList = sortMids(otherP1).map(mid => ({ mid, ...otherP1[mid] }));
  const p2List = sortMids(p2Groups).map(mid => ({ mid, ...p2Groups[mid] }));
  const sc = iv.score || {};
  const ivTotal = Number(sc.communication||0)+Number(sc.expertise||0)+Number(sc.attitude||0)+Number(sc.availability||0);
  const avgScore = (Number(fn.final_autoScore)||0)+(Number(fn.final_manualScore)||0);
  const photoUrl = p1.photoUrl || p1.photo || p1.profileImage || '';
  const email = (p1.email || '').trim().toLowerCase();
  const phone = (p1.phone || '').replace(/\D/g, '');
  const others = (email || phone.length >= 8) ? state.rows.filter(r => {
    if (r.id === row.id) return false;
    const op1 = r.d.part1 || {};
    const oe = (op1.email || '').trim().toLowerCase();
    const op = (op1.phone || '').replace(/\D/g, '');
    return (email && oe === email) || (phone.length >= 8 && op === phone);
  }) : [];
  return { id: row.id, row, d, p1, p2, call, iv, fn, sc, ivTotal, avgScore, edu, car, qua, p1OtherList, p2List, others, photoUrl };
}

// 공용 빌더
function gwpStep(done, t, val, sub) {
  return `<div class="gwp-st ${done?'done':'pend'}"><span class="t"><span class="dot"></span>${t}</span><span class="v">${done?esc(val):'—'}</span><span class="sub">${sub?esc(sub):'&nbsp;'}</span></div>`;
}
function gwpTimelineHtml(x) {
  return `<div class="gwp-tl">
    ${gwpStep(!!x.row.created_at, '① 접수', (x.row.created_at||'').slice(0,16).replace('T',' '), '')}
    ${gwpStep(!!x.call.at, '② 통화', (x.call.at||'').replace('T',' '), x.call.by||'')}
    ${gwpStep(x.ivTotal>0, '③ 면접', x.ivTotal?`${x.ivTotal}/20`:'', x.iv.memo?String(x.iv.memo).slice(0,28):'')}
    ${gwpStep(!!x.fn.final_grade, '④ 평가', x.fn.final_grade||'', x.fn.final_evaluator||'')}
  </div>`;
}
function gwpCrossHtml(x) {
  if (!x.others.length) return `<div class="gwp-cross-e">같은 이메일/전화번호 다른 접수 없음</div>`;
  const trs = x.others.map(o => {
    const s2 = siteInfo(o.d._site);
    const t2 = templateInfo(o.d._site, o.d._formId);
    const ph = o.d._phase || 'part1';
    const phaseObj = PHASES.find(p => p.id === ph);
    const stObj = STATUSES.find(y => y.id === Number(o.d._status||0));
    const g = o.d.final?.final_grade;
    const formLabel = t2 ? (t2.shortName || t2.name) : (o.d._formId || '-');
    return `<tr onclick="openGwp(${o.id})"><td>${esc((o.created_at||'').slice(0,10))}</td><td><span class="gwp-sm" style="background:${s2.color}">${s2.icon||''} ${esc(s2.name||o.d._site||'')}</span></td><td>${esc(formLabel)}</td><td><span class="phase phase-${ph}">${phaseObj?phaseObj.label:ph}</span></td><td><span class="status ${stObj?stObj.cls:'st-0'}">${stObj?stObj.label:'-'}</span></td><td>${g?`<span class="grade grade-${g}">${g}</span>`:'-'}</td></tr>`;
  }).join('');
  return `<div class="gwp-cross"><table><thead><tr><th>접수일</th><th>출처</th><th>신청서</th><th>단계</th><th>상태</th><th>평가</th></tr></thead><tbody>${trs}</tbody></table></div>`;
}
function gwpConsentChips(p1) {
  return `<span class="gwp-con ${p1.privacyConsent===true?'y':(p1.privacyConsent===false?'n':'u')}">개인정보 ${p1.privacyConsent===true?'✓':(p1.privacyConsent===false?'✗':'—')}</span><span class="gwp-con ${p1.marketingConsent===true?'y':(p1.marketingConsent===false?'n':'u')}">마케팅 ${p1.marketingConsent===true?'✓':(p1.marketingConsent===false?'✗':'—')}</span>`;
}
function gwpFnInputs(x) {
  // 동일한 input handlers, 3 versions에서 재사용
  const id = x.id, fn = x.fn;
  const gradeChip = (g) => `<button class="gwp-gc ${fn.final_grade===g?'sel '+g:''}" onclick="setGrade(${id},'${g}');gwpRefresh()">${g}</button>`;
  return { gradeChip };
}

// ════════════════════════════════════════════════════════════════
//  편집용 헬퍼 — 전 필드 inline 수정 가능
// ════════════════════════════════════════════════════════════════

function gwpEF(label, id, section, key, value, type, options, span, delBtn) {
  const spanCls = span ? ' s' + span : '';
  const sk = key.replace(/'/g,"\\'");
  const ss = section;
  let body;
  if (type === 'textarea') {
    body = `<textarea class="gwp-ta" onblur="saveNested(${id},'${ss}','${sk}',this.value)">${esc(String(value||''))}</textarea>`;
  } else if (type === 'multiselect' || (Array.isArray(value) && type !== 'checkbox')) {
    const arr = Array.isArray(value) ? value : [];
    if (options && options.length) {
      body = `<div class="gwp-chips">${options.map(o => {
        const sel = arr.includes(o);
        const oe = String(o).replace(/'/g,"\\'").replace(/"/g,'&quot;');
        return `<button class="gwp-mchip${sel?' sel':''}" onclick="gwpToggleMulti(${id},'${ss}','${sk}','${oe}')">${esc(o)}</button>`;
      }).join('')}</div>`;
    } else {
      body = `<div class="gwp-chips">${arr.map((v,i) => `<span class="gwp-chip">${esc(v)}<button class="gwp-cx" onclick="gwpRemoveMulti(${id},'${ss}','${sk}',${i})">×</button></span>`).join('')}<button class="gwp-addbtn" onclick="gwpAddMulti(${id},'${ss}','${sk}')">＋</button></div>`;
    }
  } else if (type === 'select') {
    if (options && options.length) {
      body = `<div class="gwp-chips">${options.map(o => {
        const sel = String(value) === String(o);
        const oe = String(o).replace(/'/g,"\\'").replace(/"/g,'&quot;');
        return `<button class="gwp-schip${sel?' sel':''}" onclick="saveNested(${id},'${ss}','${sk}','${oe}');gwpRefresh()">${esc(o)}</button>`;
      }).join('')}</div>`;
    } else {
      body = `<input class="gwp-in" type="text" value="${esc(String(value||''))}" onchange="saveNested(${id},'${ss}','${sk}',this.value)">`;
    }
  } else if (type === 'checkbox' || type === 'bool') {
    body = `<div class="gwp-chips"><button class="gwp-schip${value===true?' sel':''}" onclick="saveNested(${id},'${ss}','${sk}',true);gwpRefresh()">✓</button><button class="gwp-schip${value===false?' sel':''}" onclick="saveNested(${id},'${ss}','${sk}',false);gwpRefresh()">✗</button></div>`;
  } else {
    const it = type==='date'?'date':type==='number'?'number':type==='email'?'email':type==='tel'?'tel':type==='datetime'?'datetime-local':'text';
    body = `<input class="gwp-in" type="${it}" value="${esc(String(value??''))}" onchange="saveNested(${id},'${ss}','${sk}',${type==='number'?'Number(this.value)':'this.value'})">`;
  }
  return `<div class="gwp-f${spanCls}"><div class="gwp-fl">${esc(label)}</div>${body}${delBtn||''}</div>`;
}

// ─── 모듈 CRUD ───
function gwpStartAddMod(section) { gwp.addingMod = { section }; gwpRefresh(); }
function gwpCancelAddMod() { gwp.addingMod = null; gwpRefresh(); }
async function gwpAddMod(id, section, moduleId) {
  const mod = state.modules.find(m => m.moduleId === moduleId);
  if (!mod) return;
  const row = state.rows.find(r => r.id === id);
  if (!row.d[section]) row.d[section] = {};
  for (const f of (mod.fields || [])) {
    if (row.d[section][f.key] === undefined) {
      row.d[section][f.key] = f.type === 'multiselect' ? [] : (f.type === 'checkbox' ? null : '');
    }
  }
  gwp.addingMod = null;
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  gwpRefresh();
}
async function gwpRemoveMod(id, section, moduleId) {
  if (!confirm(`모듈 "${moduleId}"의 모든 필드를 이 접수에서 삭제?`)) return;
  const row = state.rows.find(r => r.id === id);
  if (!row || !row.d[section]) return;
  const m = buildFieldMeta();
  const keysToDel = [];
  for (const k of Object.keys(row.d[section])) {
    if (m[k]?.moduleId === moduleId) keysToDel.push(k);
    else if (row.d._customFields?.[k]?.moduleId === moduleId) keysToDel.push(k);
  }
  keysToDel.forEach(k => delete row.d[section][k]);
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  gwpRefresh();
}
async function gwpAddField(id, section, moduleId) {
  const key = (prompt('필드 key (영문)', '')||'').trim();
  if (!key) return;
  const label = (prompt('필드 라벨', key)||'').trim() || key;
  const row = state.rows.find(r => r.id === id);
  if (!row.d[section]) row.d[section] = {};
  if (row.d[section][key] === undefined) row.d[section][key] = '';
  if (!row.d._customFields) row.d._customFields = {};
  row.d._customFields[key] = { label, moduleId, type: 'text' };
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  gwpRefresh();
}
async function gwpDelField(id, section, key) {
  if (!confirm(`"${key}" 필드 삭제?`)) return;
  const row = state.rows.find(r => r.id === id);
  if (!row || !row.d[section]) return;
  delete row.d[section][key];
  if (row.d._customFields?.[key]) delete row.d._customFields[key];
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  gwpRefresh();
}

// ─── 멀티 기록 (통화/상담/면접) ───
function gwpGetList(d, key, legacyKey) {
  if (Array.isArray(d[key])) return d[key];
  if (legacyKey && d[legacyKey]) {
    const leg = d[legacyKey];
    const hasData = leg.at || leg.notes || leg.by || leg.memo || (leg.score && Object.keys(leg.score).length);
    if (hasData) return [{ ...leg }];
  }
  return [];
}
function gwpEnsureList(row, key, legacyKey) {
  if (!Array.isArray(row.d[key])) {
    const leg = legacyKey ? row.d[legacyKey] : null;
    const seed = (leg && (leg.at || leg.notes || leg.by || leg.memo || (leg.score && Object.keys(leg.score).length))) ? [{ ...leg }] : [];
    row.d[key] = seed;
  }
  return row.d[key];
}
async function gwpAddEvt(id, key) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  const legacyKey = key === 'calls' ? 'call' : key === 'interviews' ? 'interview' : null;
  gwpEnsureList(row, key, legacyKey);
  const nowLocal = new Date(Date.now() - new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);
  const blank = key === 'interviews' ? { at: nowLocal, by: '', score:{}, memo: '' } : { at: nowLocal, by: '', notes: '' };
  row.d[key].push(blank);
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  gwpRefresh();
}
async function gwpDelEvt(id, key, idx) {
  if (!confirm('이 기록을 삭제?')) return;
  const row = state.rows.find(r => r.id === id);
  if (!Array.isArray(row.d[key])) return;
  row.d[key].splice(idx, 1);
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  gwpRefresh();
}
async function gwpSaveEvt(id, key, idx, field, value) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  const legacyKey = key === 'calls' ? 'call' : key === 'interviews' ? 'interview' : null;
  gwpEnsureList(row, key, legacyKey);
  if (!row.d[key][idx]) row.d[key][idx] = {};
  row.d[key][idx][field] = value;
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  // 포커스 유지 — 재렌더 없음
}
async function gwpSaveIvScore(id, idx, field, value) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  gwpEnsureList(row, 'interviews', 'interview');
  if (!row.d.interviews[idx]) row.d.interviews[idx] = {};
  if (!row.d.interviews[idx].score) row.d.interviews[idx].score = {};
  row.d.interviews[idx].score[field] = Number(value);
  const sc = row.d.interviews[idx].score;
  const t = Number(sc.communication||0)+Number(sc.expertise||0)+Number(sc.attitude||0)+Number(sc.availability||0);
  row.d.interviews[idx].total = t;
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});
  // 총점만 부분 업데이트 (포커스 유지)
  document.querySelectorAll(`#gwp .gwp-evt[data-ek="interviews-${idx}"] .gwp-evt-total`).forEach(el => el.textContent = `${t}/20`);
}

// 이벤트 리스트 렌더 (통화/상담)

        <input class="gwp-in" type="text" value="${esc(e.by||'')}" placeholder="담당자" onchange="gwpSaveEvt(${id},'${key}',${i},'by',this.value)">

      </div>

  return `${statusRow}${entries || `<div class="gwp-fv e" style="padding:4px;text-align:center;font-size:10px">${typeLabel} 기록 없음</div>`}`;
}

  const entries = list.map((e, i) => {

        <div class="gwp-f"><div class="gwp-fl">태도</div><input class="gwp-sc" type="number" min="1" max="5" value="${sc.attitude||''}" onchange="gwpSaveIvScore(${id},${i},'attitude',this.value)"></div>

// 모듈 추가 UI
function gwpModAddUi(id, section, usedList) {
  const usedIds = new Set(usedList.map(g => g.mid));
  if (gwp.addingMod && gwp.addingMod.section === section) {
    const available = state.modules.filter(m => !usedIds.has(m.moduleId));
    return `<div class="gwp-modpicker">
      <span style="font-size:9px;color:#64748b;margin-right:4px">모듈 선택 (${available.length}):</span>
      ${available.map(m => `<button class="gwp-schip" onclick="gwpAddMod(${id},'${section}','${String(m.moduleId).replace(/'/g,"\\'")}')">${esc(m.name||m.moduleId)}</button>`).join('')}

    </div>`;
  }
  return `<button class="gwp-addmod" onclick="gwpStartAddMod('${section}')">＋ 모듈 추가</button>`;
}

async function gwpToggleMulti(id, section, key, val) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  if (!row.d[section]) row.d[section] = {};
  const cur = Array.isArray(row.d[section][key]) ? [...row.d[section][key]] : [];
  const i = cur.indexOf(val);
  if (i >= 0) cur.splice(i, 1); else cur.push(val);
  row.d[section][key] = cur;
  await fetch('/api/applications/' + id, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(row.d)});

}
async function gwpAddMulti(id, section, key) {

// 섹션 접기/펼치기 — DOM 클래스 토글만, 재렌더 없음 (깜빡임 방지, 포커스 유지)
function gwpToggleSection(secId) {
  const isC = gwp.collapsed.has(secId);
  if (isC) gwp.collapsed.delete(secId);
  else gwp.collapsed.add(secId);
  document.querySelectorAll(`#gwp .gwp-sec[data-sec="${secId}"]`).forEach(el => {
    el.classList.toggle('clpsd', !isC);
    const a = el.querySelector(':scope > h5 .col');
    if (a) a.textContent = !isC ? '▶' : '▼';
  });
}
function gwpToggleAll() {
  const all = ['s1','s2','s3','s4','s5','s6','s7','s8','s9','s10','s11','s12'];
  const wasAll = gwp.collapsed.size >= all.length;
  if (wasAll) gwp.collapsed.clear();
  else gwp.collapsed = new Set(all);
  document.querySelectorAll('#gwp .gwp-sec').forEach(el => {
    const id = el.dataset.sec;
    const c = gwp.collapsed.has(id);
    el.classList.toggle('clpsd', c);
    const a = el.querySelector(':scope > h5 .col');
    if (a) a.textContent = c ? '▶' : '▼';
  });
  document.querySelectorAll('#gwp .gwp-toggle-all').forEach(b => b.textContent = wasAll ? '▲ 전체 접기' : '▼ 전체 펼치기');
}

function gwpSec(secId, icon, title, extra, body, span) {
  const c = gwp.collapsed.has(secId);
  const w = span ? ' ' + span : '';
  return `<div class="gwp-sec${c?' clpsd':''}${w}" data-sec="${secId}">
    <h5 onclick="gwpToggleSection('${secId}')"><span class="col">${c?'▶':'▼'}</span>${icon} ${title}${extra?` <span class="sp">${extra}</span>`:''}</h5>
    <div class="gwp-sec-body">${body}</div>
  </div>`;
}

  const s11 = `<div style="display:flex;gap:3px;margin-bottom:3px;flex-wrap:wrap">${gradeChip('A')}${gradeChip('B')}${gradeChip('C')}${gradeChip('D')}<button class="gwp-gc" style="padding:5px 10px;font-size:11px" onclick="setGrade(${id},'');gwpRefresh()">해제</button></div>
  <div class="gwp-g gwp-g4">
    ${gwpEF('자동 점수',id,'final','final_autoScore',fn.final_autoScore,'number')}${gwpEF('수동 점수',id,'final','final_manualScore',fn.final_manualScore,'number')}${gwpEF('평가자',id,'final','final_evaluator',fn.final_evaluator,'text')}${gwpEF('평가일',id,'final','final_evalAt',fn.final_evalAt,'datetime')}
    ${gwpEF('평가 사유',id,'final','final_reason',fn.final_reason,'textarea',null,4)}
  </div>`;

  // 12. 동일인 이력
  const s12 = gwpCrossHtml(x);

  const ivTotSum = interviews.reduce((a, e) => a + (Number(e.total)||(Number(e.score?.communication||0)+Number(e.score?.expertise||0)+Number(e.score?.attitude||0)+Number(e.score?.availability||0))), 0);

  // 12 섹션을 4단 그리드로 배치 (grid-auto-flow: dense로 빈칸 자동 메움)
  return `<div class="gwp-secgrid">${[
    gwpSec('s1','👤','1. 기본 인적사항','', s1, 'w2'),
    gwpSec('s2','🏷️','2. 분류 5축','', s2, 'w2'),
    gwpSec('s3','🎓','3. 학력', x.edu.length?x.edu.length+'':'', grpEdit(x.edu)),
    gwpSec('s4','💼','4. 경력', x.car.length?x.car.length+'':'', grpEdit(x.car)),
    gwpSec('s5','📜','5. 자격', x.qua.length?x.qua.length+'':'', grpEdit(x.qua)),
    gwpSec('s11','🏆','11. 최종', fn.final_grade||'미평가', s11),
    gwpSec('s6','📋','6. Part 1 역할 모듈', x.p1OtherList.length+'모듈', s6, 'w4'),
    gwpSec('s7','📝','7. Part 2', x.p2List.length+'모듈', s7, 'w4'),
    gwpSec('s8','📞','8. 통화 이력', calls.length+'건', s8, 'w2'),
    gwpSec('s9','💬','9. 상담 이력', consults.length+'건', s9, 'w2'),
    gwpSec('s10','🗣️','10. 면접 이력', `${interviews.length}건 · ${ivTotSum}점`, s10, 'w2'),
    gwpSec('s12','📚','12. 동일인 이력', x.others.length?x.others.length+'건':'없음', s12, 'w2')
  ].join('')}</div>`;
}

// ════════════════════════════════════════════════════════════════
// 버전 B/C — A와 동일 content, CSS 변형만 다름 (.gwp-v2 / .gwp-v3 scope)
// ════════════════════════════════════════════════════════════════
function gwpVer2(x) { return gwpVer1(x); }
function gwpVer3(x) { return gwpVer1(x); }

function renderGwp(row) {
  const x = gwpExtract(row);
  const d = row.d;
  const s = siteInfo(d._site);
  const t = templateInfo(d._site, d._formId);
  const formLabel = t ? (t.shortName || t.name) : (d._formId || '-');
  const currentGrade = d.final?.final_grade || '';
  const gradeColors = { A:'#16a34a', B:'#2563eb', C:'#ea580c', D:'#64748b' };
  const gradeBadge = currentGrade
    ? `<span class="gwp-grade" style="background:${gradeColors[currentGrade]};color:#fff">${currentGrade}</span>`
    : '<span class="gwp-grade" style="background:rgba(255,255,255,.1);color:#cbd5e1;border:1px dashed #cbd5e1">미평가</span>';
  const allC = gwp.collapsed.size >= 12;

  const header = `
    <div class="gwp-hd">
      <button class="gwp-toggle-all" onclick="gwpToggleAll()">${allC?'▼ 전체 펼치기':'▲ 전체 접기'}</button>
      <span class="gwp-name">${esc(getName(d))}</span>
      ${gradeBadge}
      <span class="gwp-sub">${s.icon||''} ${esc(s.name||d._site||'')} · ${esc(formLabel)}</span>
      <span class="gwp-meta">
        <span>📞 ${esc(getPhone(d)||'-')}</span>
        <span>✉ ${esc(getEmail(d)||'-')}</span>
        <span>📅 ${esc((row.created_at||'').slice(0,10))}</span>
      </span>
      <button class="gwp-x" onclick="closeGwp()" title="닫기 (Esc)">×</button>
    </div>
    <div class="gwp-tabs">
      <button class="gwp-tab ${gwp.tab==='A'?'a':''}" data-t="A" onclick="gwpSetTab('A')"><span class="ltr">A</span>클래식</button>
      <button class="gwp-tab ${gwp.tab==='B'?'a':''}" data-t="B" onclick="gwpSetTab('B')"><span class="ltr">B</span>카드 모던</button>
      <button class="gwp-tab ${gwp.tab==='C'?'a':''}" data-t="C" onclick="gwpSetTab('C')"><span class="ltr">C</span>미니멀</button>
      <span style="margin-left:auto;align-self:center;font-size:9px;color:#94a3b8;padding-right:4px">동일 구조 · 디자인만 상이</span>
    </div>`;

  document.getElementById('gwp').innerHTML = `
    <div class="gwp-bd" onclick="closeGwp()"></div>
    <div class="gwp-dlg" data-tab="${gwp.tab}">
      ${header}
      <div class="gwp-bd2">
        <div class="gwp-pn gwp-v1" data-pane="A">${gwpVer1(x)}</div>
        <div class="gwp-pn gwp-v2" data-pane="B">${gwpVer2(x)}</div>
        <div class="gwp-pn gwp-v3" data-pane="C">${gwpVer3(x)}</div>
      </div>
    </div>`;
}

// ============================================================
//  RENDER: DASHBOARD 4단 (T3-2-3)
// ============================================================

function renderDashboard(filtered) {
  const grid = document.getElementById('dashGrid');
  // Group by site (primary axis for Sprint)
  const groups = {};
  for (const r of filtered) {
    const key = r.d._site || 'etc';
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  }
  // Pick top 4 sites by count
  const top4 = Object.entries(groups).sort((a,b) => b[1].length - a[1].length).slice(0, 4);
  while (top4.length < 4) top4.push(['(빈)', []]);

  grid.innerHTML = top4.map(([sid, rows]) => {
    const s = siteInfo(sid);
    const byRole = { student:0, instructor:0, expert:0 };
    const byPhase = { part1:0, interview:0, part2:0, final:0 };
    const byGrade = { A:0,B:0,C:0,D:0 };
    for (const r of rows) {
      if (byRole[r.d._role] != null) byRole[r.d._role]++;
      if (byPhase[r.d._phase] != null) byPhase[r.d._phase]++;
      const g = r.d.final?.final_grade;
      if (byGrade[g] != null) byGrade[g]++;
    }
    const recent = rows.slice(0, 5).map(r => {
      const d = r.d;
      const t = templateInfo(d._site, d._formId);
      return `<div class="r">
        <span class="nm">${esc(getName(d))}</span>
        <span style="color:#64748b">${t?t.shortName:''}</span>
        <span class="status ${STATUSES.find(x=>x.id===Number(d._status||0))?.cls||'st-0'}">${STATUSES.find(x=>x.id===Number(d._status||0))?.label||'-'}</span>
      </div>`;
    }).join('');

    return `
      <div class="dq" onclick="focusSite('${sid}')" style="border-top:4px solid ${s.color||'#64748b'}">
        <div class="dq-head">
          <span style="color:${s.color}">${s.icon||''}</span>
          <span style="font-weight:800">${s.name||sid}</span>
          <span class="n">${rows.length}</span>
        </div>
        <div class="dq-stats">
          <span>학생 ${byRole.student}</span>
          <span>강사 ${byRole.instructor}</span>
          <span>전문가 ${byRole.expert}</span>
        </div>
        <div class="dq-stats">
          <span>1부 ${byPhase.part1}</span>
          <span>면접 ${byPhase.interview}</span>
          <span>2부 ${byPhase.part2}</span>
          <span>최종 ${byPhase.final}</span>
        </div>
        <div class="dq-stats">
          <span>A:${byGrade.A}</span>
          <span>B:${byGrade.B}</span>
          <span>C:${byGrade.C}</span>
          <span>D:${byGrade.D}</span>
        </div>
        <div class="dq-recent">${recent || '<div class="r" style="color:#94a3b8">아직 제출 없음</div>'}</div>
      </div>`;
  }).join('');
}

function focusSite(sid) {
  state.filter.site = sid;
  setView('list');
}

// ============================================================
//  ACTIONS
// ============================================================

function toggleExpand(id) {
  if (state.expanded.has(id)) state.expanded.delete(id);
  else state.expanded.add(id);
  rerender();
}

function toggleExpandAll() {
  const allExpanded = state.rows.length > 0 && state.rows.every(r => state.expanded.has(r.id));
  if (allExpanded) {
    state.expanded.clear();
  } else {
    state.expanded = new Set(state.rows.map(r => r.id));
  }
  rerender();
}

async function delRow(id) {
  if (!confirm('삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
  await fetch('/api/applications/' + id, { method:'DELETE' });
  state.rows = state.rows.filter(r => r.id !== id);
  rerender();
}

async function saveMemo(id, text) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  row.d._notes = text;
  await fetch('/api/applications/' + id, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(row.d)
  });
}

// 비고 셀 — 파일 첨부
async function attachMemoFile(id, btn) {
  const input = document.createElement('input');
  input.type = 'file';
  input.style.display = 'none';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = '⏳ 업로드…';
    try {
      const presignRes = await fetch('/api/upload/presign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filename: file.name,
          contentType: file.type || 'application/octet-stream',
          folder: 'notes/' + id
        })
      });
      const presign = await presignRes.json();
      if (!presign.uploadUrl) throw new Error('presign 실패');
      await fetch(presign.uploadUrl, {
        method: 'PUT',
        headers: { 'Content-Type': file.type || 'application/octet-stream' },
        body: file
      });
      const row = state.rows.find(r => r.id === id);
      if (!row) return;
      if (!Array.isArray(row.d._notesFiles)) row.d._notesFiles = [];
      row.d._notesFiles.push({ name: file.name, url: presign.fileUrl });
      await fetch('/api/applications/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(row.d)
      });
      rerender();
    } catch (e) {
      console.error('[attachMemoFile]', e);
      alert('파일 업로드 실패: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = orig;
    }
  };
  document.body.appendChild(input);
  input.click();
  setTimeout(() => input.remove(), 60000);
}

async function removeMemoFile(id, idx) {
  if (!confirm('이 파일을 비고에서 제거하시겠습니까?')) return;
  const row = state.rows.find(r => r.id === id);
  if (!row || !Array.isArray(row.d._notesFiles)) return;
  row.d._notesFiles.splice(idx, 1);
  await fetch('/api/applications/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(row.d)
  });
  rerender();
}

async function saveNested(id, section, key, value) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  if (!row.d[section]) row.d[section] = {};
  row.d[section][key] = value;
  await fetch('/api/applications/' + id, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(row.d)
  });
}

async function saveScore(id, key, value) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  if (!row.d.interview) row.d.interview = {};
  if (!row.d.interview.score) row.d.interview.score = {};
  row.d.interview.score[key] = Number(value);
  const sc = row.d.interview.score;
  row.d.interview.total = (Number(sc.communication||0)+Number(sc.expertise||0)+Number(sc.attitude||0)+Number(sc.availability||0));
  await fetch('/api/applications/' + id, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(row.d)
  });
  rerender();
}

async function setStatus(id, status) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  row.d._status = status;
  await fetch('/api/applications/' + id, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(row.d)
  });
  rerender();
}

async function setPhase(id, phase) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  row.d._phase = phase;
  await fetch('/api/applications/' + id, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(row.d)
  });
  rerender();
}

async function setGrade(id, grade) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  if (!row.d.final) row.d.final = {};
  row.d.final.final_grade = grade || null;
  row.d.final.final_evalAt = new Date().toISOString().slice(0,16);
  if (grade) { row.d._status = 4; row.d._phase = 'final'; }
  await fetch('/api/applications/' + id, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(row.d)
  });
  rerender();
}

function sendPart2Link(id) {
  const row = state.rows.find(r => r.id === id);
  if (!row) return;
  const formId = (row.d._formId || '').replace('_part1', '_part2');
  const link = `${location.origin}/apply.html?site=${row.d._site}&form=${formId}&id=${id}`;
  prompt('이 URL을 지원자에게 발송하세요:', link);
}

// ============================================================
//  VIEW CONTROL + RERENDER
// ============================================================

function setView(v) {
  state.view = v;
  document.getElementById('viewList').classList.toggle('a', v === 'list');
  document.getElementById('viewDash').classList.toggle('a', v === 'dash');
  document.getElementById('listView').hidden = (v !== 'list');
  document.getElementById('dashView').hidden = (v !== 'dash');
  rerender();
}

function rerender() {
  const filtered = applyFilters(state.rows);
  const sorted = sortRows(filtered);   // 기본 정렬 적용 (접수일 desc)
  renderFilters();
  renderSumBar(sorted);
  if (state.view === 'list') renderList(sorted);
  else renderDashboard(sorted);
}

// ============================================================
//  UTIL
// ============================================================

function esc(v) {
  if (v == null) return '';
  return String(v).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================
//  INIT
// ============================================================

// URL 의 filter_<axis>=<value> 쿼리를 읽어 state.filter 에 적용
function applyUrlFilters() {
  const params = new URLSearchParams(location.search);
  for (const [k, v] of params) {
    if (!k.startsWith('filter_')) continue;
    const axis = k.slice(7);
    if (!(axis in state.filter)) continue;
    if (Array.isArray(state.filter[axis])) {
      if (!state.filter[axis].includes(v)) state.filter[axis].push(v);
    } else if (axis === 'status') {
      state.filter[axis] = Number(v);
    } else {
      state.filter[axis] = v;
    }
  }
}

(async function init() {
  try {
    applyUrlFilters();
    await loadAll();
    rerender();
  } catch (e) {
    console.error(e);
    document.getElementById('listView').innerHTML = `<div class="tbl"><div class="empty">데이터 로드 실패: ${esc(e.message)}</div></div>`;
  }
})();
</script>
