<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Work Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font:12px/1.4 'Noto Sans KR',sans-serif;background:#f2f3f7;color:#333}
/* Login */
.lo{position:fixed;inset:0;background:#222;z-index:1000;display:flex;align-items:center;justify-content:center}
.lb{background:#fff;padding:40px;border-radius:12px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lb h2{font-size:20px;color:#222;margin-bottom:6px}
.lb p{font-size:11px;color:#888;margin-bottom:20px}
.lb input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:10px;outline:none}
.lb input:focus{border-color:#0088ff}
.lb button{width:100%;padding:10px;background:#0088ff;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.lb button:hover{background:#006fcc}
.le{color:#c00;font-size:11px;margin-top:6px;display:none}
.lh{font-size:10px;color:#aaa;margin-top:12px}
/* App — sidebar + main */
.app{display:none}.app.v{display:flex;height:100vh}
/* Sidebar */
.sb{width:56px;background:#222;display:flex;flex-direction:column;flex-shrink:0;z-index:20}
.sb-top{height:56px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #333}
.sb-logo{width:32px;height:32px;background:#0088ff;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.sb-nav{flex:1;padding:8px 0;display:flex;flex-direction:column;gap:2px}
.sb-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 0;cursor:pointer;color:#888;transition:.15s;position:relative}
.sb-item:hover{color:#fff}
.sb-item.a{color:#0088ff}
.sb-item.a::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;background:#0088ff;border-radius:0 2px 2px 0}
.sb-item svg{width:20px;height:20px}
.sb-item span{font-size:8px;letter-spacing:-.3px}
.sb-bot{padding:8px 0;border-top:1px solid #333;display:flex;flex-direction:column;align-items:center;gap:4px}
.sb-user{font-size:8px;color:#888;text-align:center;max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Main area */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
header{background:#fff;border-bottom:1px solid #e3e5ed;padding:0 20px;height:42px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header .bc{font-size:12px;color:#888}.bc b{color:#222;font-weight:600}
.hr{display:flex;align-items:center;gap:12px;font-size:11px}
.hr button{padding:3px 10px;background:#eceef2;border:none;color:#555;border-radius:4px;font-size:10px;cursor:pointer}
.hr button:hover{background:#d8dae2}
/* Nav chip bar */
.nav-bar{background:#fff;border-bottom:1px solid #e3e5ed;padding:6px 20px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.nav-bar .nav-lbl{font-size:11px;color:#888;margin-right:4px;flex-shrink:0}
.nav-sep{width:1px;height:16px;background:#ddd;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;transition:all .15s;white-space:nowrap}
.chip:hover{background:#f5f5f5}
.chip.a{background:#222;color:#fff;border-color:#222}
.chip .cc{font-size:10px;opacity:.6}
/* Sub nav */
.sub-nav{background:#fafbfc;border-bottom:1px solid #e3e5ed;padding:4px 20px;display:none;align-items:center;gap:4px;flex-shrink:0;flex-wrap:wrap}
.sub-nav.v{display:flex}
.sub-chip{padding:3px 10px;border-radius:3px;font-size:10px;cursor:pointer;border:1px solid #e3e5ed;background:#fff;color:#555}
.sub-chip:hover{background:#f0f4ff}
.sub-chip.a{background:#0088ff;color:#fff;border-color:#0088ff}
/* Main content */
.mn{flex:1;overflow:hidden;display:flex;flex-direction:column}
.ca{flex:1;overflow-y:auto;padding:16px 20px}
/* Tags */
.rit{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;background:#f0f4ff;color:#0088ff;white-space:nowrap}
/* List */
.ct{background:#fff;border-radius:6px;border:1px solid #eee}
.tl{padding:6px 12px;border-bottom:1px solid #eee;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tl input[type=text]{padding:4px 8px;border:1px solid #ddd;border-radius:3px;font-size:11px;width:160px}
.tl select{padding:4px 6px;border:1px solid #ddd;border-radius:3px;font-size:10px}
.tl button{padding:3px 10px;border:1px solid #ddd;border-radius:3px;background:#fff;font-size:10px;cursor:pointer}
.tl button:hover{background:#f0f0f0}
.tl .db{color:#c00;border-color:#c00}.tl .db:hover{background:#fff0f0}
.tl .ab{background:#0088ff;color:#fff;border-color:#0088ff}
.tl .cnt{font-size:10px;background:#e8ecf0;padding:1px 6px;border-radius:8px;font-weight:600}
.tw{overflow-x:auto;max-height:calc(100vh - 220px);overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{text-align:left;padding:7px 8px;background:#f8fafc;border-bottom:2px solid #e3e5ed;font-weight:600;color:#555;position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:#f0f4ff}
thead th .si{font-size:8px;color:#0088ff;margin-left:2px}
tbody tr{border-bottom:1px solid #f0f0f0;cursor:pointer}
tbody tr:nth-child(even){background:#fafbfc}
tbody tr:hover{background:#f0f4ff}
tbody td{padding:6px 8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb{width:14px;height:14px;cursor:pointer;accent-color:#0088ff}
.bid{font-family:monospace;font-size:9px;background:#f0f0f0;padding:0 4px;border-radius:2px}
.bn{font-size:9px;background:#fed7d7;color:#c53030;padding:0 3px;border-radius:2px;font-weight:700;margin-left:3px}
.bs{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:600}
.bs.s0{background:#fff3cd;color:#856404}.bs.s1{background:#d4edda;color:#155724}.bs.s2{background:#e3e5ed;color:#555}
.em{padding:30px;text-align:center;color:#999}
/* Pagination */
.pg{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid #eee}
.pg-info{font-size:10px;color:#888}
.pg-info b{color:#0088ff}
.pg-btns{display:flex;gap:2px}
.pg-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;border:1px solid #ddd;border-radius:3px;background:#fff;color:#666;cursor:pointer}
.pg-btn:hover{background:#f0f0f0}
.pg-btn.a{background:#222;color:#fff;border-color:#222}
.pg-btn:disabled{opacity:.3;cursor:default}
/* Detail */
.dr{background:#f8fafc}
.dr td{padding:10px 16px}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:10px;color:#888}
.dh button{padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer;border:1px solid #ddd;background:#fff}
.dh .eb{color:#0088ff;border-color:#0088ff}.dh .sv{background:#16a34a;color:#fff;border-color:#16a34a;display:none}
.dh .cl{display:none}.dh .xb{color:#c00;border-color:#c00}
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.di{font-size:11px;padding:4px 0;border-bottom:1px solid #f0f0f0}
.di .lbl{font-size:9px;color:#888;font-weight:600}.di .val{margin-top:1px;line-height:1.4;word-break:break-word;white-space:normal}
.di input{display:none;width:100%;padding:3px 6px;border:1px solid #ccc;border-radius:3px;font-size:11px;margin-top:2px}
/* Memo */
.memo-wrap{margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.memo-wrap textarea{width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:11px;resize:none;height:50px}
.memo-wrap button{margin-top:4px;padding:3px 10px;background:#0088ff;color:#fff;border:none;border-radius:3px;font-size:10px;cursor:pointer}
/* Add form */
#addF{margin-bottom:12px;background:#fff;border-radius:6px;border:1px solid #eee;padding:12px;display:none}
#addF .af-title{font-size:12px;font-weight:700;margin-bottom:8px}
#addF .af-site-bar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
#addF .af-cat{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
#addF .af-cat-tree{margin-bottom:10px;font-size:11px}
#addF .af-cat-tree .at-big{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#555;margin:2px}
#addF .af-cat-tree .at-big.a{background:#0088ff;color:#fff;border-color:#0088ff}
#addF .af-cat-tree .at-mid{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;cursor:pointer;border:1px solid #e3e5ed;background:#f8fafc;color:#555;margin:2px}
#addF .af-cat-tree .at-mid.a{background:#2563eb;color:#fff;border-color:#2563eb}
#addF .af-cat-tree .at-sm{display:inline-block;padding:1px 6px;border-radius:2px;font-size:9px;cursor:pointer;border:1px solid #eee;background:#fff;color:#888;margin:1px}
#addF .af-cat-tree .at-sm.a{background:#059669;color:#fff;border-color:#059669}
#addF .af-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
#addF label{font-size:9px;font-weight:700;color:#555;display:block;margin-bottom:2px}
#addF input,#addF select,#addF textarea{width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:11px}
#addF .af-btns{margin-top:8px;display:flex;gap:6px}
#addF .af-btns button{padding:6px 16px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:none}
#addF .af-section{font-size:10px;font-weight:700;color:#0088ff;margin:10px 0 4px;padding-bottom:3px;border-bottom:1px solid #f0f4ff}
/* Actions & Icons */
.acts{white-space:nowrap;text-align:center}
.ic{cursor:pointer;padding:1px 4px;border-radius:2px;font-size:13px;opacity:.5;transition:.1s}
.ic:hover{opacity:1;background:#f0f4ff}
.sc{color:#16a34a}.sc:hover{background:#dcfce7}
.xc:hover{background:#fff0f0}
.em-on{background:#0088ff!important;color:#fff!important;border-color:#0088ff!important}
.emi{font-size:11px!important}
/* Quadrant Dashboard — 4 columns */
.qd{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:0}
.qc{background:#fff;border-radius:6px;border:1px solid #e3e5ed;display:flex;flex-direction:column;min-height:180px;max-height:calc(50vh - 60px);overflow:hidden}
.qh{padding:6px 10px;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.qh-title{font-size:11px;font-weight:800;display:flex;align-items:center;gap:5px}
.qh-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.qh-counts{display:flex;gap:3px}
.qh-cnt{font-size:8px;padding:1px 5px;border-radius:8px;font-weight:700;background:#f0f0f0;color:#555}
.qb{overflow-y:auto;flex:1}
.qr{display:grid;grid-template-columns:64px 1fr 44px 40px 52px;align-items:center;padding:3px 6px;border-bottom:1px solid #f5f5f5;font-size:10px;cursor:pointer;gap:3px}
.qr:hover{background:#f8fafc}
.qt{font-size:8px;font-weight:700;padding:1px 4px;border-radius:2px;color:#fff;white-space:nowrap;text-align:center}
.qn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qd-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:6px 12px;background:#fff;border-radius:6px;border:1px solid #e3e5ed;margin-bottom:8px}
.qd-stat{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600}
.qd-num{font-size:16px;font-weight:900;color:#0088ff}
.qd-lbl{font-size:9px;color:#888;font-weight:600}
.qd-sep{width:1px;height:24px;background:#e3e5ed}

/* ── 홈 (rD) 컴팩트 ── */
.hm-stats{display:flex;gap:4px;align-items:center;flex-wrap:wrap;padding:5px 8px;background:#fff;border-radius:5px;border:1px solid #e3e5ed;margin-bottom:6px}
.hm-st{display:flex;flex-direction:column;align-items:center;padding:3px 8px;cursor:pointer;border-radius:3px;transition:.1s;min-width:38px}
.hm-st:hover{background:#f1f5f9}
.hm-st b{font-size:14px;font-weight:900;color:#1a365d;line-height:1}
.hm-st span{font-size:9px;color:#64748b;font-weight:600;margin-top:1px}
.hm-st.hm-hot b{color:#dc2626}
.hm-sep{width:1px;height:22px;background:#e3e5ed;margin:0 2px}
.hm-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
.hm-card{background:#fff;border:1px solid #e3e5ed;border-radius:5px;padding:6px 10px;cursor:pointer;transition:.15s}
.hm-card:hover{border-color:#1a365d;box-shadow:0 2px 4px rgba(26,54,93,.08)}
.hm-lbl{font-size:9px;color:#888;font-weight:700}
.hm-num{font-size:18px;font-weight:900;line-height:1.1;margin:1px 0}
.hm-num span{font-size:10px;color:#888;font-weight:400;margin-left:3px}
.hm-sub{font-size:9px;color:#aaa}
.hm-q4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.hm-qcard{background:#fff;border:1px solid #e3e5ed;border-radius:5px;padding:6px 8px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;min-height:170px}
.hm-qcard:hover{border-color:#1a365d;box-shadow:0 2px 6px rgba(26,54,93,.1);transform:translateY(-1px)}
.hm-qempty-card{cursor:default;color:#cbd5e1;text-align:center;padding-top:60px;font-size:11px}
.hm-qhead{display:flex;align-items:center;justify-content:space-between;padding-bottom:4px;border-bottom:1px solid #f1f5f9;margin-bottom:4px;font-size:11px}
.hm-qcnt{font-size:13px;font-weight:900;color:#1a365d}
.hm-qrows{display:flex;flex-direction:column;gap:1px}
.hm-qrow{display:grid;grid-template-columns:1fr 32px 22px 32px;gap:3px;align-items:center;padding:2px 4px;font-size:10px;border-bottom:1px dashed #f1f5f9;cursor:pointer}
.hm-qrow:hover{background:#f8fafc}
.hm-qnm{font-weight:700;color:#1f2937;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hm-qph{font-size:8px;padding:1px 4px;border-radius:2px;background:#e0e7ff;color:#3730a3;text-align:center;font-weight:700}
.hm-qst{font-size:9px;font-weight:700;text-align:center;border-radius:2px;padding:1px 0}
.hm-qst-0{background:#fee2e2;color:#991b1b}
.hm-qst-1{background:#fef3c7;color:#92400e}
.hm-qst-2{background:#ddd6fe;color:#5b21b6}
.hm-qst-3{background:#bfdbfe;color:#1e40af}
.hm-qst-4{background:#bbf7d0;color:#14532d}
.hm-qdt{font-size:9px;color:#94a3b8;text-align:right}
.hm-qempty{padding:14px 0;text-align:center;color:#cbd5e1;font-size:10px}
/* Stats */
.st-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.st-card{background:#fff;border-radius:8px;border:1px solid #e3e5ed;padding:12px}
.st-card .st-label{font-size:10px;color:#888;font-weight:600}
.st-card .st-val{font-size:22px;font-weight:900;margin-top:2px}
.st-card .st-sub{font-size:9px;color:#aaa;margin-top:2px}
.st-dist{background:#fff;border-radius:8px;border:1px solid #e3e5ed;padding:12px}
.st-dist h4{font-size:12px;font-weight:700;color:#222;margin-bottom:8px}
.st-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.st-bar-row .st-bar-lbl{font-size:10px;color:#555;width:70px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.st-bar-row .st-bar-bg{flex:1;height:14px;background:#eceef2;border-radius:7px;overflow:hidden}
.st-bar-row .st-bar-fill{height:100%;border-radius:7px;transition:width .3s}
.st-bar-row .st-bar-cnt{font-size:10px;color:#222;width:28px;text-align:right}
.st-bar-row .st-bar-pct{font-size:9px;color:#999;width:32px;text-align:right}
/* Content tabs */
.ct-tabs{display:flex;gap:0;margin-bottom:12px}
.ct-tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #e3e5ed;background:#fff;color:#888}
.ct-tab:first-child{border-radius:6px 0 0 6px}.ct-tab:last-child{border-radius:0 6px 6px 0}
.ct-tab.a{background:#0088ff;color:#fff;border-color:#0088ff}
/* ── 분류 선택기 패널 (3열 캐스케이드) ── */
.clf-panel{display:flex;gap:0;border:1px solid #e3e5ed;border-radius:8px;background:#fff;overflow:hidden;margin-bottom:10px}
.clf-col{flex:1;min-width:0;border-right:1px solid #e3e5ed;padding:8px 0}
.clf-col:last-child{border-right:none}
.clf-col-title{font-size:10px;font-weight:700;color:#0088ff;padding:0 10px 6px;border-bottom:1px solid #f0f4ff;margin-bottom:4px}
.clf-sub{padding:0 6px;margin-bottom:4px}
.clf-sub-title{font-size:9px;font-weight:700;color:#7c3aed;padding:3px 4px;margin-bottom:2px}
.clf-item{padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px;margin:1px 4px;color:#555;transition:.1s}
.clf-item:hover{background:#f0f4ff;color:#0088ff}
.clf-item.a{background:#0088ff;color:#fff;font-weight:600}
.clf-item.a:hover{background:#006fcc}
.clf-placeholder{padding:6px 10px;font-size:10px;color:#bbb;font-style:italic}
/* ── 문제 등록/상세 ── */
.ct-dr{background:#f8fafc}
.ct-dr td{padding:12px 16px}
.ct-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;font-size:10px;color:#888;flex-wrap:wrap}
.ct-meta .rit{margin-right:2px}
.ct-acts{display:flex;gap:4px;margin-left:auto}
.ct-acts button{padding:3px 10px;border-radius:3px;font-size:10px;cursor:pointer;border:1px solid #ddd;background:#fff}
.ct-acts .ct-edit{color:#0088ff;border-color:#0088ff}
.ct-acts .ct-del{color:#c00;border-color:#c00}
.ct-detail{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ct-di{font-size:11px;padding:5px 0;border-bottom:1px solid #f0f0f0}
.ct-di.sp2{grid-column:span 2}.ct-di.sp3{grid-column:span 3}.ct-di.sp4{grid-column:span 4}
.ct-di .ct-lbl{font-size:9px;color:#888;font-weight:600}
.ct-di .ct-val{margin-top:2px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.ct-di input,.ct-di textarea{display:none;width:100%;padding:4px 6px;border:1px solid #ccc;border-radius:3px;font-size:11px;margin-top:2px}
.ct-di textarea{resize:vertical;min-height:50px}
/* 문제 미리보기 */
.q-preview{background:#fff;border:1px solid #e3e5ed;border-radius:6px;padding:12px;margin-top:6px}
.q-preview .q-passage{background:#f8fafc;padding:8px 10px;border-radius:4px;font-size:11px;line-height:1.6;margin-bottom:8px;border-left:3px solid #7c3aed}
.q-preview .q-text{font-size:12px;font-weight:600;margin-bottom:8px;line-height:1.5}
.q-preview .q-choice{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;border-radius:4px;font-size:11px;margin-bottom:3px}
.q-preview .q-choice:hover{background:#f5f5f5}
.q-preview .q-choice.correct{background:#dcfce7;font-weight:600}
.q-preview .q-choice .q-num{font-weight:700;color:#7c3aed;flex-shrink:0;width:16px}
.q-preview .q-answer{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}
.q-preview .q-answer.ox-o{background:#dcfce7;color:#16a34a}.q-preview .q-answer.ox-x{background:#fee2e2;color:#dc2626}
.q-preview .q-explain{margin-top:8px;padding:8px;background:#fffbeb;border-radius:4px;font-size:10px;line-height:1.5;border-left:3px solid #d97706}
/* 보기 입력 필드 */
.q-choices-input{margin-top:4px}
.q-choice-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.q-choice-row .q-num{font-size:11px;font-weight:700;color:#7c3aed;width:14px;flex-shrink:0}

<script>
// ═══ Auth ═══
const U={admin:{pw:"admin",n:"관리자",r:"admin"},staff:{pw:"staff",n:"직원",r:"staff"}};
function doL(){const i=lid.value,p=lpw.value,u=U[i];if(u&&u.pw===p){sessionStorage.ws=JSON.stringify({i,...u});sA()}else le.style.display="block"}
function doLO(){sessionStorage.removeItem("ws");location.reload()}
function sA(){lo.style.display="none";app.classList.add("v");const u=JSON.parse(sessionStorage.ws);ui.textContent=u.n;init()}
function goHome(){cT=null;cSite=null;sv('d')}

// ═══ 분류표 상수 ═══

// C홈페이지 — 상단 네비게이션 (기존 사이드바 대체)
const SITES=[
{id:"trans",label:"번역",color:"#2563eb",bg:"#eff6ff",tables:["translation_contacts","translation_quotes","translation_translators","translation_integrated","translation_experts","translation_orders"]},
{id:"reading",label:"통독문서",color:"#059669",bg:"#ecfdf5",tables:["classic_inquiries","classic_specialist_apps"]},
{id:"edu",label:"교육",color:"#7c3aed",bg:"#f5f3ff",tables:["level_test_submissions"]},
{id:"exam",label:"시험",color:"#d97706",bg:"#fffbeb",tables:["cbt_results"]},
{id:"ethics",label:"윤리",color:"#dc2626",bg:"#fef2f2",tables:["aiethics_applications"]},
{id:"exhibit",label:"전시회",color:"#0891b2",bg:"#ecfeff",tables:[]},
{id:"match",label:"전문가매칭",color:"#9333ea",bg:"#faf5ff",tables:[]},
{id:"etc",label:"그외",color:"#64748b",bg:"#f8fafc",tables:["story_posts","applications"]},
{id:"tesol_apps",label:"TESOL지원",color:"#be185d",bg:"#fdf2f8",tables:["tesol_expert_applications"]},
];

// ═══ 분류표 데이터 — /api/definitions/ 에서 로드 (단일 소스) ═══
let FIELDS={},LEVELS={},EXAM_DOMAINS=[],GROUPS={},GRADES=[],DEF_SITES={};

let SITE_ICONS={};
async function loadDefinitions(){
try{
const[fld,lvl,dep,rol,sit]=await Promise.all([
f("/api/definitions/fields"),f("/api/definitions/levels"),
f("/api/definitions/departments"),f("/api/definitions/roles"),
f("/api/definitions/sites").catch(()=>({websites:[]}))]);
FIELDS=fld.tree||{};
LEVELS={};(lvl.domains||[]).forEach(d=>{LEVELS[d]={};(lvl.divisions||[]).forEach(div=>{LEVELS[d][div]=lvl.grades[div]||[]})});
EXAM_DOMAINS=lvl.domains||[];
GROUPS={'부서':dep.departments||[],'팀':dep.teams||{}};
GRADES=(rol.roles||[]).map(r=>r.label);
SITE_ICONS={};(sit.websites||[]).forEach(s=>{SITE_ICONS[s.id]={icon:s.icon||'',color:s.color||'#64748b',name:s.name||s.id}});
}catch(e){console.error("분류표 로딩 실패, fallback 사용:",e);
// fallback — 서버 연결 실패 시
FIELDS={'문서':{'비즈니스':['사업계획서','회사소개','PPT','엑셀','기획서']},'음성':{},'영상/SNS':{},'IT/개발':{},'창의적활동':{},'번역':{},'프롬프트':{},'확장영역':{}};
EXAM_DOMAINS=['TESOL','AI번역','AI프롬프트','AI윤리','ITT정통번역'];
LEVELS={};EXAM_DOMAINS.forEach(d=>{LEVELS[d]={'교육':[1,2,3,4,5,6,7,8],'비즈니스':[1,2,3],'전문':[1,2]}});
GROUPS={'부서':['기획','홈페이지','영업','마케팅','회계','인사','관리','상담','총무','개발','그외']};
GRADES=['알바','신입','강사','팀장','개발','외부','임원','대표'];
}}

// ═══ 통합 분류 선택기 (재사용 모듈) ═══
// renderClassifier(containerId, options) → 어디서든 호출 가능
// options: { showField:true, showLevel:true, showDomain:true, onChange:fn, prefix:'ct' }
function renderClassifier(containerId, opts={}){

if(opts.showDomain!==false||opts.showLevel!==false){

if(opts.showLevel!==false){
const divs=vals.domain?Object.keys(LEVELS[vals.domain]||{}):['교육','비즈니스','전문'];
const grades=vals.domain&&vals.division?(LEVELS[vals.domain]||{})[vals.division]||[]:[];
h+=`<div><label style="font-size:9px;font-weight:700;color:#555;display:block;margin-bottom:2px">구분</label>
<select data-clf="division" onchange="clfChange('${containerId}','${px}')" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:11px">

h+=`<div><label style="font-size:9px;font-weight:700;color:#555;display:block;margin-bottom:2px">급수</label>
<select data-clf="grade" onchange="clfChange('${containerId}','${px}')" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:11px">

// A소재 대중소
if(opts.showField!==false){

<select data-clf="fieldBig" onchange="clfChange('${containerId}','${px}')" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:11px">
<option value="">선택</option>${bigKeys.map(k=>`<option value="${k}" ${vals.fieldBig===k?"selected":""}>${k}</option>`).join("")}</select></div>`;
if(midKeys.length){
h+=`<div><label style="font-size:9px;font-weight:700;color:#555;display:block;margin-bottom:2px">중분류</label>
<select data-clf="fieldMid" onchange="clfChange('${containerId}','${px}')" style="padding:5px 8px;border:1px solid #ddd;border-radius:4px;font-size:11px">

<option value="">선택</option>${smKeys.map(k=>`<option value="${k}" ${vals.fieldSm===k?"selected":""}>${k}</option>`).join("")}</select></div>`}
h+=`</div>`}

el.innerHTML=h}

// 레거시 템플릿 여부 판정 — *_part1 / *_part2 / teacher_apply / translator / expert (C1-C4 이전 이름)
function isLegacyTpl(t){return /(_part[12]|^teacher_apply$|^translator$|^expert$)/.test(t._formId||'')}

// 레거시 category → roleGroup/role 변환 (메모리 상 마이그레이션)
function migrateModule(m){
if(m.roleGroup&&m.role)return m;
m._legacyMigrated=true;
const cat=m.category||"common";
if(cat==="common"){m.roleGroup="common";m.role="common"}
else if(cat==="student"){m.roleGroup="user";m.role="student"}
else if(cat==="instructor"){m.roleGroup="expert";m.role="instructor"}
else if(cat==="expert"){m.roleGroup="expert";m.role="specialist"}
else if(cat==="internal"){m.roleGroup="admin";m.role="admin"}
else if(cat==="specialty"){
if(m.moduleId.includes("teacher")){m.roleGroup="expert";m.role="instructor"}
else if(m.moduleId.includes("translation")){m.roleGroup="expert";m.role="translator"}
else if(m.moduleId.includes("expert")){m.roleGroup="expert";m.role="specialist"}
else if(m.moduleId.includes("course")){m.roleGroup="user";m.role="student"}
else if(m.moduleId.includes("quote")||m.moduleId.includes("client")){m.roleGroup="user";m.role="client"}
else{m.roleGroup="expert";m.role="specialist"}
}else{m.roleGroup="common";m.role="common"}
return m;
}
// 레거시 template.modules → phases 변환 (메모리 상). _legacyMigrated 플래그로 영속화 필요 표시
function migrateTemplate(t){
if(t.phases&&(Array.isArray(t.phases.part1)||Array.isArray(t.phases.part2))){
// 이미 phases 구조면 추가 검증: part1 오직 legacy _phase='part1'이고 modules도 남아있다면 병합
if(Array.isArray(t.modules)&&t.modules.length&&t.phases.part1.length===0&&t.phases.part2.length===0){
t.phases={part1:t.modules.slice(),part2:[]};
delete t.modules;
t._legacyMigrated=true;
}
return t;
}
t.phases={part1:Array.isArray(t.modules)?t.modules.slice():[],part2:[]};
delete t.modules;
t._legacyMigrated=true;
return t;
}

async function loadFormTemplates(){
// Load modules
let mRows=await f("/api/form_modules");
ftModules=mRows.map(r=>migrateModule({id:r.id,...JSON.parse(r.data)}));
// Seed modules if empty
if(!ftModules.length){
for(const mod of DEFAULT_MODULES)await fetch("/api/form_modules",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(mod)});
mRows=await f("/api/form_modules");ftModules=mRows.map(r=>migrateModule({id:r.id,...JSON.parse(r.data)}));
}
// Rev-based upsert: 신규 모듈은 POST, 기존 모듈은 _rev가 낮으면 PUT로 교체
let dirty=false;
for(const mod of DEFAULT_MODULES){
const existing=ftModules.find(m=>m.moduleId===mod.moduleId);
if(!existing){
await fetch("/api/form_modules",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(mod)});
dirty=true;
}else if((existing._rev||0)<(mod._rev||0)){
const{id,...data}=mod;
await fetch(`/api/form_modules/${existing.id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
dirty=true;
}
}
if(dirty){mRows=await f("/api/form_modules");ftModules=mRows.map(r=>migrateModule({id:r.id,...JSON.parse(r.data)}))}
// Load templates
let tRows=await f("/api/form_templates");
ftTemplates=tRows.map(r=>migrateTemplate({id:r.id,...JSON.parse(r.data)}));
// Seed templates if empty
if(!ftTemplates.length){
for(const tpl of DEFAULT_TEMPLATES)await fetch("/api/form_templates",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(tpl)});
tRows=await f("/api/form_templates");ftTemplates=tRows.map(r=>migrateTemplate({id:r.id,...JSON.parse(r.data)}));
}
// 템플릿 rev-upsert + moduleId alias 자동 교체 (레거시 참조 치유)
dirty=false;
function rewriteIds(mids){
let changed=false;
const out=(mids||[]).map(mid=>{if(MODULE_ID_ALIASES[mid]){changed=true;return MODULE_ID_ALIASES[mid]}return mid});
return {out,changed};
}
for(const tpl of DEFAULT_TEMPLATES){
const existing=ftTemplates.find(t=>t._site===tpl._site&&t._formId===tpl._formId);
if(!existing){
await fetch("/api/form_templates",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(tpl)});
dirty=true;
}else if((existing._rev||0)<(tpl._rev||0)){
await fetch(`/api/form_templates/${existing.id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(tpl)});
dirty=true;
}
}
// 모든 템플릿(기본 + 사용자 생성)의 moduleId 레거시 참조 치환 + 레거시 modules→phases 영속화
for(const t of ftTemplates){
if(!t.phases){t.phases={part1:[],part2:[]};t._legacyMigrated=true}
const r1=rewriteIds(t.phases.part1);
const r2=rewriteIds(t.phases.part2);
if(r1.changed||r2.changed){t.phases.part1=r1.out;t.phases.part2=r2.out;t._legacyMigrated=true}
if(t._legacyMigrated){
// 모든 기존 키 보존하며 phases로 영속화. modules는 제거.
const{id,_legacyMigrated,...rest}=t;
delete rest.modules;
rest.phases=t.phases;
await fetch(`/api/form_templates/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(rest)});
dirty=true;
}
}
// 레거시 모듈도 동일하게 — migrateModule이 _legacyMigrated 플래그 세팅
for(const m of ftModules){
if(m._legacyMigrated){
const{id,_legacyMigrated,...rest}=m;
await fetch(`/api/form_modules/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(rest)});
dirty=true;
}
}
if(dirty){
tRows=await f("/api/form_templates");
ftTemplates=tRows.map(r=>migrateTemplate({id:r.id,...JSON.parse(r.data)}));
mRows=await f("/api/form_modules");
ftModules=mRows.map(r=>migrateModule({id:r.id,...JSON.parse(r.data)}));
}
}

function getModule(modId){return ftModules.find(m=>m.moduleId===modId)}
function assembleForm(tpl,phase){
const sections=[];
const mods=(tpl.phases&&tpl.phases[phase])||[];
for(const modId of mods){const mod=getModule(modId);if(mod)sections.push({...mod})}
if(phase==='part1'&&tpl.extraFields&&tpl.extraFields.length)sections.push({moduleId:"_extra",name:"추가 항목",roleGroup:"common",role:"common",category:"extra",fields:tpl.extraFields});
return sections;
}
// 모듈 내 모든 필드(계층 포함)를 평탄화 — 필드 수 계산용
function countFieldsDeep(fields){
let n=0;
for(const f of(fields||[])){n++;if(f.children&&f.children.length)n+=countFieldsDeep(f.children)}
return n;
}

function ftAddForm(siteId){

const fid=name.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_가-힣]/g,"");

if(!ftData.phases)ftData.phases={part1:[],part2:[]};
const w=WEBSITES.find(x=>x.id===ftSite);
const p1=assembleForm(ftData,'part1'),p2=assembleForm(ftData,'part2');

<span style="margin-left:auto;font-size:10px;color:#888">${w?w.name:""} › ${ftData.name} · 1부 ${p1.length}모듈 · 2부 ${p2.length}모듈 · 총 ${totalFields}필드</span></div>`;

h+=`<div style="margin-bottom:10px;display:flex;gap:12px;align-items:end;flex-wrap:wrap">
<div><label style="font-size:10px;font-weight:600;color:#555">신청서 이름</label>
<input value="${eh(ftData.name)}" onchange="ftData.name=this.value" style="padding:4px 8px;border:1px solid #ddd;border-radius:3px;font-size:12px;font-weight:700;width:250px"/></div>

// ── 1부/2부 통합 편집 (2개 phase 블록) ──

const mids=ftData.phases[phase]||[];
h+=`<div class="phase-block">

<span style="color:${phColor}">${phLbl} 모듈 구성</span>
<span style="color:#888;font-weight:400;font-size:10px">${secs.length}모듈 · ${secs.reduce((s,sec)=>s+countFieldsDeep(sec.fields),0)}필드</span></h4>`;
// 포함된 모듈 칩
h+=`<div class="phase-mod-chips">`;
if(!mids.length)h+=`<span style="font-size:9px;color:#94a3b8;font-style:italic">모듈 없음 — 아래에서 추가</span>`;
mids.forEach((mid,i)=>{
const mod=getModule(mid);
if(!mod){h+=`<span class="phase-mod-chip" style="background:#fee2e2;color:#b91c1c">❓ ${mid}<span class="x" onclick="ftRemoveModule('${phase}',${i})">×</span></span>`;return}
const g=getRoleGroup(mod.roleGroup||'common');
const ic=(g.roles.find(r=>r.id===mod.role)||{}).icon||'📦';
h+=`<span class="phase-mod-chip" style="background:${g.bg};color:${g.color};border:1px solid ${g.bd}">${ic} ${eh(mod.name)}<button onclick="event.stopPropagation();ftEditModule('${mod.moduleId}')" style="margin-left:3px;background:#fff;border:1px solid ${g.bd};color:${g.color};font-size:8px;padding:0 4px;border-radius:3px;cursor:pointer;font-weight:700">편집</button><span class="x" onclick="ftRemoveModule('${phase}',${i})">×</span></span>`});
h+=`</div>`;
// 추가 가능한 모듈
const usedIds=new Set(mids);
const avail=ftModules.filter(m=>!usedIds.has(m.moduleId));
if(avail.length){
h+=`<div class="phase-add"><div style="font-size:9px;color:#888;font-weight:700;margin-bottom:3px">+ ${phLbl}에 모듈 추가 (클릭)</div><div>`;

for(const m of groupMods){

}
h+=`<br>`;
}

}
// phase 섹션 카드 (4단)
if(secs.length){
h+=`<div class="phase-sections" style="margin-top:6px">`;
secs.forEach(sec=>{
const g=getRoleGroup(sec.roleGroup||'common');
h+=`<div class="ps-card" style="border-top:3px solid ${g.color}">
<div class="ps-head" style="background:${g.bg};color:${g.color}">
<span>${(g.roles.find(r=>r.id===sec.role)||{}).icon||'📦'} ${eh(sec.name)}</span>
<button onclick="ftEditModule('${sec.moduleId}')" style="background:#fff;border:1px solid ${g.bd};color:${g.color};padding:0 5px;border-radius:2px;font-size:8px;cursor:pointer;font-weight:700">편집</button>
</div>
<div class="ps-body">`;
(sec.fields||[]).slice(0,15).forEach(fld=>{
h+=`<div class="ps-fld"><span class="nm">${eh(fld.label)}</span><span class="tp">${fld.type}${fld.children&&fld.children.length?` ▸${countFieldsDeep(fld.children)-1}`:''}</span>${fld.required?'<span style="color:#e53e3e;font-size:8px">*</span>':''}</div>`;
});
if((sec.fields||[]).length>15)h+=`<div style="font-size:8px;color:#94a3b8;text-align:center;padding:2px">+${sec.fields.length-15}개 더</div>`;
h+=`</div></div>`;
});
h+=`</div>`;
}
h+=`</div>`;
}

// Extra fields
h+=`<div style="margin-top:8px;padding:8px;background:#fafbfc;border:1px solid #e3e5ed;border-radius:5px"><div style="font-size:10px;font-weight:700;color:#555;margin-bottom:4px">추가 필드 (1부 전용)</div>`;
if(ftData.extraFields&&ftData.extraFields.length){
ftData.extraFields.forEach((fld,fi)=>{
h+=`<div class="fe-field">
<span class="fe-grip">⠿</span>
<input value="${eh(fld.key)}" onchange="ftData.extraFields[${fi}].key=this.value"/>
<input value="${eh(fld.label)}" onchange="ftData.extraFields[${fi}].label=this.value"/>
<span>${FIELD_TYPES.map(t=>`<span class="me-type-chip ${fld.type===t.id?'a':''}" onclick="ftData.extraFields[${fi}].type='${t.id}';rForms()">${t.label}</span>`).join('')}</span>

<span>${(fld.type==="select"||fld.type==="multiselect"||fld.type==="mcq4")?`<input value="${eh((fld.options||[]).join(","))}" onchange="ftData.extraFields[${fi}].options=this.value.split(',')" placeholder="옵션(,)" style="font-size:9px"/>`:""}</span>
</div>`})}
h+=`<div class="fe-add-field"><button onclick="if(!ftData.extraFields)ftData.extraFields=[];ftData.extraFields.push({key:'new_field',label:'새 필드',type:'text',required:false});rForms()">+ 추가 필드</button></div></div>`;

h+=`</div>`;return h}

function ftAddModule(phase,modId){if(!modId||!ftData)return;if(!ftData.phases)ftData.phases={part1:[],part2:[]};if(!ftData.phases[phase])ftData.phases[phase]=[];ftData.phases[phase].push(modId);rForms()}

function ftEditModule(modId){
const mod=ftModules.find(m=>m.moduleId===modId);if(!mod)return;
modEditPath=[];
const g=getRoleGroup(mod.roleGroup||'common');
const roleIcon=(g.roles.find(r=>r.id===mod.role)||{}).icon||'📦';
const h=`<div class="fp-overlay" onclick="if(event.target===this)this.remove()">
<div class="fp-modal" style="width:1100px"><span class="fp-close" onclick="this.closest('.fp-overlay').remove()">×</span>

<p>${g.name} · ${(g.roles.find(r=>r.id===mod.role)||{}).name||'공통'} · 계층형 문제 구성 가능</p></div>
<div class="fp-body" id="modEditBody" style="padding:14px"></div></div></div>`;
document.body.insertAdjacentHTML("beforeend",h);
renderModuleEditor(mod)}

// path 배열로 현재 편집 중인 필드 배열에 접근
function getFieldsAtPath(mod){
let curr=mod.fields;
for(const i of modEditPath){
if(!curr[i])return [];
if(!curr[i].children)curr[i].children=[];
curr=curr[i].children;
}
return curr;
}
function getPathLabels(mod){
const labels=[];let curr=mod.fields;
for(const i of modEditPath){
if(!curr[i])break;
labels.push(curr[i].label||curr[i].key||'필드');
curr=curr[i].children||[];
}
return labels;
}

const body=document.getElementById("modEditBody");if(!body)return;
const fields=getFieldsAtPath(mod);
const pathLabels=getPathLabels(mod);

// 상단: 모듈명 / 역할 그룹 변경 / 저장 버튼

function renderPreviewField(fld,depth){

}else if(fld.type==="section"){

}else{

else if(fld.type==="multiselect")h+=`<div class="fp-multi">${(fld.options||[]).map(o=>`<span class="fp-chip" onclick="this.classList.toggle('sel')">${eh(o)}</span>`).join("")}</div>`;
else if(fld.type==="file")h+=`<div class="fp-file-zone">📎 파일을 드래그하거나 클릭하여 업로드</div>`;
else if(fld.type==="mcq4"){
h+=`<div class="fp-mcq">${(fld.options||["보기1","보기2","보기3","보기4"]).map((o,i)=>`<label><input type="radio" name="fp-${fld.key}"/>${i+1}. ${eh(o)}</label>`).join('')}</div>`;
}else if(fld.type==="short"){
h+=`<input class="fp-input" type="text" placeholder="단답 입력"/>`;
}else if(fld.type==="ox"){
h+=`<div class="fp-ox"><label><input type="radio" name="fp-${fld.key}" value="O"/> O</label><label><input type="radio" name="fp-${fld.key}" value="X"/> X</label></div>`;
}else h+=`<input class="fp-input" type="${fld.type||"text"}" placeholder="${eh(fld.placeholder||fld.label||'')}"/>`;
h+=`</div>`;

h+=`<div class="fp-sub">`;

}

}

if(p.passage)h+=`<div class="q-passage">${eh(p.passage)}</div>`;
// 문제
h+=`<div class="q-text">${eh(p.question||"(문제 내용 없음)")}</div>`;
// 보기 (객관식)
if(type.startsWith("객관식")&&Array.isArray(p.choices)){
p.choices.forEach((c,i)=>{
const isAns=String(p.answer)===String(i+1);
h+=`<div class="q-choice${isAns?" correct":""}"><span class="q-num">${i+1}</span><span>${eh(c)}</span>${isAns?" ✓":""}</div>`})}
// OX
else if(type==="OX"&&p.answer){
h+=`<div style="margin:4px 0"><span class="q-answer ${p.answer==="O"?"ox-o":"ox-x"}">${p.answer}</span></div>`}

h+=`<div style="margin:4px 0;font-size:11px"><span style="color:#888">정답:</span> <b>${eh(p.answer)}</b></div>`}

if(p.explanation)h+=`<div class="q-explain"><b>해설:</b> ${eh(p.explanation)}</div>`;
h+=`</div>`;return h}

btn.parentElement.querySelectorAll(".q-type-btn").forEach(b=>b.classList.remove("a"));btn.classList.add("a");

async function ctEditSave(id){
const row=(TD[ctTab]||[]).find(r=>r.id===id);if(!row)return;
let old;try{old=JSON.parse(row.data)}catch{old={}}
const data={...old};
// 분류
const clfEl=document.getElementById("ctClfE-"+id);
if(clfEl){Object.assign(data,ctClfVals("ctClfE-"+id))}
const dtl=document.getElementById("ctDtl-"+id);if(!dtl)return;
// 문제유형
if(ctTab==="questions"){
const typeBtn=dtl.querySelector(".q-type-bar .q-type-btn.a");
if(typeBtn)data.type=typeBtn.textContent;
// 난이도
const diffBtns=dtl.querySelectorAll(".q-type-bar");
if(diffBtns[1]){const db=diffBtns[1].querySelector(".q-type-btn.a");if(db)data.difficulty=db.textContent}
// 보기 수집 (객관식)
const choiceInputs=dtl.querySelectorAll("[data-qc]");
if(choiceInputs.length){data.choices=[];choiceInputs.forEach(ci=>data.choices.push(ci.value))}
// 정답
const ans=dtl.querySelector("#qAnswer");if(ans)data.answer=ans.value}
// 일반 필드
dtl.querySelectorAll("input[data-ctf],textarea[data-ctf]").forEach(i=>{data[i.dataset.ctf]=i.value});
await fetch(`/api/${ctTab}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
await lA();rNav();rContent()}

async function ctDoAdd(){
const data={};
const clf=ctClfVals("ctClfAdd");
Object.entries(clf).forEach(([k,v])=>{if(v)data[k]=v});
if(!data._level_area){alert("종목을 선택하세요");return}
// 문제 특수 처리
if(ctTab==="questions"){
const typeBtn=document.querySelector("#ctTypeBar .q-type-btn.a");
if(typeBtn)data.type=typeBtn.textContent;
// 난이도
const diffBars=document.querySelectorAll(".ct-fgrid .q-type-bar");
if(diffBars[1]){const db=diffBars[1].querySelector(".q-type-btn.a");if(db)data.difficulty=db.textContent}
// 보기
const choiceInputs=document.querySelectorAll("[data-qc]");
if(choiceInputs.length){data.choices=[];choiceInputs.forEach(ci=>data.choices.push(ci.value))}
// 정답
const ans=document.getElementById("qAnswer");if(ans)data.answer=ans.value}
else{
// 커리큘럼/교재: 버튼 선택값
document.querySelectorAll(".ct-fgrid .q-type-bar").forEach(bar=>{
const sel=bar.querySelector(".q-type-btn.a");
if(sel){
const label=bar.closest("div[style]")?.querySelector("label");
if(label){
const key=label.textContent.includes("난이도")?"difficulty":label.textContent.includes("평가")?"assessment":"";
if(key)data[key]=sel.textContent}}})}
// 일반 필드
document.querySelectorAll("[data-cta]").forEach(el=>{if(el.value)data[el.dataset.cta]=el.value});
await fetch(`/api/${ctTab}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
ctAdding=false;ctFormType="";await lA();rNav();rContent()}

async function ctDel(id){if(!confirm("삭제?"))return;
await fetch(`/api/${ctTab}/${id}`,{method:"DELETE"});ctExpId=null;await lA();rNav();rContent()}
