<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Work Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:12px/1.4 'Pretendard',-apple-system,sans-serif;background:#f0f2f5;color:#333}
/* Login */
.lo{position:fixed;inset:0;background:#1a365d;z-index:1000;display:flex;align-items:center;justify-content:center}
.lb{background:#fff;padding:40px;border-radius:12px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lb h2{font-size:20px;color:#1a365d;margin-bottom:6px}
.lb p{font-size:11px;color:#888;margin-bottom:20px}
.lb input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:10px;outline:none}
.lb input:focus{border-color:#1a365d}
.lb button{width:100%;padding:10px;background:#1a365d;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.lb button:hover{background:#2d4a7c}
.le{color:#c00;font-size:11px;margin-top:6px;display:none}
.lh{font-size:10px;color:#aaa;margin-top:12px}
/* App */
.app{display:none}.app.v{display:flex;flex-direction:column;height:100vh}
header{background:#1a365d;color:#fff;padding:6px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
header h1{font-size:14px;font-weight:700}
.hr{display:flex;align-items:center;gap:12px;font-size:11px}
.hr .ui{color:rgba(255,255,255,.6)}
.hr button{padding:2px 10px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:3px;font-size:10px;cursor:pointer}
/* Topbar */
.tb{background:#fff;border-bottom:1px solid #e2e8f0;padding:4px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.tb .bc{font-size:11px;color:#888}.tb .bc b{color:#1a365d}
.tb .vt{margin-left:auto;display:flex;gap:2px}
.tb .vt button{padding:3px 10px;border:1px solid #ddd;background:#fff;border-radius:3px;font-size:10px;cursor:pointer;color:#666}
.tb .vt button.a{background:#1a365d;color:#fff;border-color:#1a365d}
/* Main */
.mn{display:flex;flex:1;overflow:hidden}
/* Sidebar */
.sb{width:180px;background:#fff;border-right:1px solid #e8e8e8;overflow-y:auto;flex-shrink:0;font-size:11px}
.sg{border-bottom:1px solid #f0f0f0}
.sgt{padding:6px 12px;font-size:9px;font-weight:800;color:#1a365d;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#fafbfc}
.sgt:hover{background:#f0f2f5}
.si{padding:5px 12px 5px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:#555;border-left:2px solid transparent}
.si:hover{background:#f8fafc;color:#1a365d}
.si.a{background:#eef2ff;color:#1a365d;font-weight:700;border-left-color:#1a365d}
.sc{font-size:9px;background:#e8ecf0;color:#555;padding:0 5px;border-radius:8px;min-width:16px;text-align:center;font-weight:700}
.sc.n{background:#fed7d7;color:#c53030}
.sa{padding:6px 12px;font-weight:700;color:#1a365d;cursor:pointer;border-bottom:1px solid #eee;font-size:11px}
.sa:hover,.sa.a{background:#eef2ff}
/* Content */
.ca{flex:1;overflow-y:auto;padding:12px}
/* Tags */
.rit{font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;background:#eef2ff;color:#1a365d;white-space:nowrap}
/* List */
.ct{background:#fff;border-radius:6px;border:1px solid #eee}
.tl{padding:6px 12px;border-bottom:1px solid #eee;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tl input[type=text]{padding:4px 8px;border:1px solid #ddd;border-radius:3px;font-size:11px;width:160px}
.tl select{padding:4px 6px;border:1px solid #ddd;border-radius:3px;font-size:10px}
.tl button{padding:3px 10px;border:1px solid #ddd;border-radius:3px;background:#fff;font-size:10px;cursor:pointer}
.tl button:hover{background:#f0f0f0}
.tl .db{color:#c00;border-color:#c00}.tl .db:hover{background:#fff0f0}
.tl .ab{background:#1a365d;color:#fff;border-color:#1a365d}
.tl .cnt{font-size:10px;background:#e8ecf0;padding:1px 6px;border-radius:8px;font-weight:600}
.tw{overflow-x:auto;max-height:calc(100vh - 160px);overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{text-align:left;padding:6px 8px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:600;color:#555;position:sticky;top:0;white-space:nowrap}
tbody tr{border-bottom:1px solid #f5f5f5;cursor:pointer}
tbody tr:hover{background:#f8fafc}
tbody td{padding:5px 8px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb{width:14px;height:14px;cursor:pointer}
.bid{font-family:monospace;font-size:9px;background:#f0f0f0;padding:0 4px;border-radius:2px}
.bn{font-size:9px;background:#fed7d7;color:#c53030;padding:0 3px;border-radius:2px;font-weight:700;margin-left:3px}
.bs{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:600}
.bs.s0{background:#fff3cd;color:#856404}.bs.s1{background:#d4edda;color:#155724}.bs.s2{background:#e2e8f0;color:#555}
.em{padding:30px;text-align:center;color:#999}
/* Detail */
.dr{background:#f8fafc}
.dr td{padding:10px 16px}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:10px;color:#888}
.dh button{padding:2px 8px;border-radius:3px;font-size:10px;cursor:pointer;border:1px solid #ddd;background:#fff}
.dh .eb{color:#1a365d;border-color:#1a365d}.dh .sv{background:#16a34a;color:#fff;border-color:#16a34a;display:none}
.dh .cl{display:none}.dh .xb{color:#c00;border-color:#c00}
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.di{font-size:11px;padding:4px 0;border-bottom:1px solid #f0f0f0}
.di .lbl{font-size:9px;color:#888;font-weight:600}.di .val{margin-top:1px;line-height:1.4;word-break:break-word;white-space:normal}
.di input{display:none;width:100%;padding:3px 6px;border:1px solid #ccc;border-radius:3px;font-size:11px;margin-top:2px}
/* Memo */
.memo-wrap{margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.memo-wrap textarea{width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:11px;resize:none;height:50px}
.memo-wrap button{margin-top:4px;padding:3px 10px;background:#1a365d;color:#fff;border:none;border-radius:3px;font-size:10px;cursor:pointer}
/* Add form */
#addF{margin-bottom:12px;background:#fff;border-radius:6px;border:1px solid #eee;padding:12px;display:none}
#addF .af-title{font-size:12px;font-weight:700;margin-bottom:8px}
#addF .af-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
#addF label{font-size:9px;font-weight:700;color:#555;display:block;margin-bottom:2px}
#addF input{width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;font-size:11px}
#addF .af-btns{margin-top:8px;display:flex;gap:6px}
#addF .af-btns button{padding:6px 16px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:none}
/* Actions & Icons */
.acts{white-space:nowrap;text-align:center}
.ic{cursor:pointer;padding:1px 4px;border-radius:2px;font-size:13px;opacity:.5;transition:.1s}
.ic:hover{opacity:1;background:#eef2ff}
.sc{color:#16a34a}.sc:hover{background:#dcfce7}
.xc:hover{background:#fff0f0}
.em-on{background:#1a365d!important;color:#fff!important;border-color:#1a365d!important}
.emi{font-size:11px!important}
</style>
</head>
<body>
<div class="lo" id="lo"><div class="lb"><h2>Work Studio</h2><p>홈페이지 업무 관리</p>
<input id="lid" placeholder="아이디"/><input type="password" id="lpw" placeholder="비밀번호" onkeydown="event.key==='Enter'&&doL()"/>
<button onclick="doL()">로그인</button><div class="le" id="le">아이디/비밀번호 오류</div><div class="lh">admin / admin</div></div></div>

<div class="app" id="app">
<header><h1>Work Studio</h1><div class="hr"><span class="ui" id="ui"></span><button onclick="doLO()">로그아웃</button></div></header>
<div class="tb"><div class="bc" id="bc">Work Studio</div>
<div class="vt"><button id="bD" class="a" onclick="sv('d')">대시보드</button><button id="bL" onclick="sv('l')">리스트</button></div></div>
<div class="mn"><div class="sb" id="sb"></div><div class="ca" id="ca"></div></div>
</div>

<script>
const U={admin:{pw:"admin",n:"관리자",r:"admin"},staff:{pw:"staff",n:"직원",r:"staff"}};
function doL(){const i=lid.value,p=lpw.value,u=U[i];if(u&&u.pw===p){sessionStorage.ws=JSON.stringify({i,...u});sA()}else le.style.display="block"}
function doLO(){sessionStorage.removeItem("ws");location.reload()}
function sA(){lo.style.display="none";app.classList.add("v");const u=JSON.parse(sessionStorage.ws);ui.textContent=u.n;init()}

const C={"신청":{t:["applications"]},"번역":{t:["translation_contacts","translation_quotes","translation_translators","translation_integrated","translation_experts","translation_orders"]},
"윤리":{t:["aiethics_applications"]},"고전번역":{t:["classic_inquiries","classic_specialist_apps"]},
"레벨테스트":{t:["level_test_submissions"]},"대표님":{t:["story_posts"]}};
const L={applications:"통합신청",aiethics_applications:"전문가모집",classic_inquiries:"문의",classic_specialist_apps:"전문가신청",
translation_contacts:"문의",translation_quotes:"견적",translation_translators:"번역사",
translation_integrated:"통합신청",translation_experts:"전문가지원",translation_orders:"번역신청",
level_test_submissions:"답안",story_posts:"블로그"};
const ST=["신규","확인","처리완료"];

let T=[],TC={},TD={},cT=null,cV="d",sel=new Set(),cC=new Set();

async function init(){T=await f("/api/tables");await lA();rS();rv()}
async function lA(){for(const t of T){const r=await f("/api/"+t);TD[t]=r;TC[t]=r.length}}
function f(u){return fetch(u).then(r=>r.json())}

function aR(){let a=[];for(const t of T)(TD[t]||[]).forEach(r=>a.push({...r,_t:t}));return a.sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""))}
function iT(d){return d&&d.startsWith(new Date().toISOString().slice(0,10))}
function rn(t,id){const p={applications:"APP",aiethics_applications:"ETH",classic_inquiries:"CLS",classic_specialist_apps:"CSP",translation_contacts:"TCT",translation_quotes:"TQT",translation_translators:"TTR",translation_integrated:"TIN",translation_experts:"TEX",translation_orders:"TOR",level_test_submissions:"LVL",story_posts:"BLG"};return(p[t]||"W")+"-"+String(id).padStart(4,"0")}
function gC(t){for(const[c,v]of Object.entries(C))if(v.t.includes(t))return c;return""}
function gS(row){try{const d=JSON.parse(row.data);return d._status||0}catch{return 0}}
function eh(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function fv(v){if(v==null)return"";if(Array.isArray(v))return v.join(", ");if(typeof v==="object")return Object.entries(v).map(([k,v])=>k+":"+v).join(" / ");const s=String(v);return s.length>60?s.slice(0,60)+"…":s}

function sv(v){cV=v;bD.className=v==="d"?"a":"";bL.className=v==="l"?"a":"";rv()}
function rv(){if(cV==="d"&&!cT)rD();else rL()}

function rS(){
let h=`<div class="sa ${!cT?"a":""}" onclick="cT=null;sv('d')">전체</div>`;
for(const[c,v]of Object.entries(C)){
const cc=v.t.reduce((s,t)=>s+(TC[t]||0),0);
const nc=v.t.reduce((s,t)=>s+(TD[t]||[]).filter(r=>iT(r.created_at)).length,0);
const op=!cC.has(c);
h+=`<div class="sg"><div class="sgt" onclick="tC('${c}')"><span>${c} (${cc})</span>${nc?`<span class="sc n">+${nc}</span>`:""}</div>`;
if(op)for(const t of v.t){const nt=(TD[t]||[]).filter(r=>iT(r.created_at)).length;
h+=`<div class="si ${t===cT?"a":""}" onclick="sT('${t}')"><span>${L[t]||t}</span><span class="sc${nt?" n":""}">${TC[t]||0}</span></div>`}
h+=`</div>`}
sb.innerHTML=h}
function tC(c){cC.has(c)?cC.delete(c):cC.add(c);rS()}
function sT(t){cT=t;sel.clear();cV="l";bD.className="";bL.className="a";rS();uB();rL()}
function uB(){bc.innerHTML=cT?`Work Studio &rsaquo; <b>${gC(cT)}</b> &rsaquo; <b>${L[cT]}</b>`:"Work Studio"}

// Dashboard — 카드 없이 전체 통합 테이블
function rD(){uB();const all=aR();
if(!all.length){ca.innerHTML='<div class="ct"><div class="em">데이터 없음</div></div>';return}
const tl=`<div class="tl"><input type="text" placeholder="검색…" oninput="fTD(this.value)"/>
<select onchange="fSD(this.value)"><option value="">전체상태</option><option value="0">신규</option><option value="1">확인</option><option value="2">처리완료</option></select>
<select onchange="fCD(this.value)"><option value="">전체분류</option>${Object.keys(C).map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
<select onchange="fDD(this.value)"><option value="">전체기간</option><option value="t">오늘</option><option value="w">7일</option><option value="m">30일</option></select>
<span class="cnt">${all.length}건</span></div>`;

const th=`<tr><th>접수번호</th><th>분류</th><th>폼</th><th>상태</th><th>이름</th><th>이메일/연락처</th><th>일시</th></tr>`;
const tb=all.map(r=>{let p;try{p=JSON.parse(r.data)}catch{p={}}
const st=p._status||0;const nm=p.name||p.title||p.studentName||"—";const ct=p.email||p.contact||p.phone||"";
return`<tr data-cat="${gC(r._t)}" data-st="${st}" data-d="${r.created_at||""}" onclick="cT='${r._t}';cV='l';bD.className='';bL.className='a';rS();uB();rL()">
<td><span class="bid">${rn(r._t,r.id)}</span>${iT(r.created_at)?'<span class="bn">N</span>':""}</td>
<td><span class="rit">${gC(r._t)}</span></td><td>${L[r._t]||r._t}</td>
<td><span class="bs s${st}">${ST[st]}</span></td>
<td>${eh(String(nm).slice(0,15))}</td><td>${eh(String(ct).slice(0,25))}</td>
<td>${(r.created_at||"").slice(5,16)}</td></tr>`}).join("");

ca.innerHTML=`<div class="ct">${tl}<div class="tw"><table><thead>${th}</thead><tbody id="tBD">${tb}</tbody></table></div></div>`}

function fTD(q){document.querySelectorAll("#tBD tr").forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?"":"none"})}
function fSD(v){document.querySelectorAll("#tBD tr").forEach(r=>{r.style.display=(!v||r.dataset.st===v)?"":"none"})}
function fCD(v){document.querySelectorAll("#tBD tr").forEach(r=>{r.style.display=(!v||r.dataset.cat===v)?"":"none"})}
function fDD(v){const now=new Date();let cut=null;
if(v==="t")cut=new Date(now.getFullYear(),now.getMonth(),now.getDate());
else if(v==="w"){cut=new Date(now);cut.setDate(cut.getDate()-7)}
else if(v==="m"){cut=new Date(now);cut.setDate(cut.getDate()-30)}
document.querySelectorAll("#tBD tr").forEach(r=>{r.style.display=(!cut||(r.dataset.d&&new Date(r.dataset.d)>=cut))?"":"none"})}

// List
let eM=false; // edit mode
function rL(){uB();const data=cT?TD[cT]||[]:[];
if(!data.length){ca.innerHTML='<div id="addF"></div><div class="ct"><div class="em">데이터 없음</div></div>';return}
const aK=new Set();const ps=data.map(r=>{let d;try{d=JSON.parse(r.data)}catch{d={raw:r.data}}
Object.keys(d).forEach(k=>{if(k!=="_status"&&k!=="_memo")aK.add(k)});return{...r,p:d}});
const keys=[...aK].slice(0,5);

const appFilters=cT==="applications"?`<select onchange="fSrc(this.value)"><option value="">전체출처</option>${[...new Set(ps.map(r=>r.p._source).filter(Boolean))].map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
<select onchange="fTy(this.value)"><option value="">전체유형</option><option value="user">사용자</option><option value="expert">전문가</option><option value="b2b">B2B</option></select>
<select onchange="fStp(this.value)"><option value="">전체단계</option><option value="1">1단계</option><option value="2">2단계</option><option value="3">3단계</option></select>`:"";
const tl=`<div class="tl"><input type="text" placeholder="검색…" oninput="fT(this.value)"/>
<select onchange="fS(this.value)"><option value="">전체상태</option><option value="0">신규</option><option value="1">확인</option><option value="2">처리완료</option></select>
<select onchange="fD(this.value)"><option value="">전체기간</option><option value="t">오늘</option><option value="w">7일</option><option value="m">30일</option></select>
${appFilters}
<span class="cnt">${ps.length}건</span>
<button class="ab" onclick="sAF()">+추가</button>
<button onclick="bSt(1)">확인처리</button><button onclick="bSt(2)">완료처리</button>
<button class="db" onclick="dS()">삭제</button>
<button class="${eM?"em-on":""}" onclick="tEM()" title="편집 모드">${eM?"편집모드 ON":"편집모드"}</button></div>`;

const th=`<tr><th style="width:30px"><input type="checkbox" class="cb" onchange="tA(this.checked)"/></th><th>번호</th><th>상태</th>${keys.map(k=>`<th>${k}</th>`).join("")}<th>일시</th><th style="width:60px">작업</th></tr>`;
const tb=ps.map(r=>{const st=r.p._status||0;
return`<tr data-id="${r.id}" data-d="${r.created_at||""}" data-src="${r.p._source||""}" data-ty="${r.p._type||""}" data-stp="${r.p._step||""}">
<td><input type="checkbox" class="cb" ${sel.has(r.id)?"checked":""} onclick="tSel(${r.id},this.checked)"/></td>
<td><span class="bid">${rn(cT,r.id)}</span>${iT(r.created_at)?'<span class="bn">N</span>':""}</td>
<td><span class="bs s${st}" onclick="cyS(${r.id})" title="클릭하면 상태 변경" style="cursor:pointer">${ST[st]}</span></td>
${eM?keys.map(k=>`<td><input class="emi" data-id="${r.id}" data-key="${k}" value="${eh(fv(r.p[k]))}" style="width:100%;padding:2px 4px;border:1px solid #ccc;border-radius:2px;font-size:11px"/></td>`).join(""):keys.map(k=>`<td onclick="tD(this.parentElement,${r.id})" title="클릭하면 상세">${eh(fv(r.p[k]))}</td>`).join("")}
<td>${(r.created_at||"").slice(5,16)}</td>
<td class="acts">${eM?`<span class="ic sc" onclick="svRow(${r.id})" title="저장">&#10004;</span>`:`<span class="ic" onclick="qE(${r.id})" title="수정">&#9998;</span>`}<span class="ic xc" onclick="dOne(${r.id})" title="삭제">&#128465;</span></td>
</tr>`}).join("");

ca.innerHTML=`<div id="addF"></div><div class="ct">${tl}<div class="tw"><table><thead>${th}</thead><tbody id="tB">${tb}</tbody></table></div></div>`}

function tEM(){eM=!eM;rL()}
async function cyS(id){const row=(TD[cT]||[]).find(r=>r.id===id);if(!row)return;let d;try{d=JSON.parse(row.data)}catch{d={}}
d._status=((d._status||0)+1)%3;await fetch(`/api/${cT}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});await lA();rS();rL()}
function qE(id){eM=true;rL();/* switch to edit mode */}
async function svRow(id){const row=(TD[cT]||[]).find(r=>r.id===id);if(!row)return;let o;try{o=JSON.parse(row.data)}catch{o={}}
const u={...o};document.querySelectorAll(`.emi[data-id="${id}"]`).forEach(inp=>{const k=inp.dataset.key,v=inp.value;
if(Array.isArray(o[k]))u[k]=v.split(",").map(s=>s.trim()).filter(Boolean);else u[k]=v});
await fetch(`/api/${cT}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(u)});await lA();rS();rL()}

function tSel(id,c){c?sel.add(id):sel.delete(id)}
function tA(c){(TD[cT]||[]).forEach(r=>{c?sel.add(r.id):sel.delete(r.id)});rL()}
async function dS(){if(!sel.size)return alert("선택 없음");if(!confirm(sel.size+"건 삭제?"))return;for(const id of sel)await fetch(`/api/${cT}/${id}`,{method:"DELETE"});sel.clear();await lA();rS();rL()}
async function bSt(st){if(!sel.size)return alert("선택 없음");for(const id of sel){const row=(TD[cT]||[]).find(r=>r.id===id);if(!row)continue;let d;try{d=JSON.parse(row.data)}catch{d={}}
d._status=st;await fetch(`/api/${cT}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)})}
sel.clear();await lA();rS();rL()}

function tD(tr,id){const ex=tr.nextElementSibling;if(ex&&ex.classList.contains("dr")){ex.remove();return}
const row=(TD[cT]||[]).find(r=>r.id===id);if(!row)return;
let p;try{p=JSON.parse(row.data)}catch{p={raw:row.data}}
const memo=p._memo||"";
const fields=Object.entries(p).filter(([k])=>k!=="_status"&&k!=="_memo").map(([k,v])=>{
const val=Array.isArray(v)?v.join(", "):typeof v==="object"?Object.entries(v).map(([a,b])=>a+":"+b).join(" / "):String(v||"");
return`<div class="di"><div class="lbl">${k}</div><div class="val" id="v-${id}-${k}">${eh(val)}</div><input id="e-${id}-${k}" data-key="${k}" value="${eh(val)}"/></div>`}).join("");

const dt=document.createElement("tr");dt.className="dr";
dt.innerHTML=`<td colspan="99"><div class="dh"><span>${rn(cT,id)} | ${row.created_at} | 상태: <span class="bs s${p._status||0}">${ST[p._status||0]}</span></span>
<span><button class="eb" onclick="eS(${id})">수정</button><button class="sv" id="sv${id}" onclick="eSv(${id})">저장</button><button class="cl" id="cl${id}" onclick="eCl(${id})">취소</button>
<select onchange="cSt(${id},this.value)" style="font-size:10px;padding:2px"><option value="0" ${(p._status||0)===0?"selected":""}>신규</option><option value="1" ${p._status===1?"selected":""}>확인</option><option value="2" ${p._status===2?"selected":""}>처리완료</option></select>
<button class="xb" onclick="dOne(${id})">삭제</button></span></div>
<div class="dg" id="dg-${id}">${fields}</div>
<div class="memo-wrap"><textarea id="mm-${id}" placeholder="관리자 메모…">${eh(memo)}</textarea><button onclick="sMm(${id})">메모 저장</button></div></td>`;
tr.after(dt)}

function eS(id){document.getElementById("sv"+id).style.display="inline";document.getElementById("cl"+id).style.display="inline";
document.querySelectorAll(`#dg-${id} .di`).forEach(d=>{d.querySelector(".val").style.display="none";d.querySelector("input").style.display="block"})}
function eCl(id){document.getElementById("sv"+id).style.display="none";document.getElementById("cl"+id).style.display="none";
document.querySelectorAll(`#dg-${id} .di`).forEach(d=>{d.querySelector(".val").style.display="block";d.querySelector("input").style.display="none"})}
async function eSv(id){const row=(TD[cT]||[]).find(r=>r.id===id);if(!row)return;let o;try{o=JSON.parse(row.data)}catch{o={}}
const u={...o};document.querySelectorAll(`#dg-${id} input[data-key]`).forEach(inp=>{const k=inp.dataset.key,v=inp.value;
if(Array.isArray(o[k]))u[k]=v.split(",").map(s=>s.trim()).filter(Boolean);else u[k]=v});
await fetch(`/api/${cT}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(u)});await lA();rS();rL()}
async function cSt(id,st){const row=(TD[cT]||[]).find(r=>r.id===id);if(!row)return;let d;try{d=JSON.parse(row.data)}catch{d={}}
d._status=Number(st);await fetch(`/api/${cT}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});await lA();rS();rL()}
async function dOne(id){if(!confirm("삭제?"))return;await fetch(`/api/${cT}/${id}`,{method:"DELETE"});await lA();rS();rL()}
async function sMm(id){const row=(TD[cT]||[]).find(r=>r.id===id);if(!row)return;let d;try{d=JSON.parse(row.data)}catch{d={}}
d._memo=document.getElementById("mm-"+id).value;await fetch(`/api/${cT}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});alert("메모 저장됨")}

function fT(q){document.querySelectorAll("#tB tr:not(.dr)").forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?"":"none"})}
function fS(v){document.querySelectorAll("#tB tr:not(.dr)").forEach(r=>{if(!v){r.style.display="";return}
const id=Number(r.dataset.id);const row=(TD[cT]||[]).find(x=>x.id===id);if(!row){r.style.display="none";return}
let p;try{p=JSON.parse(row.data)}catch{p={}}r.style.display=String(p._status||0)===v?"":"none"})}
function fD(v){const now=new Date();let cut=null;
if(v==="t")cut=new Date(now.getFullYear(),now.getMonth(),now.getDate());
else if(v==="w"){cut=new Date(now);cut.setDate(cut.getDate()-7)}
else if(v==="m"){cut=new Date(now);cut.setDate(cut.getDate()-30)}
document.querySelectorAll("#tB tr:not(.dr)").forEach(r=>{if(!cut){r.style.display="";return}
r.style.display=(r.dataset.d&&new Date(r.dataset.d)>=cut)?"":"none"})}

// Application filters
function fSrc(v){document.querySelectorAll("#tB tr:not(.dr)").forEach(r=>{r.style.display=(!v||r.dataset.src===v)?"":"none"})}
function fTy(v){document.querySelectorAll("#tB tr:not(.dr)").forEach(r=>{r.style.display=(!v||r.dataset.ty===v)?"":"none"})}
function fStp(v){document.querySelectorAll("#tB tr:not(.dr)").forEach(r=>{r.style.display=(!v||r.dataset.stp===v)?"":"none"})}

// Add form
function sAF(){const af=document.getElementById("addF");if(af.style.display==="block"){af.style.display="none";return}
const s=(TD[cT]||[])[0];let keys=[];if(s)try{keys=Object.keys(JSON.parse(s.data)).filter(k=>k!=="_status"&&k!=="_memo")}catch{}
if(!keys.length)keys=["name","email","message"];
af.innerHTML=`<div class="af-title">${L[cT]} 수동 추가</div><div class="af-grid">${keys.map(k=>`<div><label>${k}</label><input data-af="${k}"/></div>`).join("")}</div>
<div class="af-btns"><button style="background:#1a365d;color:#fff" onclick="doAF()">추가</button><button style="border:1px solid #ddd;background:#fff" onclick="document.getElementById('addF').style.display='none'">취소</button></div>`;
af.style.display="block"}
async function doAF(){const d={};document.querySelectorAll("#addF input[data-af]").forEach(i=>{d[i.dataset.af]=i.value});
await fetch(`/api/${cT}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});
document.getElementById("addF").style.display="none";await lA();rS();rL()}

if(sessionStorage.ws)sA();
</script>
</body>
</html>
