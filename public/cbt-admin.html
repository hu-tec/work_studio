<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AITe CBT 관리</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:13px/1.5 -apple-system,sans-serif;background:#f0f2f5;color:#333}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
header{background:#1a365d;color:#fff;padding:10px 20px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:16px}
header a{color:rgba(255,255,255,.7);font-size:12px;text-decoration:none}
header a:hover{color:#fff}
.tabs{display:flex;gap:2px;background:#fff;border-bottom:2px solid #e2e8f0;padding:0 16px}
.tab{padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.a{color:#1a365d;border-bottom-color:#1a365d}
.tab:hover{color:#1a365d}
.panel{display:none;padding:16px}.panel.a{display:block}
.card{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;font-weight:700;margin-bottom:12px;color:#1a365d}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 8px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:600;color:#555}
td{padding:5px 8px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#f8fafc}
.btn{padding:4px 12px;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer}
.btn-p{background:#1a365d;color:#fff}.btn-p:hover{background:#2d4a7c}
.btn-d{background:#fee;color:#c00;border:1px solid #fcc}.btn-d:hover{background:#fdd}
.btn-s{background:#f0f0f0;color:#555}.btn-s:hover{background:#e0e0e0}
.badge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600}
.badge-g{background:#d4edda;color:#155724}.badge-r{background:#f8d7da;color:#721c24}
.badge-b{background:#cce5ff;color:#004085}.badge-y{background:#fff3cd;color:#856404}
input,select,textarea{padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:100%}
input[type=checkbox],input[type=radio]{width:auto;min-width:14px;max-width:14px;height:14px;margin:0;flex-shrink:0}
textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.form-grid.c3{grid-template-columns:repeat(3,1fr)}
label{font-size:11px;font-weight:600;color:#555;display:block;margin-bottom:3px}
.full{grid-column:1/-1}
.opts{margin-top:8px}
.opt-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.opt-row input[type=text]{flex:1}
.actions{display:flex;gap:6px;margin-top:12px}
.empty{padding:30px;text-align:center;color:#999;font-size:12px}
.stars{color:#f59e0b}
.toggle{cursor:pointer}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
#modal.v{display:flex}
#modal .mc{background:#fff;border-radius:8px;padding:20px;width:90%;max-width:700px;max-height:85vh;overflow-y:auto}
</style>
</head>
<body>
<header>
<h1>AITe CBT 관리</h1>
<a href="/admin.html">&larr; Work Studio</a>
</header>
<div class="tabs">
<div class="tab a" onclick="showTab('categories')">카테고리</div>
<div class="tab" onclick="showTab('questions')">문제 관리</div>
<div class="tab" onclick="showTab('exams')">시험 관리</div>
</div>

<div id="p-categories" class="panel a"></div>
<div id="p-questions" class="panel"></div>
<div id="p-exams" class="panel"></div>
<div id="modal"><div class="mc" id="modal-body"></div></div>

<script>
const API="http://54.116.15.136:82/api/admin";
const AK="aite-admin-2026";
let cats=[],qs=[],exams=[];

async function J(u,o){
const opts={...o,headers:{"Content-Type":"application/json","X-Admin-Key":AK,...(o?.headers||{})}};
const r=await fetch(API+u,opts);return r.json()}

function showTab(t){
document.querySelectorAll(".tab").forEach((e,i)=>e.classList.toggle("a",["categories","questions","exams"][i]===t));
document.querySelectorAll(".panel").forEach((e,i)=>e.classList.toggle("a",["categories","questions","exams"][i]===t));
if(t==="categories")loadCats();
if(t==="questions")loadQs();
if(t==="exams")loadExams();
}

// === Categories ===
async function loadCats(){
cats=await J("/categories");
let h=`<div class="wrap"><div class="card"><h3>카테고리 목록</h3>
<div style="margin-bottom:10px;display:flex;gap:6px">
<input id="newCat" placeholder="새 카테고리명" style="width:200px"/>
<button class="btn btn-p" onclick="addCat()">추가</button></div>
<table><tr><th>이름</th><th>문제 수</th><th>작업</th></tr>`;
if(!cats.length)h+=`<tr><td colspan="3" class="empty">카테고리 없음</td></tr>`;
cats.forEach(c=>{h+=`<tr><td>${c.name}</td><td>${c._count.questions}</td>
<td><button class="btn btn-d" onclick="delCat('${c.id}')">삭제</button></td></tr>`});
h+=`</table></div></div>`;
document.getElementById("p-categories").innerHTML=h;
}
async function addCat(){const n=document.getElementById("newCat").value.trim();if(!n)return;
await J("/categories",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:n})});loadCats()}
async function delCat(id){if(!confirm("삭제?"))return;
await J("/categories/"+id,{method:"DELETE"});loadCats()}

// === Questions ===
const TL={MULTIPLE_CHOICE:"객관식(단일)",MULTIPLE_SELECT:"객관식(복수)",SHORT_ANSWER:"단답형",TRUE_FALSE:"O/X"};
async function loadQs(){
const r=await J("/questions");qs=r.questions||[];
let h=`<div class="wrap"><div class="card"><h3>문제 목록 (${qs.length}개)</h3>
<button class="btn btn-p" onclick="showQForm()" style="margin-bottom:10px">문제 등록</button>
<table><tr><th style="width:40%">문제</th><th>카테고리</th><th>유형</th><th>난이도</th><th>배점</th><th>작업</th></tr>`;
if(!qs.length)h+=`<tr><td colspan="6" class="empty">문제 없음</td></tr>`;
qs.forEach(q=>{h+=`<tr><td style="cursor:pointer" onclick="showQDetail('${q.id}')">${esc(q.content).slice(0,60)}</td>
<td><span class="badge badge-b">${q.category?.name||""}</span></td>
<td>${TL[q.type]||q.type}</td>
<td class="stars">${"★".repeat(q.difficulty)}${"☆".repeat(5-q.difficulty)}</td>
<td>${q.points}</td>
<td><button class="btn btn-s" onclick="showQForm('${q.id}')">수정</button>
<button class="btn btn-d" onclick="delQ('${q.id}')">삭제</button></td></tr>`});
h+=`</table></div></div>`;
document.getElementById("p-questions").innerHTML=h;
}

function showQForm(id){
const q=id?qs.find(x=>x.id===id):null;
const opts=q?.options||[{label:"A",text:"",isCorrect:true},{label:"B",text:"",isCorrect:false},{label:"C",text:"",isCorrect:false},{label:"D",text:"",isCorrect:false}];
let h=`<h3>${q?"문제 수정":"문제 등록"}</h3>
<div class="form-grid">
<div><label>카테고리</label><select id="qCat">${cats.map(c=>`<option value="${c.id}" ${q?.categoryId===c.id?"selected":""}>${c.name}</option>`).join("")}</select></div>
<div><label>유형</label><select id="qType" onchange="toggleOpts()">
<option value="MULTIPLE_CHOICE" ${q?.type==="MULTIPLE_CHOICE"?"selected":""}>객관식(단일)</option>
<option value="MULTIPLE_SELECT" ${q?.type==="MULTIPLE_SELECT"?"selected":""}>객관식(복수)</option>
<option value="SHORT_ANSWER" ${q?.type==="SHORT_ANSWER"?"selected":""}>단답형</option>
<option value="TRUE_FALSE" ${q?.type==="TRUE_FALSE"?"selected":""}>O/X</option></select></div>
<div><label>난이도</label><select id="qDiff">${[1,2,3,4,5].map(d=>`<option value="${d}" ${q?.difficulty===d?"selected":""}>${"★".repeat(d)}</option>`).join("")}</select></div>
<div><label>배점</label><input id="qPts" type="number" value="${q?.points||10}"/></div>
<div class="full"><label>문제 본문</label><textarea id="qContent" rows="3">${esc(q?.content||"")}</textarea></div>
<div class="full" id="optsWrap"><label>보기</label><div id="optsList"></div>
<button class="btn btn-s" onclick="addOpt()" style="margin-top:4px">+ 보기 추가</button></div>
<div class="full" id="ansWrap"><label>정답</label><input id="qAns" value="${esc(q?.answer||"")}"/></div>
<div class="full"><label>해설</label><textarea id="qExpl" rows="2">${esc(q?.explanation||"")}</textarea></div>
</div>
<div class="actions"><button class="btn btn-p" onclick="saveQ('${id||""}')">${q?"수정":"등록"}</button>
<button class="btn btn-s" onclick="closeModal()">취소</button></div>`;
document.getElementById("modal-body").innerHTML=h;
document.getElementById("modal").classList.add("v");
window._opts=JSON.parse(JSON.stringify(opts));
renderOpts();toggleOpts();
}

function renderOpts(){
const el=document.getElementById("optsList");if(!el)return;
const t=document.getElementById("qType").value;
const mc=t==="MULTIPLE_CHOICE";
el.innerHTML=window._opts.map((o,i)=>`<div class="opt-row">
<span style="width:20px;font-weight:600">${o.label}</span>
<input type="text" value="${esc(o.text)}" onchange="window._opts[${i}].text=this.value"/>
<label style="width:auto;display:flex;align-items:center;gap:3px;white-space:nowrap">
<input type="${mc?"radio":"checkbox"}" name="correct" ${o.isCorrect?"checked":""} onchange="setCorrect(${i},this.checked)"/> 정답</label>
${window._opts.length>2?`<button class="btn btn-d" onclick="rmOpt(${i})">×</button>`:""}</div>`).join("");
}
function addOpt(){const l=String.fromCharCode(65+window._opts.length);window._opts.push({label:l,text:"",isCorrect:false});renderOpts()}
function rmOpt(i){window._opts.splice(i,1);renderOpts()}
function setCorrect(i,v){
const t=document.getElementById("qType").value;
if(t==="MULTIPLE_CHOICE")window._opts.forEach((o,j)=>o.isCorrect=j===i);
else window._opts[i].isCorrect=v;
renderOpts();
}
function toggleOpts(){
const t=document.getElementById("qType").value;
const ow=document.getElementById("optsWrap"),aw=document.getElementById("ansWrap");
if(t==="SHORT_ANSWER"){ow.style.display="none";aw.style.display="block"}
else if(t==="TRUE_FALSE"){ow.style.display="none";aw.style.display="block";
document.getElementById("qAns").placeholder="O 또는 X";
window._opts=[{label:"O",text:"맞다",isCorrect:true},{label:"X",text:"틀리다",isCorrect:false}]}
else{ow.style.display="block";aw.style.display="none"}
}

async function saveQ(id){
const data={type:document.getElementById("qType").value,content:document.getElementById("qContent").value,
categoryId:document.getElementById("qCat").value,difficulty:+document.getElementById("qDiff").value,
points:+document.getElementById("qPts").value,explanation:document.getElementById("qExpl").value,
answer:document.getElementById("qAns").value,options:window._opts};
if(id)await J("/questions/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
else await J("/questions",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
closeModal();loadQs();
}
async function delQ(id){if(!confirm("삭제?"))return;await J("/questions/"+id,{method:"DELETE"});loadQs()}
function showQDetail(id){const q=qs.find(x=>x.id===id);if(!q)return;
let h=`<h3>문제 상세</h3><p style="margin:8px 0">${esc(q.content)}</p>`;
if(q.options)h+=q.options.map(o=>`<div style="padding:2px 0;${o.isCorrect?"color:#16a34a;font-weight:700":""}">${o.label}. ${esc(o.text)} ${o.isCorrect?"(정답)":""}</div>`).join("");
if(q.answer)h+=`<p style="margin-top:8px"><b>정답:</b> ${esc(q.answer)}</p>`;
if(q.explanation)h+=`<div style="margin-top:8px;background:#f0f7ff;padding:8px;border-radius:4px;font-size:12px"><b>해설:</b> ${esc(q.explanation)}</div>`;
h+=`<div class="actions"><button class="btn btn-s" onclick="showQForm('${id}')">수정</button><button class="btn btn-s" onclick="closeModal()">닫기</button></div>`;
document.getElementById("modal-body").innerHTML=h;
document.getElementById("modal").classList.add("v");
}

// === Exams ===
async function loadExams(){
exams=await J("/exams");
let h=`<div class="wrap"><div class="card"><h3>시험 목록</h3>
<button class="btn btn-p" onclick="showExamForm()" style="margin-bottom:10px">시험 생성</button>
<table><tr><th>시험명</th><th>모드</th><th>문제수</th><th>시간</th><th>합격점</th><th>상태</th><th>응시</th><th>작업</th></tr>`;
if(!exams.length)h+=`<tr><td colspan="8" class="empty">시험 없음</td></tr>`;
exams.forEach(e=>{h+=`<tr>
<td>${esc(e.title)}</td>
<td>${e.mode==="MOCK"?"모의":"본시험"}</td>
<td>${e._count.items}</td>
<td>${e.timeLimitMin}분</td>
<td>${e.passingScore}점</td>
<td><span class="badge ${e.isPublished?"badge-g":"badge-y"} toggle" onclick="togglePub('${e.id}',${!e.isPublished})">${e.isPublished?"공개":"비공개"}</span></td>
<td>${e._count.attempts}회</td>
<td><button class="btn btn-s" onclick="showExamForm('${e.id}')">수정</button>
<button class="btn btn-d" onclick="delExam('${e.id}')">삭제</button></td></tr>`});
h+=`</table></div></div>`;
document.getElementById("p-exams").innerHTML=h;
}

async function togglePub(id,v){
await J("/exams/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({isPublished:v})});loadExams()}

function showExamForm(id){
const e=id?exams.find(x=>x.id===id):null;
const selIds=e?e.items.map(i=>i.question.id):[];
let h=`<h3>${e?"시험 수정":"시험 생성"}</h3>
<div class="form-grid">
<div><label>시험명</label><input id="eTitle" value="${esc(e?.title||"")}"/></div>
<div><label>모드</label><select id="eMode"><option value="MOCK" ${e?.mode==="MOCK"?"selected":""}>모의시험</option><option value="OFFICIAL" ${e?.mode==="OFFICIAL"?"selected":""}>본시험</option></select></div>
<div><label>제한시간(분)</label><input id="eTime" type="number" value="${e?.timeLimitMin||60}"/></div>
<div><label>합격점</label><input id="ePass" type="number" value="${e?.passingScore||70}"/></div>
<div><label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="eSQ" ${e?.shuffleQuestions!==false?"checked":""}/> 문제 셔플</label></div>
<div><label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="eSO" ${e?.shuffleOptions!==false?"checked":""}/> 보기 셔플</label></div>
<div class="full"><label>설명</label><textarea id="eDesc" rows="2">${esc(e?.description||"")}</textarea></div>
<div class="full"><label>문제 선택</label>
<div style="max-height:200px;overflow-y:auto;border:1px solid #ddd;border-radius:4px;padding:6px">`;
qs.forEach(q=>{h+=`<label style="display:flex;gap:6px;padding:2px 0;cursor:pointer">
<input type="checkbox" value="${q.id}" class="eq-cb" ${selIds.includes(q.id)?"checked":""}/>
<span style="flex:1">${esc(q.content).slice(0,50)}</span>
<span class="badge badge-b">${q.category?.name||""}</span></label>`});
h+=`</div></div></div>
<div class="actions"><button class="btn btn-p" onclick="saveExam('${id||""}')">${e?"수정":"생성"}</button>
<button class="btn btn-s" onclick="closeModal()">취소</button></div>`;
document.getElementById("modal-body").innerHTML=h;
document.getElementById("modal").classList.add("v");
}

async function saveExam(id){
const qIds=[...document.querySelectorAll(".eq-cb:checked")].map(e=>e.value);
const data={title:document.getElementById("eTitle").value,mode:document.getElementById("eMode").value,
timeLimitMin:+document.getElementById("eTime").value,passingScore:+document.getElementById("ePass").value,
shuffleQuestions:document.getElementById("eSQ").checked,shuffleOptions:document.getElementById("eSO").checked,
description:document.getElementById("eDesc").value,questionIds:qIds};
if(id)await J("/exams/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
else await J("/exams",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
closeModal();loadExams();
}
async function delExam(id){if(!confirm("삭제?"))return;await J("/exams/"+id,{method:"DELETE"});loadExams()}

function closeModal(){document.getElementById("modal").classList.remove("v")}
document.getElementById("modal").onclick=e=>{if(e.target.id==="modal")closeModal()}
function esc(s){if(!s)return"";const d=document.createElement("div");d.textContent=s;return d.innerHTML}

// init
(async()=>{cats=await J("/categories");const r=await J("/questions");qs=r.questions||[];loadCats()})();
</script>
</body>
</html>
