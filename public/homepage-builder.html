<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>홈생성 - Work Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:12px/1.45 'Pretendard',-apple-system,sans-serif;background:#f3f4f6;color:#0f172a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}

header{background:#1a365d;color:#fff;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
header h1{font-size:13px;font-weight:700}
header h1 a{color:#fff}
header h1 .sub{font-weight:400;font-size:11px;opacity:.8;margin-left:6px}
header .hr{display:flex;align-items:center;gap:6px;font-size:11px}
header .hr button{padding:3px 10px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:3px;font-size:10px;cursor:pointer;font-family:inherit}
header .hr button:hover{background:rgba(255,255,255,.25)}
.dirty-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#f59e0b;margin-left:4px}

/* ── Layout ─────────────────────────────── */
.fe-wrap{display:flex;gap:10px;padding:10px;flex:1;overflow:hidden}
.fe-sidebar{width:250px;background:#fff;border-radius:6px;border:1px solid #e3e5ed;overflow-y:auto;flex-shrink:0}
.fe-main{flex:1;overflow-y:auto}

/* ── Sidebar ────────────────────────────── */
.sb-hd{padding:7px 10px;font-size:10px;font-weight:700;color:#0088ff;background:#fafbfc;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.3px}
.sb-hd.lib{border-top:2px solid #0088ff;margin-top:4px;background:#f0f4ff}
.sb-hd .cnt{color:#94a3b8;font-weight:400;font-size:9px}
.sb-hd button{background:#16a34a;color:#fff;border:none;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;font-family:inherit}
.sb-hd button:hover{background:#15803d}

.fe-site{padding:6px 10px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.fe-site:hover{background:#f8fafc}
.fe-site.a{background:#f0f4ff;font-weight:700;color:#0088ff;border-left:3px solid #0088ff;padding-left:7px}
.fe-site .cnt{font-size:9px;color:#94a3b8;font-weight:400}

.fe-form-item{padding:4px 10px 4px 22px;cursor:pointer;font-size:11px;color:#555;border-bottom:1px solid #f8f8f8;display:flex;justify-content:space-between;gap:4px;align-items:center}
.fe-form-item:hover{background:#f8fafc;color:#0088ff}
.fe-form-item.a{background:#e8f4ff;font-weight:700;color:#0088ff}
.fe-form-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fe-form-item .meta{font-size:9px;color:#94a3b8;font-weight:400}
.fe-form-item.plus{color:#16a34a;font-style:italic}
.fe-form-item.plus:hover{background:#f0fdf4}

.rg-head{padding:4px 10px;font-size:9px;font-weight:700;background:#fafbfc;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #eee;text-transform:uppercase;letter-spacing:.3px}
.rg-sub{padding:2px 10px 2px 18px;font-size:8px;font-weight:600;color:#94a3b8;background:#fff;text-transform:uppercase;letter-spacing:.2px}

/* ── Main Editor ─────────────────────────── */
.fe-editor{background:#fff;border-radius:6px;border:1px solid #e3e5ed;padding:12px 14px}
.fe-editor h3{font-size:13px;font-weight:700;color:#0088ff;margin-bottom:10px}
.fe-toolbar{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.fe-toolbar button{padding:5px 13px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.fe-toolbar .meta-summary{margin-left:auto;font-size:10px;color:#64748b}

.fe-meta{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-bottom:8px;padding:8px 10px;background:#fafbfc;border:1px solid #e3e5ed;border-radius:5px}
.fe-meta .fld{display:flex;flex-direction:column;gap:2px}
.fe-meta .fld label{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px}
.fe-meta .fld input{padding:4px 8px;border:1px solid #cbd5e1;border-radius:3px;font-size:11px;font-family:inherit;outline:none}
.fe-meta .fld input:focus{border-color:#0088ff;background:#fefefe}
.fe-meta .chips{display:flex;gap:3px;flex-wrap:wrap}

/* ── Chips ──────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid #cbd5e1;border-radius:3px;background:#fff;font-size:10px;cursor:pointer;color:#64748b;font-family:inherit;font-weight:600}
.chip:hover{background:#f1f5f9;border-color:#94a3b8}
.chip.a{background:#0088ff;color:#fff;border-color:#0088ff}
.chip.rd{border-radius:10px}
.chip.sm{padding:2px 6px;font-size:9px}

/* ── Phase block (sections block) ────────── */
.phase-block{background:#fff;border:1px solid #e3e5ed;border-radius:6px;padding:10px;margin-bottom:10px}
.phase-block h4{font-size:12px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;color:#1a365d}
.phase-block h4 .pbadge{padding:2px 8px;border-radius:10px;font-size:10px;color:#fff;background:#1a365d}
.phase-block h4 .meta{color:#888;font-weight:400;font-size:10px}

.phase-mod-chips{display:flex;gap:3px;flex-wrap:wrap;padding:6px 8px;background:#f8fafc;border-radius:4px;margin-bottom:6px;min-height:30px;align-items:center}
.phase-mod-chip{display:inline-flex;align-items:center;gap:2px;padding:3px 7px;border-radius:3px;font-size:10px;font-weight:600;border:1px solid}
.phase-mod-chip .mv{cursor:pointer;opacity:.5;padding:0 1px;font-size:9px;user-select:none}
.phase-mod-chip .mv:hover{opacity:1}
.phase-mod-chip button.ed{margin-left:2px;background:#fff;font-size:8px;padding:1px 4px;border-radius:2px;cursor:pointer;font-weight:700;font-family:inherit}
.phase-mod-chip .x{cursor:pointer;font-size:12px;padding:0 2px;margin-left:2px;opacity:.7}
.phase-mod-chip .x:hover{opacity:1;color:#dc2626}

.phase-add{margin-top:6px;padding-top:6px;border-top:1px dashed #e3e5ed}
.phase-add .title{font-size:9px;color:#64748b;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.phase-add-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:3px}
.phase-add-row .label{font-size:8px;font-weight:700;min-width:64px;padding:3px 0;text-transform:uppercase;letter-spacing:.2px}
.phase-add-row .chips-wrap{flex:1;display:flex;flex-wrap:wrap;gap:2px}
.phase-add-chip{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600;border:1px solid;cursor:pointer}

/* ── 4-col content preview ──────────────── */
.phase-sections{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.ps-card{background:#fff;border:1px solid #e3e5ed;border-radius:4px;overflow:hidden;font-size:9px}
.ps-head{padding:4px 7px;display:flex;justify-content:space-between;align-items:center;font-weight:700;gap:4px}
.ps-head .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps-head button{background:#fff;border:1px solid;padding:0 5px;border-radius:2px;font-size:8px;cursor:pointer;font-weight:700;font-family:inherit}
.ps-body{padding:4px 7px;max-height:130px;overflow-y:auto}
.ps-fld{padding:1px 0;border-bottom:1px dashed #f1f5f9;display:flex;justify-content:space-between;gap:3px}
.ps-fld .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#475569;font-weight:600}
.ps-fld .tp{color:#94a3b8;font-size:8px}

/* ── Empty state / home cards grid ───────── */
.cp-empty{padding:40px 20px;text-align:center;color:#94a3b8}
.cp-empty .big-ic{font-size:48px;margin-bottom:10px}
.cp-empty button{padding:8px 16px;background:#0088ff;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit}
.hp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.hp-card{background:#fff;border:1px solid #e3e5ed;border-top:3px solid #64748b;border-radius:6px;padding:8px 10px;cursor:pointer;transition:.15s}
.hp-card:hover{box-shadow:0 2px 8px rgba(26,54,93,.12)}
.hp-card .top{display:flex;gap:4px;margin-bottom:3px;flex-wrap:wrap}
.hp-card .site-badge{padding:1px 7px;border-radius:10px;color:#fff;font-size:9px;font-weight:700;white-space:nowrap}
.hp-card .cnt-badge{font-size:9px;padding:1px 5px;background:#f1f5f9;border-radius:8px;color:#64748b;font-weight:700}
.hp-card .hp-nm{font-size:12px;font-weight:700;color:#1a365d;margin-bottom:2px}
.hp-card .hp-slug{font-size:9px;color:#94a3b8}

/* ── Module editor modal ─────────────────── */
.fp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.fp-modal{background:#fff;border-radius:10px;width:980px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative}
.fp-close{position:absolute;top:10px;right:14px;font-size:20px;cursor:pointer;color:#999;z-index:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#f5f5f5;font-family:inherit}
.fp-close:hover{background:#eee;color:#333}
.fp-header{padding:14px 20px 10px;border-bottom:2px solid}
.fp-header h2{font-size:16px;font-weight:700;margin-bottom:3px}
.fp-header p{font-size:10px;color:#64748b}
.fp-body{padding:14px 18px}

.me-row{display:flex;gap:4px;align-items:center;margin-bottom:5px}
.me-row.top{align-items:flex-start}
.me-row .me-lbl{font-size:9px;color:#64748b;font-weight:700;min-width:62px;text-transform:uppercase;letter-spacing:.3px;padding-top:4px}
.me-row input,.me-row textarea{padding:4px 7px;border:1px solid #cbd5e1;border-radius:3px;font-size:11px;outline:none;font-family:inherit;flex:1}
.me-row input:focus,.me-row textarea:focus{border-color:#0088ff}
.me-row textarea{resize:vertical;min-height:48px;font-family:inherit}
.me-row .chips{display:flex;gap:3px;flex-wrap:wrap;flex:1}

.me-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}
.me-card{background:#fff;border:1px solid #e3e5ed;border-top:3px solid #64748b;border-radius:5px;padding:6px 8px;font-size:10px;display:flex;flex-direction:column;gap:3px;position:relative}
.me-card input,.me-card textarea{width:100%;padding:2px 4px;border:1px solid #e3e5ed;border-radius:2px;font-size:10px;font-family:inherit}
.me-card .me-del{position:absolute;top:3px;right:3px;cursor:pointer;color:#cbd5e1;font-size:14px;line-height:1;padding:1px 4px}
.me-card .me-del:hover{color:#dc2626}
.me-card .inrow{display:flex;gap:3px;align-items:center}
.me-card .inlbl{font-size:8px;color:#94a3b8;font-weight:700;min-width:26px}

.me-add-card{background:#fafbfc;border:1px dashed #cbd5e1;border-radius:5px;padding:10px;text-align:center;font-size:10px;color:#888;cursor:pointer;font-weight:700}
.me-add-card:hover{background:#f0f4ff;border-color:#0088ff;color:#0088ff}

/* ── Verify landing result ───────────────── */
.landing-result{margin-top:6px;padding:6px 10px;border-radius:4px;font-size:10px;border:1px solid}
.landing-result.ok{background:#ecfdf5;border-color:#059669;color:#065f46}
.landing-result.err{background:#fef2f2;border-color:#dc2626;color:#991b1b}

/* ── Toast ──────────────────────────────── */
.toast{position:fixed;bottom:16px;right:16px;background:#0f172a;color:#fff;padding:8px 14px;border-radius:6px;font-size:11px;z-index:9999;opacity:0;transition:.2s;pointer-events:none;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.v{opacity:1}
.toast.err{background:#dc2626}
.toast.ok{background:#059669}

/* ── Search ─────────────────────────────── */
.sb-search{padding:6px 8px;border-bottom:1px solid #eee}
.sb-search input{width:100%;padding:4px 7px;border:1px solid #cbd5e1;border-radius:3px;font-size:10px;outline:none;font-family:inherit}
.sb-search input:focus{border-color:#0088ff}
</style>
</head>
<body>

<header>
  <h1><a href="admin.html">Work Studio</a><span class="sub">홈생성</span><span id="dirtyInd"></span></h1>
  <div class="hr">
    <span style="color:rgba(255,255,255,.6);font-size:10px">신청서 포맷 포트 · sections[] 모듈 조립</span>
    <button onclick="location.href='admin.html'">← 관리자</button>
  </div>
</header>

<div class="fe-wrap">
  <div class="fe-sidebar" id="sidebar"></div>
  <div class="fe-main" id="main"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════ */
/*   상수                                                        */
/* ═══════════════════════════════════════════════════════════ */

const WEBSITES = [
  { id:'tesol',         name:'TESOL',           color:'#be185d' },
  { id:'ai_trans',      name:'AI 번역',         color:'#2563eb' },
  { id:'reading',       name:'통독문서',        color:'#059669' },
  { id:'ai_ethics',     name:'AI 윤리',         color:'#dc2626' },
  { id:'exhibit',       name:'전시/행사',       color:'#0891b2' },
  { id:'cbt',           name:'시험',            color:'#d97706' },
  { id:'matching',      name:'전문가매칭',      color:'#9333ea' },
  { id:'level_test',    name:'레벨테스트',      color:'#7c3aed' },
  { id:'hutechc',       name:'휴텍씨',          color:'#1a365d' },
  { id:'iita',          name:'IITA협회',        color:'#334155' },
  { id:'semiconductor', name:'반도체/조선/방산', color:'#64748b' },
];

const TYPE_GROUPS = [
  { id:'layout', name:'🎨 레이아웃', color:'#1a365d', bg:'#eef2ff', bd:'#c7d2fe',
    types:[
      { id:'banner', icon:'🎯', name:'히어로 배너' },
      { id:'nav',    icon:'🧭', name:'네비게이션' },
      { id:'footer', icon:'⬇️', name:'푸터' },
    ] },
  { id:'community', name:'💬 커뮤니티', color:'#059669', bg:'#ecfdf5', bd:'#a7f3d0',
    types:[
      { id:'notice', icon:'📢', name:'공지사항' },
      { id:'faq',    icon:'❓', name:'FAQ' },
      { id:'qna',    icon:'💬', name:'Q&A' },
      { id:'review', icon:'⭐', name:'후기' },
      { id:'blog',   icon:'📝', name:'블로그' },
    ] },
  { id:'form', name:'📋 지원/접수', color:'#7c3aed', bg:'#f5f3ff', bd:'#ddd6fe',
    types:[
      { id:'inquiry',   icon:'📧', name:'1:1 문의' },
      { id:'apply_ref', icon:'📝', name:'신청서 참조' },
    ] },
  { id:'legal', name:'📜 법적', color:'#d97706', bg:'#fffbeb', bd:'#fde68a',
    types:[
      { id:'terms',   icon:'📜', name:'이용약관' },
      { id:'privacy', icon:'🔐', name:'개인정보처리방침' },
    ] },
  { id:'block', name:'🧩 블록', color:'#be185d', bg:'#fdf2f8', bd:'#fbcfe8',
    types:[
      { id:'block_cat_multi',  icon:'🗂️', name:'카테고리 선택' },
      { id:'block_file_drop',  icon:'📎', name:'파일 업로드' },
      { id:'block_ai_radio4',  icon:'🤖', name:'AI 모델' },
      { id:'block_editor',     icon:'✏️', name:'편집 에디터' },
      { id:'block_human',      icon:'👷', name:'휴먼 작업' },
      { id:'block_opts',       icon:'⚙️', name:'추가 옵션' },
      { id:'block_lang_pair',  icon:'🈂️', name:'언어쌍' },
      { id:'block_quality',    icon:'📊', name:'품질 패널' },
      { id:'block_regulation', icon:'📋', name:'프롬 규정' },
      { id:'block_textarea',   icon:'📝', name:'텍스트 입력' },
    ] },
];

function getTypeInfo(typeId) {
  for (const g of TYPE_GROUPS) {
    const t = g.types.find(t => t.id === typeId);
    if (t) return { group: g, type: t };
  }
  const fallback = TYPE_GROUPS[0];
  return { group: fallback, type: { id: typeId, icon: '•', name: typeId || '(타입 없음)' } };
}

/* ═══════════════════════════════════════════════════════════ */
/*   State                                                       */
/* ═══════════════════════════════════════════════════════════ */

let homepages = [];
let modules = [];        // homepage_modules
let formTemplates = [];  // for apply_ref picker
let hmSite = null;       // selected site in sidebar (null = 전체)
let hmHpId = null;       // selected homepage id
let hmData = null;       // working copy of selected hp
let dirty = false;
let sbSearch = '';
let meEditModId = null;  // currently editing module id in modal

/* ═══════════════════════════════════════════════════════════ */
/*   Init                                                        */
/* ═══════════════════════════════════════════════════════════ */

async function init() {
  try {
    await Promise.all([loadHomepages(), loadModules(), loadFormTemplates()]);
  } catch(e) {
    toast('데이터 로딩 실패: ' + e.message, 'err');
  }
  rHomes();
}

async function loadHomepages() {
  try {
    const r = await fetch('/api/homepages');
    const rows = await r.json();
    homepages = (rows || []).map(row => {
      try {
        const d = JSON.parse(row.data);
        return migrateHp(Object.assign({}, d, { id: row.id, _created: row.created_at }));
      } catch { return null; }
    }).filter(Boolean);
  } catch(e) { homepages = []; }
}

async function loadModules() {
  try {
    const r = await fetch('/api/homepage_modules');
    const rows = await r.json();
    modules = (rows || []).map(row => {
      try { return Object.assign({}, JSON.parse(row.data), { id: row.id }); }
      catch { return null; }
    }).filter(Boolean);
  } catch(e) { modules = []; }
}

async function loadFormTemplates() {
  try {
    const r = await fetch('/api/form_templates');
    const rows = await r.json();
    formTemplates = (rows || []).map(row => {
      try { return Object.assign({}, JSON.parse(row.data), { id: row.id }); }
      catch { return null; }
    }).filter(Boolean);
  } catch(e) { formTemplates = []; }
}

function migrateHp(hp) {
  if (!Array.isArray(hp.sections)) hp.sections = [];
  if (!hp.landing) hp.landing = { repoUrl:'', branch:'main', deployPath:'/', verified:null };
  if (!hp.deploy)  hp.deploy  = { lastPublished:'' };
  if (!hp._notesFiles) hp._notesFiles = [];
  return hp;
}

function getModule(modId) { return modules.find(m => m.moduleId === modId); }
function assembleHome(hp) {
  return (hp.sections || []).map(mid => getModule(mid)).filter(Boolean);
}
function countModuleUsage(modId) {
  return homepages.filter(hp => (hp.sections || []).includes(modId)).length;
}

/* ═══════════════════════════════════════════════════════════ */
/*   Render                                                      */
/* ═══════════════════════════════════════════════════════════ */

function rHomes() {
  renderSidebar();
  renderMain();
  updateDirty();
}

function renderSidebar() {
  let h = '';
  h += `<div class="sb-search"><input placeholder="🔍 검색 (홈/모듈)" value="${escAttr(sbSearch)}" oninput="sbSearch=this.value;renderSidebar()"></div>`;

  // ─── 홈페이지 목록 (사이트별) ───
  h += `<div class="sb-hd">📋 홈페이지 <span class="cnt">${homepages.length}개</span></div>`;
  const q = sbSearch.toLowerCase();
  const filter = hp => !q || (hp.name || '').toLowerCase().includes(q) || (hp.slug || '').toLowerCase().includes(q);

  for (const w of WEBSITES) {
    const list = homepages.filter(hp => hp.linkedSite === w.id).filter(filter);
    if (!list.length && hmSite !== w.id) continue;
    const active = hmSite === w.id;
    h += `<div class="fe-site ${active?'a':''}" onclick="hmSelSite('${w.id}')">
      <span>${esc(w.name)}</span><span class="cnt">${list.length}개</span></div>`;
    if (active) {
      for (const hp of list) {
        const sel = hmHpId === hp.id;
        h += `<div class="fe-form-item ${sel?'a':''}" onclick="hmSelHp(${hp.id})">
          <span class="nm">${esc(hp.name)}</span><span class="meta">${(hp.sections||[]).length}섹</span></div>`;
      }
      h += `<div class="fe-form-item plus" onclick="hmAddHp('${w.id}')">+ 홈페이지 추가</div>`;
    }
  }

  // 미지정
  const unset = homepages.filter(hp => !hp.linkedSite).filter(filter);
  if (unset.length || hmSite === 'unset') {
    const active = hmSite === 'unset';
    h += `<div class="fe-site ${active?'a':''}" onclick="hmSelSite('unset')">
      <span>📁 미지정</span><span class="cnt">${unset.length}개</span></div>`;
    if (active) {
      for (const hp of unset) {
        const sel = hmHpId === hp.id;
        h += `<div class="fe-form-item ${sel?'a':''}" onclick="hmSelHp(${hp.id})">
          <span class="nm">${esc(hp.name)}</span><span class="meta">${(hp.sections||[]).length}섹</span></div>`;
      }
      h += `<div class="fe-form-item plus" onclick="hmAddHp('')">+ 홈페이지 추가</div>`;
    }
  }

  // ─── 콘텐츠 모듈 라이브러리 ───
  h += `<div class="sb-hd lib">
    <span>🧩 콘텐츠 모듈 <span class="cnt">${modules.length}</span></span>
    <button onclick="event.stopPropagation();hmAddNewModule()">+ 새</button></div>`;

  const modFilter = m => !q || (m.name || '').toLowerCase().includes(q) || (m.moduleId || '').toLowerCase().includes(q);
  for (const grp of TYPE_GROUPS) {
    const gMods = modules.filter(m => m.category === grp.id).filter(modFilter);
    if (!gMods.length) continue;
    h += `<div class="rg-head" style="color:${grp.color};background:${grp.bg}">
      <span>${esc(grp.name)}</span><span class="cnt">${gMods.length}</span></div>`;
    for (const t of grp.types) {
      const typeMods = gMods.filter(m => m.type === t.id);
      if (!typeMods.length) continue;
      h += `<div class="rg-sub">${t.icon} ${esc(t.name)}</div>`;
      for (const m of typeMods) {
        const usage = countModuleUsage(m.moduleId);
        h += `<div class="fe-form-item" style="padding-left:22px;color:${grp.color}" onclick="hmEditModule('${esc(m.moduleId)}')" title="클릭 → 편집">
          <span class="nm">${t.icon} ${esc(m.name)}</span>
          <span class="meta">${usage>0?usage+'곳':''}</span></div>`;
      }
    }
  }

  document.getElementById('sidebar').innerHTML = h;
}

function renderMain() {
  const main = document.getElementById('main');

  if (!hmHpId || !hmData) {
    // 초기 화면 — 전체 홈페이지 카드 그리드
    let h = `<div class="fe-editor"><h3>홈페이지 선택</h3>
      <p style="font-size:11px;color:#64748b;margin-bottom:8px">왼쪽에서 홈페이지를 선택하거나 <b>+ 홈페이지 추가</b>로 시작하세요. 전체 ${homepages.length}개:</p>`;
    if (!homepages.length) {
      h += `<div class="cp-empty"><div class="big-ic">🏠</div>
        <div>아직 홈페이지가 없습니다.</div>
        <button onclick="hmAddHp('')">+ 새 홈페이지 만들기</button></div>`;
    } else {
      h += `<div class="hp-grid">${homepages.map(renderHpCard).join('')}</div>`;
    }
    h += `</div>`;
    main.innerHTML = h;
    return;
  }

  main.innerHTML = renderHomeEditor();
}

function renderHpCard(hp) {
  const w = WEBSITES.find(x => x.id === hp.linkedSite) || { name: '미지정', color: '#64748b' };
  const secs = (hp.sections || []).length;
  return `<div class="hp-card" style="border-top-color:${w.color}" onclick="hmSelHp(${hp.id})">
    <div class="top">
      <span class="site-badge" style="background:${w.color}">${esc(w.name)}</span>
      <span class="cnt-badge">${secs}섹션</span>
      <span class="cnt-badge" style="background:#fef3c7;color:#d97706">${esc(hp.status||'draft')}</span>
    </div>
    <div class="hp-nm">${esc(hp.name)}</div>
    <div class="hp-slug">${hp.slug ? '/'+esc(hp.slug) : '(슬러그 미지정)'}</div>
  </div>`;
}

function renderHomeEditor() {
  const hp = hmData;
  const secs = assembleHome(hp);
  const w = WEBSITES.find(x => x.id === hp.linkedSite);
  const usedIds = new Set(hp.sections || []);
  const canPreview = !!hp.slug && /^[a-z0-9-]+$/.test(hp.slug);

  let h = `<div class="fe-editor">`;

  // ── Toolbar ──
  h += `<div class="fe-toolbar">
    <button style="background:#0088ff;color:#fff" onclick="hmSave()">💾 저장${dirty?' *':''}</button>
    <button style="background:#059669;color:#fff" onclick="hmPreview()" ${canPreview?'':'disabled style="opacity:.4;cursor:not-allowed;background:#059669;color:#fff"'}>📄 PRD 뷰어</button>
    <button style="background:#fff;border:1px solid #dc2626;color:#dc2626" onclick="hmDelete()">삭제</button>
    <span class="meta-summary">${w?esc(w.name):'(사이트 미지정)'} › ${esc(hp.name)} · ${secs.length}섹션${canPreview?' · /'+esc(hp.slug):''}</span></div>`;

  // ── Meta row 1: name/slug/status ──
  h += `<div class="fe-meta">
    <div class="fld"><label>이름</label>
      <input value="${escAttr(hp.name)}" onchange="hmField('name',this.value);renderSidebar()" style="width:220px"></div>
    <div class="fld"><label>슬러그 (PRD URL)</label>
      <input value="${escAttr(hp.slug)}" placeholder="my-homepage" onchange="hmField('slug',this.value);renderSidebar();rMain()" style="width:180px"></div>
    <div class="fld"><label>상태</label>
      <div class="chips">${['draft','published','archived'].map(s =>
        `<span class="chip ${hp.status===s?'a':''}" onclick="hmField('status','${s}');rMain()">${s}</span>`).join('')}</div></div>
    <div class="fld" style="flex:1"><label>연결 사이트</label>
      <div class="chips">${WEBSITES.map(w =>
        `<span class="chip ${hp.linkedSite===w.id?'a':''}" onclick="hmField('linkedSite','${w.id}');renderSidebar()">${esc(w.name)}</span>`).join('')}</div></div>
  </div>`;

  // ── Meta row 2: landing ──
  const l = hp.landing || {};
  h += `<div class="fe-meta">
    <div class="fld" style="flex:1;min-width:260px"><label>랜딩 GitHub Repo</label>
      <input value="${escAttr(l.repoUrl||'')}" placeholder="https://github.com/... 또는 owner/repo"
        onchange="hmFieldPath('landing.repoUrl',this.value)"></div>
    <div class="fld"><label>브랜치</label>
      <input value="${escAttr(l.branch||'main')}" onchange="hmFieldPath('landing.branch',this.value)" style="width:90px"></div>
    <div class="fld"><label>경로</label>
      <input value="${escAttr(l.deployPath||'/')}" onchange="hmFieldPath('landing.deployPath',this.value)" style="width:70px"></div>
    <div class="fld"><label>&nbsp;</label>
      <button class="chip a" style="padding:4px 10px;font-size:10px" onclick="hmVerifyLanding()">🔗 연결 테스트</button></div>
  </div>`;
  if (l.verified && typeof l.verified === 'object') {
    const v = l.verified;
    h += `<div class="landing-result ok">✓ <b>${esc(v.fullName)}</b>${v.description?' — '+esc(v.description):''} · ⭐ ${v.stars||0} · 🍴 ${v.forks||0} · ${v.hasPages?'🌐 Pages 활성':'Pages 비활성'}</div>`;
  } else if (l.verified === false) {
    h += `<div class="landing-result err">✗ 연결 실패 — 유효하지 않은 URL 또는 접근 불가</div>`;
  }

  // ── Sections block (phase-block equivalent) ──
  h += `<div class="phase-block">
    <h4><span class="pbadge">📋</span><span>섹션 구성</span>
    <span class="meta">${secs.length}개 모듈 · 순서 = 표시 순서</span></h4>`;

  // 포함된 모듈 칩 (순서대로)
  h += `<div class="phase-mod-chips">`;
  if (!(hp.sections||[]).length) {
    h += `<span style="font-size:9px;color:#94a3b8;font-style:italic">모듈 없음 — 아래에서 +로 추가하세요</span>`;
  } else {
    (hp.sections||[]).forEach((mid, i) => {
      const m = getModule(mid);
      if (!m) {
        h += `<span class="phase-mod-chip" style="background:#fee2e2;color:#b91c1c;border-color:#fca5a5">
          ❓ ${esc(mid)} <span class="x" onclick="hmRemoveSection(${i})">×</span></span>`;
        return;
      }
      const { group: g, type: t } = getTypeInfo(m.type);
      h += `<span class="phase-mod-chip" style="background:${g.bg};color:${g.color};border-color:${g.bd}">
        <span class="mv" onclick="hmMoveSection(${i},-1)" title="위로">▲</span>
        <span class="mv" onclick="hmMoveSection(${i},1)" title="아래로">▼</span>
        ${t.icon} ${esc(m.name)}
        <button class="ed" style="color:${g.color};border-color:${g.bd}" onclick="event.stopPropagation();hmEditModule('${esc(m.moduleId)}')">편집</button>
        <span class="x" onclick="hmRemoveSection(${i})">×</span></span>`;
    });
  }
  h += `</div>`;

  // 추가 가능한 모듈 — 타입 그룹별 칩 리스트
  h += `<div class="phase-add">
    <div class="title">+ 섹션 추가 (클릭하여 모듈을 배열 끝에 추가)</div>`;
  for (const grp of TYPE_GROUPS) {
    const groupMods = modules.filter(m => m.category === grp.id && !usedIds.has(m.moduleId));
    if (!groupMods.length) continue;
    h += `<div class="phase-add-row">
      <span class="label" style="color:${grp.color}">${esc(grp.name)}</span>
      <div class="chips-wrap">${groupMods.map(m => {
        const { type: t } = getTypeInfo(m.type);
        return `<span class="phase-add-chip" style="background:${grp.bg};color:${grp.color};border-color:${grp.bd}"
          onclick="hmAddSection('${esc(m.moduleId)}')">+ ${t.icon} ${esc(m.name)}</span>`;
      }).join('')}
      <span class="phase-add-chip" style="background:#f8fafc;color:#64748b;border-color:#cbd5e1;border-style:dashed" onclick="hmAddNewModuleFor('${grp.id}')">+ 새 ${esc(grp.name.replace(/^[^ ]+ /, ''))} 모듈</span>
      </div></div>`;
  }
  h += `</div>`;

  // 4단 그리드 콘텐츠 미리보기
  if (secs.length) {
    h += `<div class="phase-sections">`;
    secs.forEach(m => {
      const { group: g, type: t } = getTypeInfo(m.type);
      h += `<div class="ps-card" style="border-top:3px solid ${g.color}">
        <div class="ps-head" style="background:${g.bg};color:${g.color}">
          <span class="nm">${t.icon} ${esc(m.name)}</span>
          <button style="color:${g.color};border-color:${g.bd}" onclick="hmEditModule('${esc(m.moduleId)}')">편집</button>
        </div>
        <div class="ps-body">${renderSectionPreview(m)}</div>
      </div>`;
    });
    h += `</div>`;
  }
  h += `</div>`; // close phase-block
  h += `</div>`; // close fe-editor
  return h;
}

function renderSectionPreview(m) {
  const d = m.data || {};
  const items = arr => arr && arr.length ? arr : [];
  switch (m.type) {
    case 'banner':
      return `<div class="ps-fld"><span class="nm">${esc(d.title||'(미설정)')}</span><span class="tp">title</span></div>
        ${d.subtitle?`<div class="ps-fld"><span class="nm">${esc(d.subtitle)}</span><span class="tp">sub</span></div>`:''}
        ${d.ctaLabel?`<div class="ps-fld"><span class="nm">${esc(d.ctaLabel)} → ${esc(d.ctaUrl||'#')}</span><span class="tp">CTA</span></div>`:''}`;
    case 'footer':
      return `<div class="ps-fld"><span class="nm">${esc(d.company||'(미설정)')}</span><span class="tp">회사</span></div>
        ${d.address?`<div class="ps-fld"><span class="nm">${esc(d.address)}</span><span class="tp">주소</span></div>`:''}
        ${d.contact?`<div class="ps-fld"><span class="nm">${esc(d.contact)}</span><span class="tp">연락</span></div>`:''}`;
    case 'nav':
      return items(d.sections).slice(0,6).map(s =>
        `<div class="ps-fld"><span class="nm">${esc(s.label||'')}</span><span class="tp">#${esc(s.id||'')}</span></div>`).join('') || '<div class="ps-fld"><span class="nm" style="font-style:italic">섹션 없음</span></div>';
    case 'notice':
      return items(d.items).slice(0,5).map(it =>
        `<div class="ps-fld"><span class="nm">${esc(it.title||'')}</span><span class="tp">${esc((it.date||'').slice(5))}</span></div>`).join('') + (items(d.items).length>5?`<div style="font-size:8px;text-align:center;color:#94a3b8">+${d.items.length-5}</div>`:'') || '<div class="ps-fld"><span class="nm" style="font-style:italic">항목 없음</span></div>';
    case 'faq':
      return items(d.items).slice(0,5).map(it =>
        `<div class="ps-fld"><span class="nm">Q. ${esc(it.q||'')}</span></div>`).join('') + (items(d.items).length>5?`<div style="font-size:8px;text-align:center;color:#94a3b8">+${d.items.length-5}</div>`:'') || '<div class="ps-fld"><span class="nm" style="font-style:italic">항목 없음</span></div>';
    case 'qna':
      return `<div class="ps-fld"><span class="nm">${d.policy==='manual'?'관리자 승인':'자동 공개'}</span><span class="tp">정책</span></div>
        <div class="ps-fld"><span class="nm">${esc((d.categories||[]).join(', '))}</span><span class="tp">분류</span></div>`;
    case 'review':
      return `<div class="ps-fld"><span class="nm">최근 ${d.limit||10}개</span><span class="tp">limit</span></div>
        <div class="ps-fld"><span class="nm">${esc(d.sort||'latest')}</span><span class="tp">sort</span></div>`;
    case 'blog':
      return `<div class="ps-fld"><span class="nm">${esc((d.categories||[]).join(', ')||'카테고리 없음')}</span><span class="tp">cat</span></div>`;
    case 'inquiry':
      return items(d.fields).map(f => `<div class="ps-fld"><span class="nm">${esc(f)}</span></div>`).join('') || '<div class="ps-fld"><span class="nm" style="font-style:italic">필드 없음</span></div>';
    case 'terms':
    case 'privacy':
      return `<div class="ps-fld"><span class="nm">${esc((d.text||'').slice(0,120))}${(d.text||'').length>120?'…':''}</span></div>
        <div style="font-size:8px;color:#94a3b8;text-align:right">${(d.text||'').length}자</div>`;
    case 'apply_ref': {
      const tpl = formTemplates.find(t => t.id === d.templateId);
      if (!tpl) return `<div class="ps-fld"><span class="nm" style="color:#dc2626">템플릿 #${d.templateId} 없음</span></div>`;
      return `<div class="ps-fld"><span class="nm">${esc(tpl.name||'')}</span><span class="tp">#${tpl.id}</span></div>
        <div class="ps-fld"><span class="nm">${esc(tpl._site||'')}/${esc(tpl._formId||'')}</span><span class="tp">src</span></div>
        <div class="ps-fld"><span class="nm">${(d.phases||[]).join(' + ')}</span><span class="tp">phase</span></div>`;
    }
    default:
      if (m.type.startsWith('block_')) {
        return `<div class="ps-fld"><span class="nm" style="font-family:monospace;font-size:9px">${esc(JSON.stringify(d).slice(0,120))}${JSON.stringify(d).length>120?'…':''}</span></div>`;
      }
      return `<div class="ps-fld"><span class="nm" style="color:#94a3b8">—</span></div>`;
  }
}

/* ═══════════════════════════════════════════════════════════ */
/*   CRUD (Homepages)                                            */
/* ═══════════════════════════════════════════════════════════ */

function hmSelSite(id) { hmSite = id; rHomes(); }

function hmSelHp(id) {
  if (dirty && !confirm('저장되지 않은 변경사항이 있습니다. 이동할까요?')) return;
  const hp = homepages.find(h => h.id === id);
  if (!hp) return;
  hmHpId = id;
  hmData = JSON.parse(JSON.stringify(hp));
  migrateHp(hmData);
  dirty = false;
  // site 자동 동기화 (카드에서 선택 시)
  if (hp.linkedSite) hmSite = hp.linkedSite;
  else hmSite = 'unset';
  rHomes();
}

async function hmAddHp(siteId) {
  const name = prompt('홈페이지 이름:');
  if (!name) return;
  const data = {
    name, slug: '', linkedSite: siteId || '', status: 'draft',
    landing: { repoUrl:'', branch:'main', deployPath:'/', verified:null },
    sections: [],
    deploy: { lastPublished:'' },
    _notes: '', _notesFiles: [],
  };
  try {
    const r = await fetch('/api/homepages', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    const j = await r.json();
    await loadHomepages();
    hmSite = siteId || 'unset';
    hmHpId = j.id;
    const hp = homepages.find(h => h.id === j.id);
    hmData = JSON.parse(JSON.stringify(hp));
    migrateHp(hmData);
    dirty = false;
    rHomes();
    toast('홈페이지 생성', 'ok');
  } catch(e) { toast('생성 실패: '+e.message, 'err'); }
}

async function hmSave() {
  if (!hmData) return;
  try {
    const { id, _created, ...data } = hmData;
    await fetch('/api/homepages/' + hmData.id, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    await loadHomepages();
    const hp = homepages.find(h => h.id === hmData.id);
    if (hp) { hmData = JSON.parse(JSON.stringify(hp)); migrateHp(hmData); }
    dirty = false;
    toast('저장 완료', 'ok');
    rHomes();
  } catch(e) { toast('저장 실패: '+e.message, 'err'); }
}

async function hmDelete() {
  if (!hmData) return;
  if (!confirm(`홈페이지 '${hmData.name}' 삭제?`)) return;
  try {
    await fetch('/api/homepages/' + hmData.id, { method:'DELETE' });
    hmHpId = null; hmData = null; dirty = false;
    await loadHomepages();
    rHomes();
    toast('삭제 완료', 'ok');
  } catch(e) { toast('삭제 실패: '+e.message, 'err'); }
}

function hmPreview() {
  if (!hmData) return;
  if (!hmData.slug) { toast('슬러그를 먼저 지정하세요', 'err'); return; }
  if (dirty) {
    if (!confirm('저장되지 않은 변경이 있습니다. 저장 후 열기?')) return;
    hmSave().then(() => window.open('/hp/' + hmData.slug, '_blank'));
  } else {
    window.open('/hp/' + hmData.slug, '_blank');
  }
}

async function hmVerifyLanding() {
  if (!hmData || !hmData.landing?.repoUrl) { toast('URL을 먼저 입력하세요', 'err'); return; }
  let url = hmData.landing.repoUrl.trim().replace(/\.git$/, '').replace(/\/$/, '');
  let m = url.match(/github\.com[/:]+([^/]+)\/([^/]+)/);
  if (!m) m = url.match(/^([^/\s]+)\/([^/\s]+)$/);
  if (!m) { hmData.landing.verified = false; dirty = true; rMain(); toast('유효하지 않은 GitHub URL', 'err'); return; }
  toast('GitHub API 확인 중...', 'ok');
  try {
    const r = await fetch('https://api.github.com/repos/' + m[1] + '/' + m[2]);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    hmData.landing.verified = {
      owner: j.owner?.login, repo: j.name, fullName: j.full_name,
      description: j.description || '', stars: j.stargazers_count||0, forks: j.forks_count||0,
      defaultBranch: j.default_branch||'main', pushedAt: j.pushed_at||'', hasPages: !!j.has_pages,
      url: j.html_url,
    };
    hmData.landing.lastSync = new Date().toISOString().slice(0,16).replace('T',' ');
    dirty = true;
    rMain();
    toast('✓ ' + j.full_name, 'ok');
  } catch(e) {
    hmData.landing.verified = false;
    dirty = true;
    rMain();
    toast('연결 실패: ' + e.message, 'err');
  }
}

/* ═══════════════════════════════════════════════════════════ */
/*   Field setters                                               */
/* ═══════════════════════════════════════════════════════════ */

function hmField(key, val) {
  if (!hmData) return;
  hmData[key] = val;
  dirty = true;
  updateDirty();
}

function hmFieldPath(path, val) {
  if (!hmData) return;
  const parts = path.split('.');
  let obj = hmData;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = parts[i];
    if (obj[k] == null) obj[k] = {};
    obj = obj[k];
  }
  obj[parts[parts.length-1]] = val;
  dirty = true;
  updateDirty();
}

function hmAddSection(modId) {
  if (!hmData) return;
  if (!Array.isArray(hmData.sections)) hmData.sections = [];
  hmData.sections.push(modId);
  dirty = true;
  rMain();
}

function hmRemoveSection(idx) {
  if (!hmData?.sections) return;
  hmData.sections.splice(idx, 1);
  dirty = true;
  rMain();
}

function hmMoveSection(idx, dir) {
  if (!hmData?.sections) return;
  const next = idx + dir;
  if (next < 0 || next >= hmData.sections.length) return;
  const tmp = hmData.sections[idx];
  hmData.sections[idx] = hmData.sections[next];
  hmData.sections[next] = tmp;
  dirty = true;
  rMain();
}

async function hmCreateModule(typeId, categoryId) {
  const name = prompt('모듈 이름:');
  if (!name) return;
  document.querySelectorAll('.fp-overlay').forEach(el => el.remove());
  const moduleId = 'HM-' + typeId.toUpperCase().replace(/_/g,'-') + '-' + Date.now().toString(36).slice(-4).toUpperCase();
  const data = defaultDataForType(typeId);
  const newMod = { moduleId, name, type: typeId, category: categoryId, data };
  try {
    await fetch('/api/homepage_modules', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(newMod) });
    await loadModules();
    rHomes();
    toast('모듈 생성', 'ok');
    setTimeout(() => hmEditModule(moduleId), 100);
  } catch(e) { toast('생성 실패: '+e.message, 'err'); }
}

  switch(typeId) {
    case 'banner':  return { title:'', subtitle:'', image:'', ctaLabel:'', ctaUrl:'#' };
    case 'nav':     return { sections:[] };
    case 'footer':  return { company:'', address:'', contact:'', copyright:'' };
    case 'notice':  return { items:[] };
    case 'faq':     return { items:[] };
    case 'qna':     return { policy:'auto', categories:['일반'] };
    case 'review':  return { limit:10, sort:'latest' };
    case 'blog':    return { categories:[] };
    case 'inquiry': return { fields:['name','email','phone','title','content'] };
    case 'terms':
    case 'privacy': return { text:'' };
    case 'apply_ref': return { templateId:null, phases:['part1','part2'] };
    case 'block_cat_multi':  return { axes:3, multi:true, selected:[] };
    case 'block_file_drop':  return { accept:['pdf','docx','xlsx'], maxMb:50, multi:true };
    case 'block_ai_radio4':  return { models:['GPT-4o','Claude 3.5','Gemini 1.5','Multi-Model'], defaultIdx:3 };
    case 'block_editor':     return { defaultMode:'use' };
    case 'block_human':      return { types:['감수요청','검증요청'], grades:['일반','고급'], urgencies:[{label:'일반',surcharge:0},{label:'긴급',surcharge:50}] };
    case 'block_opts':       return { options:[] };
    case 'block_lang_pair':  return { sources:['한국어','영어'], targets:['영어','한국어'] };

function hmEditModule(modId) {
  const mod = modules.find(m => m.moduleId === modId);
  if (!mod) { toast('모듈 없음: '+modId, 'err'); return; }
  meEditModId = modId;
  const { group: g, type: t } = getTypeInfo(mod.type);
  const usage = countModuleUsage(modId);
  const warn = usage > 0 ? ` · 사용 중 <b style="color:${g.color}">${usage}곳</b> (편집 시 모두 영향)` : '';
  const h = `<div class="fp-overlay" onclick="if(event.target===this)this.remove()">
    <div class="fp-modal">
      <span class="fp-close" onclick="this.closest('.fp-overlay').remove()">×</span>
      <div class="fp-header" style="background:${g.bg};border-bottom-color:${g.color}">
        <h2 style="color:${g.color}">${t.icon} 모듈 편집: ${esc(mod.name)}</h2>
        <p>${esc(g.name)} · ${esc(t.name)} · <code>${esc(mod.moduleId)}</code>${warn}</p>
      </div>
      <div class="fp-body" id="meBody"></div>
    </div></div>`;
  document.body.insertAdjacentHTML('beforeend', h);
  renderModuleEditor(mod);
}

function renderModuleEditor(mod) {
  const body = document.getElementById('meBody');
  if (!body) return;
  const { group: g } = getTypeInfo(mod.type);

  let h = `<div class="me-row">
    <span class="me-lbl">이름</span>
    <input value="${escAttr(mod.name)}" oninput="hmMESet('name',this.value)" style="flex:1">
    <button style="padding:5px 16px;background:${g.color};color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit" onclick="hmSaveModule()">💾 저장</button>
    <button style="padding:5px 12px;background:#fff;border:1px solid #dc2626;color:#dc2626;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit" onclick="hmDeleteModule()">삭제</button>
  </div>
  <div style="border-top:1px dashed #e3e5ed;margin:10px 0 8px"></div>`;

  h += renderTypeEditor(mod);
  body.innerHTML = h;
}

function hmMESet(key, val) {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod) return;
  mod[key] = val;
}

function hmMED(path, val) {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod) return;
  if (!mod.data) mod.data = {};
  const parts = path.split('.');
  let obj = mod.data;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = isNaN(+parts[i]) ? parts[i] : +parts[i];
    if (obj[k] == null) obj[k] = isNaN(+parts[i+1]) ? {} : [];
    obj = obj[k];
  }
  const last = parts[parts.length-1];
  obj[isNaN(+last) ? last : +last] = val;
  renderModuleEditor(mod);
}

function hmMEItem(path, idx, key, val) {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod?.data?.[path]?.[idx]) return;
  mod.data[path][idx][key] = val;
  renderModuleEditor(mod);
}

function hmMERemove(path, idx) {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod?.data?.[path]) return;
  mod.data[path].splice(idx, 1);
  renderModuleEditor(mod);
}

function hmMEAdd(path, item) {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod) return;
  if (!mod.data) mod.data = {};
  if (!Array.isArray(mod.data[path])) mod.data[path] = [];
  mod.data[path].push(item);
  renderModuleEditor(mod);
}

function hmMEToggle(path, val) {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod) return;
  if (!mod.data) mod.data = {};
  if (!Array.isArray(mod.data[path])) mod.data[path] = [];
  const i = mod.data[path].indexOf(val);
  if (i >= 0) mod.data[path].splice(i, 1);
  else mod.data[path].push(val);
  renderModuleEditor(mod);
}

function hmMEPromptAdd(path, label) {
  const v = prompt(label);
  if (!v) return;
  hmMEAdd(path, v);
}

              <input value="${escAttr(o.label)}" placeholder="라벨" onchange="hmMEItem('options',${i},'label',this.value)" style="flex:1;padding:3px 6px;border:1px solid #cbd5e1;border-radius:3px;font-size:10px;font-family:inherit">
              <span class="chip sm ${o.enabled?'a':''}" onclick="hmMEItem('options',${i},'enabled',${!o.enabled})">${o.enabled?'ON':'OFF'}</span>
              <span class="chip sm" onclick="hmMERemove('options',${i})">×</span>
            </div>`).join('')}
          <button onclick="hmMEAdd('options',{id:'opt_'+Date.now().toString(36),label:'새 옵션',enabled:false})" style="padding:4px;background:#fafbfc;border:1px dashed #cbd5e1;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit;color:#0088ff;font-weight:700">+ 옵션 추가</button>
        </div></div>`;

    case 'block_lang_pair':
      return `<div class="me-row"><span class="me-lbl">원문 언어</span>
        <div class="chips">${(d.sources||[]).map((l,i) =>
          `<span class="chip a">${esc(l)}<button style="background:none;border:none;color:#fff;cursor:pointer;font-size:11px;margin-left:2px" onclick="hmMERemoveArr('sources',${i})">×</button></span>`).join('')}
          <span class="chip" onclick="hmMEPromptAdd('sources','언어:')">+ 추가</span></div></div>
        <div class="me-row"><span class="me-lbl">번역 언어</span>
        <div class="chips">${(d.targets||[]).map((l,i) =>
          `<span class="chip a">${esc(l)}<button style="background:none;border:none;color:#fff;cursor:pointer;font-size:11px;margin-left:2px" onclick="hmMERemoveArr('targets',${i})">×</button></span>`).join('')}
          <span class="chip" onclick="hmMEPromptAdd('targets','언어:')">+ 추가</span></div></div>`;

    case 'block_quality':
      return `<div class="me-row"><span class="me-lbl">표시 메트릭</span>
        <div class="chips">${['files','categories','model','editor','human','cost','time','regulation'].map(m =>
          `<span class="chip ${(d.metrics||[]).includes(m)?'a':''}" onclick="hmMEToggle('metrics','${m}')">${m}</span>`).join('')}</div></div>`;

    case 'block_regulation':
      return `<div class="me-row"><span class="me-lbl">규정 세트 ID</span><input value="${escAttr(d.ruleSet)}" placeholder="default" onchange="hmMED('ruleSet',this.value)"></div>`;

    case 'block_textarea':
      return `<div class="me-row"><span class="me-lbl">Placeholder</span><input value="${escAttr(d.placeholder)}" onchange="hmMED('placeholder',this.value)"></div>
        <div class="me-row"><span class="me-lbl">최소 높이</span><input type="number" value="${d.minH||260}" onchange="hmMED('minH',parseInt(this.value)||260)" style="width:100px;flex:none"><span style="font-size:10px;color:#64748b">px</span></div>`;
  }
  return `<div style="padding:20px;text-align:center;color:#94a3b8;font-size:11px">이 타입의 편집기가 아직 구현되지 않았습니다: <code>${esc(mod.type)}</code></div>`;
}

function hmMERemoveArr(path, idx) { hmMERemove(path, idx); }

async function hmSaveModule() {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod) return;
  const { id, ...data } = mod;
  try {
    await fetch(`/api/homepage_modules/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    await loadModules();
    document.querySelector('.fp-overlay')?.remove();
    toast('모듈 저장', 'ok');
    rHomes();
  } catch(e) { toast('저장 실패: '+e.message, 'err'); }
}

async function hmDeleteModule() {
  const mod = modules.find(m => m.moduleId === meEditModId);
  if (!mod) return;
  const usage = countModuleUsage(mod.moduleId);
  const msg = usage > 0
    ? `모듈 '${mod.name}' 삭제?\n⚠️ 사용 중 ${usage}곳의 참조가 깨집니다.`
    : `모듈 '${mod.name}' 삭제?`;
  if (!confirm(msg)) return;
  try {
    await fetch(`/api/homepage_modules/${mod.id}`, { method: 'DELETE' });
    await loadModules();
    document.querySelector('.fp-overlay')?.remove();
    toast('모듈 삭제', 'ok');
    rHomes();
  } catch(e) { toast('삭제 실패: '+e.message, 'err'); }
}

/* ═══════════════════════════════════════════════════════════ */
/*   Helpers                                                     */
/* ═══════════════════════════════════════════════════════════ */

function rMain() { renderMain(); }
function updateDirty() {
  document.getElementById('dirtyInd').innerHTML = dirty ? '<span class="dirty-dot"></span>' : '';
}

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }

let toastTimer = null;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast v ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = 'toast', 2200);
}

init();
</script>
