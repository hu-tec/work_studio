<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>홈페이지 생성 - Work Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:12px/1.4 'Pretendard',-apple-system,sans-serif;background:#f0f2f5;color:#0f172a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}

header{background:#1a365d;color:#fff;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
header h1{font-size:13px;font-weight:700}
header h1 .sub{font-weight:400;font-size:11px;opacity:.7;margin-left:6px}
header .hr{display:flex;align-items:center;gap:8px;font-size:11px}
header .hr .ui{color:rgba(255,255,255,.6)}
header .hr button{padding:2px 10px;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:3px;font-size:10px;cursor:pointer}
header .hr button:hover{background:rgba(255,255,255,.25)}
.dirty-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#f59e0b;margin-left:4px}

.short-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:5px 12px;display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap}
.short-bar .s-lbl{font-size:9px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-right:2px}
.short-bar .s-sep{width:1px;height:14px;background:#e2e8f0;margin:0 4px}
.s-btn{padding:3px 8px;border:1px solid #e2e8f0;background:#fff;border-radius:3px;font-size:10px;cursor:pointer;color:#475569;font-weight:500;font-family:inherit}
.s-btn:hover{background:#f1f5f9;border-color:#cbd5e1}
.s-btn.a{background:#1a365d;color:#fff;border-color:#1a365d}

.steps{background:#fff;border-bottom:1px solid #e2e8f0;padding:6px 14px;display:flex;align-items:center;gap:4px;flex-shrink:0}
.step-node{display:flex;align-items:center;gap:5px;cursor:pointer;padding:2px 4px;border-radius:4px;transition:.1s}
.step-node:hover{background:#f8fafc}
.step-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:#e2e8f0;color:#94a3b8;transition:.15s}
.step-node.done .step-dot{background:#059669;color:#fff}
.step-lbl{font-size:10px;color:#64748b;font-weight:500}
.step-node.done .step-lbl{color:#0f172a;font-weight:700}
.step-bar{flex:0 0 30px;height:2px;background:#e2e8f0;border-radius:1px}
.step-bar.done{background:#059669}
.steps .prog-summary{margin-left:auto;font-size:10px;color:#64748b}
.steps .prog-summary b{color:#0f172a}

.layout{display:flex;flex:1;overflow:hidden;min-height:0}

.lp{width:230px;min-width:230px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.lp-hd{padding:6px 8px;border-bottom:1px solid #e2e8f0;display:flex;gap:4px}
.lp-hd input{flex:1;height:24px;padding:0 8px;border:1px solid #e2e8f0;border-radius:3px;font-size:11px;outline:none}
.lp-hd input:focus{border-color:#1a365d}
.lp-hd button{padding:0 9px;background:#1a365d;color:#fff;border:none;border-radius:3px;font-size:11px;cursor:pointer;font-weight:600;white-space:nowrap}
.lp-hd button:hover{background:#2d4a7c}
.lp-tools{padding:4px 8px;border-bottom:1px solid #f1f5f9;display:flex;gap:4px;align-items:center}
.lp-tools button{padding:2px 6px;border:1px solid #e2e8f0;background:#fff;border-radius:3px;font-size:9px;cursor:pointer;color:#475569}
.lp-tools .cnt{margin-left:auto;font-size:9px;color:#64748b}
.lp-tools .cnt b{color:#0f172a}
.lp-list{flex:1;overflow-y:auto}
.lp-empty{padding:30px 10px;text-align:center;color:#94a3b8;font-size:10px;line-height:1.6}
.hp-row{padding:6px 8px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:.1s;position:relative}
.hp-row:hover{background:#f8fafc}
.hp-row.a{background:#eef2ff;border-left:2px solid #1a365d;padding-left:6px}
.hp-row .hp-top{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.hp-row .hp-name{font-size:11px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hp-row .hp-st{font-size:8px;padding:1px 5px;border-radius:8px;font-weight:700;text-transform:uppercase}
.st-draft{background:#fef3c7;color:#d97706}
.st-published{background:#d1fae5;color:#059669}
.st-archived{background:#f3f4f6;color:#64748b}
.hp-row .hp-meta{font-size:9px;color:#94a3b8;display:flex;gap:5px}
.hp-prog{display:flex;gap:2px;margin-top:3px}
.hp-prog-dot{flex:1;height:4px;border-radius:2px;background:#e2e8f0}
.hp-prog-dot.on{background:#059669}
.hp-row .hp-del{position:absolute;right:4px;top:4px;opacity:0;width:16px;height:16px;border:none;background:#fee2e2;color:#dc2626;border-radius:3px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.hp-row:hover .hp-del{opacity:1}
.hp-det{display:none;padding:5px 0 0;border-top:1px dashed #e2e8f0;margin-top:4px;font-size:9px;color:#64748b;line-height:1.5}
.hp-row.exp .hp-det{display:block}

.cp{flex:1;overflow-y:auto;padding:12px 14px;min-width:0;background:#f0f2f5}
.cp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;gap:10px;font-size:12px;text-align:center}
.cp-empty .big-ic{font-size:44px}
.cp-empty button{padding:8px 18px;background:#1a365d;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}

.step-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.step-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed #e2e8f0}
.step-hd .step-n{width:24px;height:24px;border-radius:50%;background:#1a365d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.step-hd h3{font-size:13px;font-weight:700;flex:1;color:#0f172a}
.step-hd h3 .meta{font-size:10px;color:#64748b;font-weight:500;margin-left:6px}
.step-hd .step-sts{font-size:9px;padding:2px 8px;border-radius:10px;background:#f1f5f9;color:#64748b;font-weight:700}
.step-hd .step-sts.done{background:#d1fae5;color:#059669}
.step-body{padding:2px}
.hint{font-size:10px;color:#94a3b8;margin-bottom:6px;padding-left:2px;line-height:1.5}

.fld{margin-bottom:6px}
.fld label{display:block;font-size:9px;color:#64748b;font-weight:700;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.fld input[type=text],.fld input[type=url],.fld input[type=email],.fld input[type=number],.fld textarea{width:100%;padding:5px 8px;border:1px solid #e2e8f0;border-radius:4px;font-size:11px;outline:none;font-family:inherit;color:#0f172a}
.fld input:focus,.fld textarea:focus{border-color:#1a365d;background:#f8fafc}
.fld textarea{resize:vertical;min-height:48px}
.fld-row{display:flex;gap:6px}
.fld-row .fld{flex:1}

.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 9px;border:1px solid #e2e8f0;background:#fff;font-size:10px;cursor:pointer;color:#475569;display:inline-flex;align-items:center;gap:3px;font-weight:500;font-family:inherit}
.chip.sq{border-radius:4px}
.chip.rd{border-radius:999px}
.chip:hover{background:#f1f5f9;border-color:#cbd5e1}
.chip.a{background:#1a365d;color:#fff;border-color:#1a365d}
.chip.a.rd{background:#2563eb;border-color:#2563eb}

/* GitHub verify result */
.gh-result{margin-top:8px;padding:8px 10px;border-radius:6px;font-size:11px;border:1px solid #e2e8f0}
.gh-result.ok{background:#ecfdf5;border-color:#059669}
.gh-result.err{background:#fef2f2;border-color:#dc2626}
.gh-result .gh-title{font-weight:700;color:#0f172a;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.gh-result .gh-meta{font-size:10px;color:#64748b;line-height:1.6}
.gh-result .gh-meta code{background:#f1f5f9;padding:1px 4px;border-radius:2px;font-family:monospace;font-size:9px}

/* Common module card */
.cm-card{border:1px solid #e2e8f0;border-radius:6px;margin-bottom:5px;overflow:hidden;background:#fff}
.cm-card.disabled{opacity:.5}
.cm-hd{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;background:#f8fafc;transition:.1s}
.cm-hd:hover{background:#f1f5f9}
.cm-card.exp .cm-hd{background:#eef2ff;border-bottom:1px solid #e2e8f0}
.cm-hd .cm-chev{width:12px;text-align:center;color:#64748b;font-size:10px;transition:.15s}
.cm-card.exp .cm-hd .cm-chev{transform:rotate(90deg)}
.cm-hd .cm-ic{font-size:14px}
.cm-hd .cm-nm{flex:1;font-size:11px;font-weight:700;color:#0f172a}
.cm-hd .cm-cat{font-size:9px;color:#94a3b8;padding:1px 6px;background:#f1f5f9;border-radius:3px;font-weight:600}
.cm-hd .cm-cnt{font-size:9px;color:#64748b;margin:0 4px}
.cm-tog{width:30px;height:16px;border-radius:8px;border:none;cursor:pointer;position:relative;transition:.15s;flex-shrink:0}
.cm-tog.on{background:#059669}
.cm-tog.off{background:#cbd5e1}
.cm-tog::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:.15s}
.cm-tog.on::after{left:16px}
.cm-tog.off::after{left:2px}
.cm-body{display:none;padding:10px;border-top:1px solid #f1f5f9}
.cm-card.exp .cm-body{display:block}

/* List editor (notice/faq/sections etc) */
.list-ed{display:flex;flex-direction:column;gap:4px}
.list-ed-item{display:flex;gap:4px;align-items:flex-start;padding:5px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px}
.list-ed-item .idx{width:18px;height:18px;border-radius:50%;background:#1a365d;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;margin-top:2px}
.list-ed-item .fields{flex:1;display:flex;flex-direction:column;gap:3px}
.list-ed-item .fields input,.list-ed-item .fields textarea{padding:3px 6px;border:1px solid #e2e8f0;border-radius:3px;font-size:10px;font-family:inherit}
.list-ed-item .rm{padding:0 6px;background:#fee2e2;color:#dc2626;border:none;border-radius:3px;font-size:10px;cursor:pointer;font-weight:700;align-self:flex-start}
.list-ed-add{padding:5px 10px;border:1px dashed #cbd5e1;background:#fff;border-radius:4px;font-size:10px;cursor:pointer;color:#1a365d;font-weight:600}
.list-ed-add:hover{background:#eef2ff}

/* Step 3: filter rows */
.filter-bar{display:flex;flex-direction:column;gap:5px;padding:6px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:5px;margin-bottom:8px}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-row .fr-lbl{font-size:9px;color:#94a3b8;font-weight:700;min-width:44px;text-transform:uppercase}

/* Template cards */
.ft-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.ft-card{padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#fff}
.ft-card.sel{border-color:#1a365d;background:#eef2ff}
.ft-card .ft-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ft-card .ft-nm{font-weight:700;color:#0f172a;font-size:11px;flex:1}
.ft-card .ft-badge{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700}
.ft-card .ft-badge.site{background:#1a365d;color:#fff}
.ft-card .ft-badge.role{background:#7c3aed;color:#fff}
.ft-card .ft-phases{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.ft-card .ph-block{padding:5px 8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;display:flex;flex-direction:column;gap:3px}
.ft-card .ph-block.on{background:#ecfdf5;border-color:#059669}
.ft-card .ph-hd{display:flex;align-items:center;gap:5px}
.ft-card .ph-hd input{accent-color:#059669;cursor:pointer}
.ft-card .ph-name{font-weight:700;font-size:10px;color:#0f172a;flex:1}
.ft-card .ph-cnt{font-size:9px;color:#64748b;background:#fff;padding:1px 6px;border-radius:3px}
.ft-card .ph-mods{display:flex;flex-wrap:wrap;gap:2px;padding-left:18px}
.ft-card .ph-mod{font-size:8px;padding:1px 5px;background:#fff;border:1px solid #e2e8f0;border-radius:3px;color:#64748b;font-family:monospace}
.ft-empty{padding:16px;text-align:center;color:#94a3b8;font-size:10px;border:1px dashed #e2e8f0;border-radius:6px;line-height:1.6}

/* Step 4: blocks */
.block-lib-hd{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin:8px 0 4px}
.block-lib{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:4px;margin-bottom:8px}
.block-lib .blk-lib-card{padding:6px 8px;border:1px solid #e2e8f0;border-radius:5px;background:#fff;cursor:pointer;font-size:10px;transition:.1s}
.block-lib .blk-lib-card:hover{background:#eef2ff;border-color:#1a365d}
.block-lib .blk-lib-card .bl-nm{font-weight:700;color:#0f172a;margin-bottom:1px}
.block-lib .blk-lib-card .bl-desc{font-size:9px;color:#94a3b8;line-height:1.3}
.stack-btns{display:flex;gap:4px;margin-bottom:4px}
.stack-btn{flex:1;padding:6px 10px;border:1px dashed #1a365d;background:#eef2ff;color:#1a365d;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer}
.stack-btn:hover{background:#c7d2fe}

.applied-hd{font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.3px;margin:10px 0 4px;display:flex;align-items:center;gap:6px}
.applied-hd b{color:#0f172a}
.applied-list{display:flex;flex-direction:column;gap:5px}
.app-blk{border:1px solid #e2e8f0;border-radius:6px;background:#fff;overflow:hidden}
.app-blk.exp .ab-body{display:block}
.app-blk-hd{display:flex;align-items:center;gap:5px;padding:6px 10px;background:#f8fafc;cursor:pointer}
.app-blk-hd:hover{background:#f1f5f9}
.app-blk-hd .ab-n{width:18px;height:18px;border-radius:50%;background:#1a365d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.app-blk-hd .ab-nm{flex:1;font-size:11px;font-weight:700;color:#0f172a}
.app-blk-hd .ab-type{font-size:9px;color:#94a3b8;font-family:monospace;background:#fff;padding:1px 5px;border-radius:2px}
.app-blk-hd .ab-ctrls{display:flex;gap:2px}
.app-blk-hd .ab-ctrls button{width:20px;height:20px;border:none;background:#fff;border-radius:3px;font-size:10px;cursor:pointer;color:#64748b}
.app-blk-hd .ab-ctrls button:hover{background:#eef2ff;color:#1a365d}
.app-blk-hd .ab-ctrls .rm{color:#dc2626}
.app-blk-hd .ab-ctrls .rm:hover{background:#fee2e2}
.ab-body{display:none;padding:8px 10px;border-top:1px solid #e2e8f0;background:#fff}

/* Step 5 routing */
.rt-table{width:100%;border-collapse:collapse;font-size:10px;margin-top:6px}
.rt-table th{background:#f8fafc;padding:5px 8px;text-align:left;font-weight:700;color:#64748b;border-bottom:1px solid #e2e8f0;font-size:9px;text-transform:uppercase;letter-spacing:.3px}
.rt-table td{padding:5px 8px;border-bottom:1px solid #f1f5f9;color:#475569}
.rt-table td.tgt{font-family:monospace;color:#1a365d;font-weight:600}
.preview-box{background:#0f172a;color:#10b981;padding:8px 12px;border-radius:5px;font-family:'Menlo','Consolas',monospace;font-size:11px;display:flex;flex-direction:column;gap:4px}
.preview-box .pv-url{display:flex;align-items:center;gap:6px}
.preview-box .pv-url a{color:#67e8f9;text-decoration:underline}
.preview-box .pv-url .label{color:#64748b}
.publish-btn{padding:10px 16px;background:#059669;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px}
.publish-btn:hover{background:#047857}
.publish-btn:disabled{opacity:.4;cursor:not-allowed}
.warn-box{padding:6px 10px;background:#fef3c7;border:1px solid #f59e0b;border-radius:5px;font-size:10px;color:#92400e;margin-top:6px}

/* Right panel */
.rp{width:300px;min-width:300px;background:#fff;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.rp-body{flex:1;overflow-y:auto;padding:10px 12px}
.rp-empty{padding:40px 16px;text-align:center;color:#94a3b8;font-size:10px;line-height:1.6}
.rp-sec{margin-bottom:12px}
.rp-sec h4{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid #f1f5f9;font-weight:700}
.rp-fld{margin-bottom:5px}
.rp-fld label{display:block;font-size:9px;color:#94a3b8;font-weight:600;margin-bottom:2px}
.rp-fld input,.rp-fld textarea{width:100%;padding:4px 7px;border:1px solid #e2e8f0;border-radius:3px;font-size:10px;outline:none;font-family:inherit}
.rp-fld input:focus,.rp-fld textarea:focus{border-color:#1a365d}
.rp-fld textarea{resize:vertical;min-height:44px}
.rp-prog{display:flex;flex-direction:column;gap:3px}
.rp-pr{display:flex;align-items:center;gap:6px;font-size:10px;padding:4px 6px;border-radius:4px;background:#f8fafc;cursor:pointer}
.rp-pr:hover{background:#eef2ff}
.rp-pr .pr-ck{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.rp-pr.done .pr-ck{background:#059669;color:#fff}
.rp-pr.wait .pr-ck{background:#e2e8f0;color:#94a3b8}
.rp-pr .pr-nm{flex:1}
.rp-pr.done .pr-nm{color:#0f172a;font-weight:600}
.rp-acts{padding:10px 12px;border-top:1px solid #e2e8f0;background:#f8fafc;display:flex;gap:6px;flex-shrink:0}
.rp-acts button{flex:1;padding:7px;border:none;border-radius:4px;font-size:11px;cursor:pointer;font-weight:700}
.rp-save{background:#1a365d;color:#fff}
.rp-save:hover:not(:disabled){background:#2d4a7c}
.rp-preview{background:#059669;color:#fff}
.rp-preview:hover:not(:disabled){background:#047857}
.rp-acts button:disabled{opacity:.35;cursor:not-allowed}

.toast{position:fixed;bottom:16px;right:16px;background:#0f172a;color:#fff;padding:8px 14px;border-radius:6px;font-size:11px;z-index:100;opacity:0;transition:.2s;pointer-events:none;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.v{opacity:1}
.toast.err{background:#dc2626}
.toast.ok{background:#059669}
</style>
</head>
<body>

<header>
  <h1><a href="admin.html">Work Studio</a><span class="sub">홈페이지 생성</span><span id="dirtyInd"></span></h1>
  <div class="hr">
    <span class="ui">관리자</span>
    <button onclick="location.href='admin.html'">관리자 홈</button>
  </div>
</header>

<div class="short-bar">
  <span class="s-lbl">빠른이동</span>
  <button class="s-btn" onclick="scrollToStep(1)">1.랜딩</button>
  <button class="s-btn" onclick="scrollToStep(2)">2.공통</button>
  <button class="s-btn" onclick="scrollToStep(3)">3.신청서</button>
  <button class="s-btn" onclick="scrollToStep(4)">4.선택</button>
  <button class="s-btn" onclick="scrollToStep(5)">5.배포</button>
</div>

<div class="steps" id="stepsBar"></div>

<div class="layout">
  <div class="lp">
    <div class="lp-hd">
      <input id="searchInput" placeholder="검색..." oninput="onSearch(this.value)">
      <button onclick="createNew()" title="새 홈페이지">+ 새</button>
    </div>
    <div class="lp-tools">
      <button onclick="toggleExpandAll()" id="btnExpAll">전체 펼치기</button>
      <span class="cnt">총 <b id="hpCount">0</b></span>
    </div>
    <div class="lp-list" id="hpList"></div>
  </div>

  <div class="cp" id="editArea">
    <div class="cp-empty">
      <div class="big-ic">🏠</div>
      <div>홈페이지를 선택하거나<br>새로 만드세요</div>

async function init(){
  renderStepsBar();
  try {
    await Promise.all([loadHomepages(), loadFormTemplates()]);
  } catch(e) {
    toast('데이터 로딩 실패: ' + e.message, 'err');
  }
  renderList();
}

async function loadHomepages(){
  try {
    const r = await fetch('/api/homepages');
    const rows = await r.json();
    homepages = (rows || []).map(row => {
      try {
        const d = JSON.parse(row.data);
        return migrateHp(Object.assign({}, d, { id: row.id, _created: row.created_at }));
      } catch { return null; }
    }).filter(Boolean);
  } catch(e) { homepages = []; }
}

async function loadFormTemplates(){
  try {
    const r = await fetch('/api/form_templates');
    const rows = await r.json();
    formTemplates = (rows || []).map(row => {
      try {
        const d = JSON.parse(row.data);
        return Object.assign({}, d, { id: row.id, _created: row.created_at });
      } catch { return null; }
    }).filter(Boolean);
  } catch(e) { formTemplates = []; }
}

function getCurrent(){
  return homepages.find(h => h.id === currentHpId);
}

function defaultCommonState(){
  const cs = {};
  COMMON_MODULES.forEach(m => {
    cs[m.id] = { enabled: m.defaultEnabled, data: JSON.parse(JSON.stringify(m.defaultData)) };
  });
  return cs;
}

function defaultHp(name){
  return {
    name: name || '새 홈페이지',
    slug: '',
    linkedSite: '',
    status: 'draft',
    landing: { repoUrl:'', branch:'main', deployPath:'/', lastSync:'', verified:null },
    commonState: defaultCommonState(),
    applyTemplates: [],
    blocks: [],
    deploy: { lastPublished:'' },
    _notes: '',
    _notesFiles: [],
  };
}

/* v1 → v2 마이그레이션 (기존 데이터 호환) */
function migrateHp(hp){
  if (!hp.commonState) {
    hp.commonState = defaultCommonState();
    if (Array.isArray(hp.commonModules)) {
      Object.keys(hp.commonState).forEach(k => { hp.commonState[k].enabled = hp.commonModules.indexOf(k) >= 0; });
    }
    delete hp.commonModules;
  }
  if (!hp.applyTemplates) {
    hp.applyTemplates = (hp.applyTemplateIds || []).map(id => ({ templateId: id, phases: ['part1','part2'] }));
    delete hp.applyTemplateIds;
  }
  if (!hp.blocks) {
    hp.blocks = (hp.optionalModules || []).map(m => ({
      type: m.type || 'legacy',
      name: m.name || '이전 모듈',
      desc: m.source || '',
      config: {},
    }));
    delete hp.optionalModules;
  }
  if (!hp.landing) hp.landing = { repoUrl:'', branch:'main', deployPath:'/', lastSync:'', verified:null };
  if (!hp.deploy) hp.deploy = { lastPublished:'' };
  return hp;
}

/* ═══════════════════════════════════════════════════════════ */
/*   Step completion                                             */
/* ═══════════════════════════════════════════════════════════ */

function isStepDone(hp, key){
  if (!hp) return false;
  if (key === 'landing')  return !!(hp.landing && hp.landing.verified);
  if (key === 'common') {
    const cs = hp.commonState || {};
    return Object.keys(cs).some(k => cs[k].enabled);
  }
  if (key === 'apply')    return (hp.applyTemplates || []).length > 0;
  if (key === 'optional') return (hp.blocks || []).length > 0;
  if (key === 'deploy')   return hp.status === 'published';
  return false;
}

/* ═══════════════════════════════════════════════════════════ */
/*   Steps bar                                                   */
/* ═══════════════════════════════════════════════════════════ */

function renderStepsBar(){
  const hp = getCurrent();
  let doneCnt = 0;
  let h = '';
  STEPS.forEach((s, i) => {
    const done = hp ? isStepDone(hp, s.key) : false;
    if (done) doneCnt++;
    h += '<div class="step-node ' + (done?'done':'') + '" onclick="scrollToStep(' + s.n + ')">' +
         '<div class="step-dot">' + (done?'✓':s.n) + '</div>' +
         '<div class="step-lbl">' + s.label + '</div></div>';
    if (i < STEPS.length - 1) h += '<div class="step-bar ' + (done?'done':'') + '"></div>';
  });
  h += '<div class="prog-summary">진행 <b>' + doneCnt + '</b> / ' + STEPS.length + '</div>';
  document.getElementById('stepsBar').innerHTML = h;
}

function scrollToStep(n){
  const el = document.getElementById('step-' + n);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}

/* ═══════════════════════════════════════════════════════════ */
/*   Left list                                                   */
/* ═══════════════════════════════════════════════════════════ */

function renderList(){
  const filtered = homepages.filter(h => !searchQuery ||
    (h.name || '').toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0 ||
    (h.slug || '').toLowerCase().indexOf(searchQuery.toLowerCase()) >= 0);
  document.getElementById('hpCount').textContent = filtered.length;

  const box = document.getElementById('hpList');
  if (!filtered.length) {
    box.innerHTML = '<div class="lp-empty">생성된 홈페이지가<br>없습니다.<br><br>[+ 새]로 시작</div>';
    return;
  }

  let h = '';
  filtered.forEach(hp => {
    const active = hp.id === currentHpId ? 'a' : '';
    const exp = expandedIds.has(hp.id) ? 'exp' : '';
    const sts = hp.status || 'draft';
    const doneCnt = STEPS.filter(s => isStepDone(hp, s.key)).length;
    const siteName = (WEBSITES.find(w => w.id === hp.linkedSite) || {}).name || '—';
    h += '<div class="hp-row ' + active + ' ' + exp + '" onclick="selectHp(' + hp.id + ')">' +
      '<div class="hp-top"><div class="hp-name">' + escapeHtml(hp.name || '(이름 없음)') + '</div>' +
      '<span class="hp-st st-' + sts + '">' + sts + '</span></div>' +
      '<div class="hp-meta"><span>' + escapeHtml(siteName) + '</span><span>·</span><span>' + doneCnt + '/5</span>' +
      '<button class="hp-del" onclick="event.stopPropagation();deleteHp(' + hp.id + ')" title="삭제">×</button></div>' +
      '<div class="hp-prog">' +
      STEPS.map(s => '<div class="hp-prog-dot ' + (isStepDone(hp, s.key)?'on':'') + '"></div>').join('') +
      '</div>' +
      '<div class="hp-det">' +
      '<div>ID ' + hp.id + ' · ' + (hp._created || '').slice(0, 10) + '</div>' +
      '<div>' + (hp.slug ? 'slug: ' + hp.slug : '슬러그 미지정') + '</div>' +
      '</div></div>';
  });
  box.innerHTML = h;
}

function onSearch(v){ searchQuery = v; renderList(); }

function toggleExpandAll(){
  if (expandedIds.size === homepages.length && homepages.length > 0) {
    expandedIds = new Set();
    document.getElementById('btnExpAll').textContent = '전체 펼치기';
  } else {
    expandedIds = new Set(homepages.map(h => h.id));
    document.getElementById('btnExpAll').textContent = '전체 접기';
  }
  renderList();
}

/*   CRUD                                                        */
/* ═══════════════════════════════════════════════════════════ */

async function createNew(){
  const name = prompt('홈페이지 이름 입력:', '새 홈페이지');
  if (!name) return;
  const data = defaultHp(name);
  try {
    const r = await fetch('/api/homepages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const j = await r.json();
    await loadHomepages();
    currentHpId = j.id;
    dirty = false;
    renderAll();
    toast('홈페이지 생성 완료', 'ok');
  } catch(e) { toast('생성 실패: ' + e.message, 'err'); }
}

async function deleteHp(id){
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    await fetch('/api/homepages/' + id, { method:'DELETE' });
    if (currentHpId === id) { currentHpId = null; dirty = false; }
    await loadHomepages();
    renderAll();
    toast('삭제 완료', 'ok');
  } catch(e) { toast('삭제 실패: ' + e.message, 'err'); }
}

function selectHp(id){
  if (dirty && !confirm('변경사항이 있습니다. 저장 없이 이동?')) return;
  currentHpId = id;
  dirty = false;
  renderAll();
}

async function saveHomepage(){
  const hp = getCurrent();
  if (!hp) return;
  try {
    const data = Object.assign({}, hp);
    delete data.id; delete data._created;
    await fetch('/api/homepages/' + hp.id, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    dirty = false;
    renderStepsBar();
    updateActions();
    updateDirtyInd();
    toast('저장 완료', 'ok');
  } catch(e) { toast('저장 실패: ' + e.message, 'err'); }
}

async function publishHomepage(){
  const hp = getCurrent();
  if (!hp) return;
  if (!hp.slug) { toast('슬러그(slug)가 필요합니다 (우측 패널)', 'err'); return; }
  if (!/^[a-z0-9-]+$/.test(hp.slug)) { toast('슬러그는 영소문자/숫자/- 만 가능', 'err'); return; }
  if (!confirm('PRD를 확정하고 공개하시겠습니까?\n\n뷰어 URL: /hp/' + hp.slug + '\nRaw .md: /hp/' + hp.slug + '.md')) return;

  hp.status = 'published';
  hp.deploy.lastPublished = new Date().toISOString().slice(0,16).replace('T',' ');
  dirty = true;
  await saveHomepage();
  renderAll();
  toast('PRD 확정 완료 📄', 'ok');
  setTimeout(() => openPreview(), 400);
}

function openPreview(){
  const hp = getCurrent();
  if (!hp) return;
  if (!hp.slug) { toast('슬러그를 먼저 지정하세요', 'err'); return; }
  if (dirty) {
    if (!confirm('저장되지 않은 변경이 있습니다. 지금 저장 후 프리뷰?')) return;
    saveHomepage().then(() => window.open('/hp/' + hp.slug, '_blank'));
  } else {
    window.open('/hp/' + hp.slug, '_blank');
  }
}

    '<h3>' + title + (meta ? '<span class="meta">' + meta + '</span>' : '') + '</h3>' +
    '<div class="step-sts ' + (done?'done':'') + '">' + (done?'완료':'대기') + '</div></div>';
}

/* ─── Step 1: Landing + real GitHub verify ─── */
function renderStep1(hp){
  const l = hp.landing || {};
  const v = l.verified;
  let verifyBox = '';
  if (v) {
    verifyBox = '<div class="gh-result ok"><div class="gh-title">✓ ' + escapeHtml(v.fullName) + '</div>' +
      '<div class="gh-meta">' +
      (v.description ? escapeHtml(v.description) + '<br>' : '') +
      '⭐ ' + v.stars + ' · 🍴 ' + v.forks + ' · 기본 브랜치 <code>' + escapeHtml(v.defaultBranch) + '</code><br>' +
      '최근 푸시: ' + escapeHtml((v.pushedAt || '').slice(0,10)) +
      (v.hasPages ? ' · 🌐 GitHub Pages 활성' : ' · GitHub Pages 비활성') +
      '</div></div>';
  } else if (v === false) {
    verifyBox = '<div class="gh-result err"><div class="gh-title">✗ 연결 실패</div>' +
      '<div class="gh-meta">유효하지 않은 URL이거나 private/404 레포입니다.</div></div>';
  }

  return '<section class="step-card" id="step-1">' +
    stepHeader(1, '랜딩 페이지 — GitHub 연결', hp, 'landing') +
    '<div class="step-body">' +
    '<div class="hint">Figma → GitHub 레포에 업로드한 랜딩 페이지를 연결합니다. [연결 테스트]로 GitHub API를 통해 실제 존재 여부를 확인합니다.</div>' +
    '<div class="fld"><label>GitHub Repository URL</label>' +
    '<input type="url" value="' + escapeAttr(l.repoUrl) + '" placeholder="https://github.com/user/repo 또는 user/repo"' +
    ' onblur="setField(\'landing.repoUrl\', this.value); setField(\'landing.verified\', null); renderEditArea()"></div>' +
    '<div class="fld-row">' +
    '<div class="fld"><label>브랜치</label>' +
    '<input type="text" value="' + escapeAttr(l.branch || 'main') + '"' +
    ' onblur="setField(\'landing.branch\', this.value)"></div>' +

async function verifyLanding(){
  const hp = getCurrent();
  if (!hp || !hp.landing || !hp.landing.repoUrl) {
    toast('URL을 먼저 입력하세요', 'err');
    return;
  }
  const parsed = parseGitHubUrl(hp.landing.repoUrl);
  if (!parsed) {
    hp.landing.verified = false;
    dirty = true;
    renderAll();
    toast('유효하지 않은 GitHub URL', 'err');
    return;
  }
  toast('GitHub API 확인 중...', 'ok');
  try {
    const r = await fetch('https://api.github.com/repos/' + parsed.owner + '/' + parsed.repo);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    hp.landing.verified = {
      owner: j.owner && j.owner.login,
      repo: j.name,
      fullName: j.full_name,
      description: j.description || '',
      stars: j.stargazers_count || 0,
      forks: j.forks_count || 0,
      defaultBranch: j.default_branch || 'main',
      pushedAt: j.pushed_at || '',
      hasPages: !!j.has_pages,
      url: j.html_url,
    };
    hp.landing.lastSync = new Date().toISOString().slice(0,16).replace('T',' ');
    dirty = true;
    renderAll();
    toast('✓ ' + j.full_name + ' 확인 완료', 'ok');
  } catch(e) {
    hp.landing.verified = false;
    dirty = true;
    renderAll();
    toast('연결 실패: ' + e.message, 'err');
  }
}

function parseGitHubUrl(url){
  if (!url) return null;
  url = url.trim().replace(/\.git$/, '').replace(/\/$/, '');
  let m = url.match(/github\.com[/:]+([^/]+)\/([^/]+)/);
  if (m) return { owner: m[1], repo: m[2] };
  m = url.match(/^([^/\s]+)\/([^/\s]+)$/);
  if (m) return { owner: m[1], repo: m[2] };
  return null;
}

    case 'banner': return d.title ? '"' + d.title.slice(0,20) + '"' : '미설정';

    case 'notice': return (d.items||[]).length + '개 항목';

function toggleApplyPhase(tplId, phase){
  const hp = getCurrent();
  if (!hp) return;
  hp.applyTemplates = hp.applyTemplates || [];
  let entry = hp.applyTemplates.find(at => at.templateId === tplId);
  if (!entry) {
    entry = { templateId: tplId, phases: [] };
    hp.applyTemplates.push(entry);
  }
  const i = entry.phases.indexOf(phase);
  if (i >= 0) entry.phases.splice(i, 1);
  else entry.phases.push(phase);
  if (!entry.phases.length) {
    hp.applyTemplates = hp.applyTemplates.filter(at => at.templateId !== tplId);
  }
  dirty = true;
  renderAll();
}

    case 'file_drop':
      const accepts = ['pdf','docx','xlsx','pptx','txt','zip','jpg','png','mp3','mp4'];
      const selAcc = new Set(cfg.accept || []);
      return '<div class="fld"><label>허용 확장자</label><div class="chips">' +
        accepts.map(a => '<button class="chip sq ' + (selAcc.has(a)?'a':'') + '" onclick="toggleArrValue(\'' + p + '.accept\',\'' + a + '\');renderEditArea()">' + a + '</button>').join('') +
        '</div></div>' +
        '<div class="fld-row"><div class="fld"><label>최대 MB</label><input type="number" value="' + (cfg.maxMb||50) + '" onblur="setField(\'' + p + '.maxMb\',parseInt(this.value)||50)"></div>' +
        '<div class="fld"><label>다중업로드</label><div class="chips">' +
        '<button class="chip sq ' + (cfg.multi?'a':'') + '" onclick="setField(\'' + p + '.multi\',true);renderEditArea()">허용</button>' +
        '<button class="chip sq ' + (!cfg.multi?'a':'') + '" onclick="setField(\'' + p + '.multi\',false);renderEditArea()">단일</button>' +
        '</div></div></div>';

    case 'ai_radio4':
      return '<div class="fld"><label>모델 목록 (' + (cfg.models||[]).length + ')</label><div class="chips">' +
        (cfg.models || []).map((m,i) => '<span class="chip sq a">' + escapeHtml(m) + ' <button style="background:none;border:none;color:#fff;cursor:pointer" onclick="removeArrItem(\'' + p + '.models\',' + i + ')">×</button></span>').join('') +
        '<button class="chip sq" onclick="promptArrItem(\'' + p + '.models\',\'모델명:\')">+ 추가</button>' +
        '</div></div>' +
        '<div class="fld"><label>기본 선택</label><div class="chips">' +
        (cfg.models || []).map((m, i) => '<button class="chip sq ' + (cfg.defaultIdx===i?'a':'') + '" onclick="setField(\'' + p + '.defaultIdx\',' + i + ');renderEditArea()">' + escapeHtml(m) + '</button>').join('') +
        '</div></div>';

    case 'editor_bool':
      return '<div class="fld"><label>기본 모드</label><div class="chips">' +
        '<button class="chip sq ' + (cfg.defaultMode==='use'?'a':'') + '" onclick="setField(\'' + p + '.defaultMode\',\'use\');renderEditArea()">에디터 사용</button>' +
        '<button class="chip sq ' + (cfg.defaultMode==='nouse'?'a':'') + '" onclick="setField(\'' + p + '.defaultMode\',\'nouse\');renderEditArea()">에디터 미사용</button>' +
        '</div></div>';

    case 'human_3sel':
      return '<div class="fld"><label>작업 유형 (' + (cfg.types||[]).length + ')</label><div class="chips">' +
        (cfg.types || []).map((t,i) => '<span class="chip sq a">' + escapeHtml(t) + ' <button style="background:none;border:none;color:#fff;cursor:pointer" onclick="removeArrItem(\'' + p + '.types\',' + i + ')">×</button></span>').join('') +
        '<button class="chip sq" onclick="promptArrItem(\'' + p + '.types\',\'작업 유형:\')">+</button>' +
        '</div></div>' +
        '<div class="fld"><label>전문가 등급</label><div class="chips">' +
        (cfg.grades || []).map((g,i) => '<span class="chip sq a">' + escapeHtml(g) + ' <button style="background:none;border:none;color:#fff;cursor:pointer" onclick="removeArrItem(\'' + p + '.grades\',' + i + ')">×</button></span>').join('') +
        '<button class="chip sq" onclick="promptArrItem(\'' + p + '.grades\',\'등급명:\')">+</button>' +
        '</div></div>' +
        '<div class="fld"><label>긴급도 (label+surcharge%)</label><div style="font-size:9px;color:#64748b">' +
        (cfg.urgencies || []).map(u => u.label + ' (+' + u.surcharge + '%)').join(' · ') +
        '</div></div>';

    case 'opts_toggle':
      return '<div class="fld"><label>옵션</label>' +
        '<div class="list-ed">' +
        (cfg.options || []).map((o, i) =>
          '<div class="list-ed-item"><div class="idx">' + (i+1) + '</div>' +
          '<div class="fields"><input type="text" value="' + escapeAttr(o.label) + '" onblur="setField(\'' + p + '.options.' + i + '.label\',this.value)"></div>' +
          '<button class="rm" onclick="removeListItem(\'' + p + '.options\',' + i + ')">×</button></div>'
        ).join('') +
        '</div><button class="list-ed-add" onclick="addListItem(\'' + p + '.options\',{id:\'opt\'+Date.now(),label:\'새 옵션\',enabled:false});renderEditArea()">+ 옵션 추가</button>' +
        '</div>';

    case 'lang_pair':
      return '<div class="fld"><label>원문 언어</label><div class="chips">' +
        (cfg.sources || []).map((l,i) => '<span class="chip sq a">' + escapeHtml(l) + ' <button style="background:none;border:none;color:#fff;cursor:pointer" onclick="removeArrItem(\'' + p + '.sources\',' + i + ')">×</button></span>').join('') +
        '<button class="chip sq" onclick="promptArrItem(\'' + p + '.sources\',\'원문 언어:\')">+</button>' +
        '</div></div>' +
        '<div class="fld"><label>번역 언어</label><div class="chips">' +
        (cfg.targets || []).map((l,i) => '<span class="chip sq a">' + escapeHtml(l) + ' <button style="background:none;border:none;color:#fff;cursor:pointer" onclick="removeArrItem(\'' + p + '.targets\',' + i + ')">×</button></span>').join('') +
        '<button class="chip sq" onclick="promptArrItem(\'' + p + '.targets\',\'번역 언어:\')">+</button>' +
        '</div></div>';

    case 'quality_panel':
      return '<div class="fld"><label>표시 메트릭</label><div class="chips">' +
        ['files','categories','model','editor','human','cost','time','regulation'].map(m => {
          const on = (cfg.metrics || []).indexOf(m) >= 0;
          return '<button class="chip sq ' + (on?'a':'') + '" onclick="toggleArrValue(\'' + p + '.metrics\',\'' + m + '\');renderEditArea()">' + m + '</button>';
        }).join('') +
        '</div></div>';

    case 'regulation':
      return '<div class="fld"><label>규정 세트 ID</label><input type="text" value="' + escapeAttr(cfg.ruleSet) + '" onblur="setField(\'' + p + '.ruleSet\',this.value)"></div>';

    case 'textarea_big':
      return '<div class="fld"><label>Placeholder</label><input type="text" value="' + escapeAttr(cfg.placeholder) + '" onblur="setField(\'' + p + '.placeholder\',this.value)"></div>' +
        '<div class="fld"><label>최소 높이 (px)</label><input type="number" value="' + (cfg.minH||260) + '" onblur="setField(\'' + p + '.minH\',parseInt(this.value)||260)"></div>';
  }
  return '<div class="fld"><label>JSON 설정</label><textarea rows="3" onblur="try{setField(\'' + p + '\',JSON.parse(this.value));renderEditArea()}catch(e){toast(\'JSON 파싱 실패\',\'err\')}">' + escapeHtml(JSON.stringify(cfg, null, 2)) + '</textarea></div>';
}

/* ─── Step 5: Deploy / Publish (real) ─── */
function renderStep5(hp){
  const slug = hp.slug || '';
  const canPublish = !!slug && /^[a-z0-9-]+$/.test(slug);

  let routingRows = '';
  const at = hp.applyTemplates || [];
  if (!at.length) {
    routingRows = '<tr><td colspan="3" style="text-align:center;color:#94a3b8">신청서 미지정</td></tr>';
  } else {
    at.forEach(e => {
      const t = formTemplates.find(x => x.id === e.templateId);
      if (!t) return;
      e.phases.forEach(ph => {
        routingRows += '<tr>' +
          '<td>' + escapeHtml(t.name || '') + ' <span style="color:#94a3b8">· ' + ph + '</span></td>' +
          '<td>' + escapeHtml(t._site || '') + '</td>' +
          '<td class="tgt">POST /api/applications</td></tr>';
      });
    });
  }

  // Add common module routing
  const cs = hp.commonState || {};
  if (cs.community_notice && cs.community_notice.enabled) {
    routingRows += '<tr><td>공지사항 (표시)</td><td>' + (cs.community_notice.data.items || []).length + '개</td><td class="tgt">인라인 렌더</td></tr>';
  }
  if (cs.community_faq && cs.community_faq.enabled) {
    routingRows += '<tr><td>FAQ (표시)</td><td>' + (cs.community_faq.data.items || []).length + '개</td><td class="tgt">인라인 렌더</td></tr>';
  }
  if (cs.community_qna && cs.community_qna.enabled) {
    routingRows += '<tr><td>Q&A</td><td>제출</td><td class="tgt">POST /api/story_posts</td></tr>';
  }
  if (cs.community_review && cs.community_review.enabled) {
    routingRows += '<tr><td>후기</td><td>제출</td><td class="tgt">POST /api/story_posts</td></tr>';
  }
  if (cs.inquiry && cs.inquiry.enabled) {
    routingRows += '<tr><td>1:1 문의</td><td>' + (cs.inquiry.data.fields || []).length + '개 필드</td><td class="tgt">POST /api/applications</td></tr>';
  }

  const previewUrl = slug ? '/hp/' + slug : '(슬러그 필요)';
  const configUrl = slug ? '/api/hp-config/' + slug : '(슬러그 필요)';

  const prdUrl = slug ? '/api/hp-prd/' + slug : '(슬러그 필요)';
  const mdUrl = slug ? '/hp/' + slug + '.md' : '(슬러그 필요)';

  return '<section class="step-card" id="step-5">' +
    stepHeader(5, 'PRD 출력 — 뷰어 & 다운로드', hp, 'deploy', hp.status === 'published' ? '확정됨' : '초안') +
    '<div class="step-body">' +
    '<div class="hint">이 빌더의 최종 결과물은 <b>PRD 마크다운 문서</b>입니다. 슬러그를 지정하면 <code>/hp/:slug</code>에서 뷰어로 열람, <code>/hp/:slug.md</code>에서 원본 <code>.md</code> 다운로드, <code>/api/hp-prd/:slug</code>에서 JSON으로 조회할 수 있습니다.</div>' +

    '<div class="fld"><label>슬러그 (PRD URL)</label>' +
    '<input type="text" value="' + escapeAttr(hp.slug) + '" placeholder="my-homepage (영소문자/숫자/-)" onblur="setField(\'slug\',this.value);renderEditArea();renderList()"></div>' +

    (canPublish ? '<div class="preview-box">' +
      '<div class="pv-url"><span class="label">VIEWER</span> <a href="' + previewUrl + '" target="_blank">' + previewUrl + '</a></div>' +
      '<div class="pv-url"><span class="label">RAW.MD</span> <a href="' + mdUrl + '" target="_blank">' + mdUrl + '</a></div>' +
      '<div class="pv-url"><span class="label">JSON</span> <a href="' + prdUrl + '" target="_blank">' + prdUrl + '</a></div>' +
      '</div>' :
      '<div class="warn-box">⚠️ 슬러그를 먼저 지정해야 PRD를 출력할 수 있습니다 (영소문자/숫자/-)</div>') +

    '<div style="display:flex;gap:6px;margin-top:8px">' +
    '<button class="chip sq a" onclick="openPreview()" ' + (canPublish?'':'disabled') + '>📄 PRD 뷰어 열기</button>' +
    '<button class="publish-btn" onclick="publishHomepage()" ' + (canPublish?'':'disabled') + '>' + (hp.status === 'published' ? '✓ 재확정' : '📄 PRD 확정 & 공개') + '</button>' +
    (hp.deploy && hp.deploy.lastPublished ? '<span style="font-size:9px;color:#94a3b8;align-self:center">마지막 확정: ' + hp.deploy.lastPublished + '</span>' : '') +
    '</div>' +

    '<div style="font-size:10px;color:#64748b;font-weight:700;margin:12px 0 4px;text-transform:uppercase">📍 PRD 라우팅 테이블 (§6에도 포함)</div>' +
    '<table class="rt-table"><thead><tr><th>요소</th><th>메타</th><th>엔드포인트</th></tr></thead><tbody>' + routingRows + '</tbody></table>' +
    '<div class="hint" style="margin-top:6px">🔌 외부 시스템/AI가 이 PRD를 가져가려면 <code>GET /api/hp-prd/' + (slug || '{slug}') + '</code> 호출. 반환 JSON의 <code>markdown</code> 필드가 원본 PRD입니다.</div>' +

    '</div></section>';
}

/* ═══════════════════════════════════════════════════════════ */
/*   Right panel                                                 */
/* ═══════════════════════════════════════════════════════════ */

function renderRight(){
  const hp = getCurrent();
  const box = document.getElementById('rpBody');
  if (!hp) {
    box.innerHTML = '<div class="rp-empty">홈페이지를 선택하면<br>메타 정보가 표시됩니다</div>';
    updateActions();
    return;
  }

  let progHtml = '';
  STEPS.forEach(s => {
    const done = isStepDone(hp, s.key);
    progHtml += '<div class="rp-pr ' + (done?'done':'wait') + '" onclick="scrollToStep(' + s.n + ')">' +
      '<div class="pr-ck">' + (done?'✓':s.n) + '</div>' +
      '<div class="pr-nm">' + s.label + '</div></div>';
  });

  const siteChips = WEBSITES.map(w =>
    '<button class="chip sq ' + (hp.linkedSite===w.id?'a':'') + '" onclick="setField(\'linkedSite\',\'' + w.id + '\');renderAll()">' + w.name + '</button>'
  ).join('');

  const statusChips = ['draft','published','archived'].map(s =>
    '<button class="chip sq ' + (hp.status===s?'a':'') + '" onclick="setField(\'status\',\'' + s + '\');renderAll()">' + s + '</button>'
  ).join('');

  const notesFiles = (hp._notesFiles || []).map((f, i) =>
    '<span class="chip sq a">📎 ' + escapeHtml(f.name) + ' <button style="background:none;border:none;color:#fff;cursor:pointer" onclick="removeNoteFile(' + i + ')">×</button></span>'
  ).join('');

  box.innerHTML =
    '<div class="rp-sec"><h4>📊 진행 현황</h4><div class="rp-prog">' + progHtml + '</div></div>' +
    '<div class="rp-sec"><h4>🏷️ 메타</h4>' +
    '<div class="rp-fld"><label>이름</label><input type="text" value="' + escapeAttr(hp.name) + '" onblur="setField(\'name\',this.value);renderList()"></div>' +
    '<div class="rp-fld"><label>슬러그</label><input type="text" value="' + escapeAttr(hp.slug) + '" placeholder="영소문자/숫자/-" onblur="setField(\'slug\',this.value);renderList();renderEditArea()"></div>' +
    '<div class="rp-fld"><label>연결 사이트</label><div class="chips">' + siteChips + '</div></div>' +
    '<div class="rp-fld"><label>상태</label><div class="chips">' + statusChips + '</div></div>' +
    '</div>' +
    '<div class="rp-sec"><h4>📝 비고</h4>' +
    '<textarea rows="3" onblur="setField(\'_notes\',this.value)">' + escapeHtml(hp._notes || '') + '</textarea>' +
    '<div class="chips" style="margin-top:4px">' + notesFiles +
    '<button class="chip sq" onclick="addNoteFile()">📎 +</button></div></div>';
  updateActions();
}

function updateActions(){
  const hp = getCurrent();
  const save = document.getElementById('btnSave');
  const prev = document.getElementById('btnPreview');
  save.disabled = !hp || !dirty;
  prev.disabled = !hp || !hp.slug;
  save.textContent = dirty ? '💾 저장 *' : '💾 저장';
}

function updateDirtyInd(){
  document.getElementById('dirtyInd').innerHTML = dirty ? '<span class="dirty-dot"></span>' : '';
}

/* ═══════════════════════════════════════════════════════════ */
/*   Field setters                                               */
/* ═══════════════════════════════════════════════════════════ */

function setField(path, value){
  const hp = getCurrent();
  if (!hp) return;
  const parts = path.split('.');
  let obj = hp;
  for (let i = 0; i < parts.length - 1; i++) {
    const k = isNaN(+parts[i]) ? parts[i] : +parts[i];
    if (obj[k] == null) obj[k] = isNaN(+parts[i+1]) ? {} : [];
    obj = obj[k];
  }
  const last = parts[parts.length - 1];
  obj[isNaN(+last) ? last : +last] = value;
  dirty = true;
  renderStepsBar();
  updateActions();
  updateDirtyInd();
}

function setListItem(path, idx, key, value){
  const hp = getCurrent();
  if (!hp) return;
  const arr = resolvePath(hp, path);
  if (!arr || !arr[idx]) return;
  arr[idx][key] = value;
  dirty = true;
  renderStepsBar();
  updateActions();
  updateDirtyInd();
}

function addListItem(path, item){
  const hp = getCurrent();
  if (!hp) return;
  const arr = resolvePath(hp, path);
  if (!Array.isArray(arr)) return;
  arr.push(item);
  dirty = true;
  renderAll();
}

function removeListItem(path, idx){
  const hp = getCurrent();
  if (!hp) return;
  const arr = resolvePath(hp, path);
  if (!Array.isArray(arr)) return;
  arr.splice(idx, 1);
  dirty = true;
  renderAll();
}

function promptArrItem(path, label){
  const v = prompt(label);
  if (!v) return;
  addListItem(path, v);
}

function removeArrItem(path, idx){
  removeListItem(path, idx);
}

function toggleArrValue(path, value){
  const hp = getCurrent();
  if (!hp) return;
  let arr = resolvePath(hp, path);
  if (!Array.isArray(arr)) {
    setField(path, [value]);
    return;
  }
  const i = arr.indexOf(value);
  if (i >= 0) arr.splice(i, 1);
  else arr.push(value);
  dirty = true;
  renderStepsBar();
  updateActions();
  updateDirtyInd();
}

function resolvePath(root, path){
  const parts = path.split('.');
  let obj = root;
  for (const p of parts) {
    if (obj == null) return null;
    obj = obj[isNaN(+p) ? p : +p];
  }
  return obj;
}

/* Common module toggles */
function toggleCommonEnabled(moduleId){
  const hp = getCurrent();
  if (!hp || !hp.commonState || !hp.commonState[moduleId]) return;
  hp.commonState[moduleId].enabled = !hp.commonState[moduleId].enabled;
  dirty = true;
  renderAll();
}
function toggleCommonExpand(moduleId){
  if (expandedCommon.has(moduleId)) expandedCommon.delete(moduleId);
  else expandedCommon.add(moduleId);
  renderEditArea();
}

/* Block operations */
function addBlock(type){
  const hp = getCurrent();
  if (!hp) { toast('먼저 홈페이지를 선택하세요', 'err'); return; }
  const def = BLOCK_LIBRARY.find(b => b.type === type);
  if (!def) return;
  hp.blocks = hp.blocks || [];
  hp.blocks.push({
    type: def.type,
    name: def.name,
    desc: def.desc,
    config: JSON.parse(JSON.stringify(def.defaultConfig)),
  });
  expandedBlocks.add(hp.blocks.length - 1);
  dirty = true;
  renderAll();
}

function addStack(presetId){
  const hp = getCurrent();
  if (!hp) { toast('먼저 홈페이지를 선택하세요', 'err'); return; }
  const stack = STACK_PRESETS[presetId];
  if (!stack) return;
  if (!confirm(stack.label + ' — ' + stack.blocks.length + '개 블록을 추가하시겠습니까?')) return;
  stack.blocks.forEach(t => addBlock(t));
  toast(stack.blocks.length + '개 블록 추가 완료', 'ok');
}

function removeBlock(idx){
  const hp = getCurrent();
  if (!hp || !hp.blocks) return;
  if (!confirm('블록 #' + (idx+1) + ' 삭제?')) return;
  hp.blocks.splice(idx, 1);
  expandedBlocks = new Set();
  dirty = true;
  renderAll();
}

function moveBlock(idx, dir){
  const hp = getCurrent();
  if (!hp || !hp.blocks) return;
  const next = idx + dir;
  if (next < 0 || next >= hp.blocks.length) return;
  const tmp = hp.blocks[idx];
  hp.blocks[idx] = hp.blocks[next];
  hp.blocks[next] = tmp;
  dirty = true;
  renderAll();
}

function toggleBlockExpand(idx){
  if (expandedBlocks.has(idx)) expandedBlocks.delete(idx);
  else expandedBlocks.add(idx);
  renderEditArea();
}

/* Notes */
function addNoteFile(){
  const name = prompt('파일명 (실 업로드는 후속):');
  if (!name) return;
  const hp = getCurrent();
  if (!hp) return;
  hp._notesFiles = hp._notesFiles || [];
  hp._notesFiles.push({ name: name, url: '' });
  dirty = true;
  renderRight();
}

function removeNoteFile(i){
  const hp = getCurrent();
  if (!hp) return;
  hp._notesFiles = hp._notesFiles || [];
  hp._notesFiles.splice(i, 1);
  dirty = true;
  renderRight();
}

/* ═══════════════════════════════════════════════════════════ */
/*   Render all                                                  */
/* ═══════════════════════════════════════════════════════════ */

function renderAll(){
  renderStepsBar();
  renderList();
  renderEditArea();
  renderRight();
  updateDirtyInd();
}

/* Helpers */
function escapeHtml(s){
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function escapeAttr(s){
  return escapeHtml(s).replace(/"/g, '&quot;');
}

let toastTimer = null;
function toast(msg, type){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast v ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast ' + (type || ''); }, 2200);
}

window.addEventListener('beforeunload', function(e){
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

init();
</script>
